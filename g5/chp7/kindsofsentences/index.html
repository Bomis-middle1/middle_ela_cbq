<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sentence Detective Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #16a085;
            --accent: #f1c40f;
            --bg-gradient: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 50%, #80cbc4 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Ambient Background Elements --- */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .floating-shape {
            position: absolute;
            opacity: 0.06;
            color: var(--primary);
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            animation: floatClues 25s infinite linear;
        }

        @keyframes floatClues {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.5); }
        }

        /* --- Mandatory Branding Intro Screen --- */
        #brand-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #brand-layer img {
            max-width: 220px;
            height: auto;
            animation: pulseLogo 2.5s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(0.95); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* --- Application Container --- */
        .quiz-container {
            width: 90%;
            max-width: 750px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(22, 160, 133, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 35px;
            z-index: 10;
            position: relative;
            display: none;
        }

        .active-app {
            display: block;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* --- Progress & Score Elements --- */
        .meta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(22, 160, 133, 0.1);
            padding-bottom: 15px;
        }

        .status-badge {
            background: rgba(22, 160, 133, 0.1);
            color: var(--secondary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* --- Timer Bar --- */
        .timer-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--secondary) 0%, #4db6ac 100%);
            transition: width 1s linear, background-color 0.3s ease;
        }

        /* --- Question Interface --- */
        .scenario-box {
            background: rgba(255, 255, 255, 0.7);
            border-left: 5px solid var(--secondary);
            padding: 15px 20px;
            border-radius: 8px;
            font-style: italic;
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .option-card {
            background: #ffffff;
            border: 2px solid rgba(22, 160, 133, 0.15);
            padding: 16px 22px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s ease;
            position: relative;
        }

        .option-card:hover {
            border-color: var(--secondary);
            background: rgba(22, 160, 133, 0.03);
            transform: translateY(-2px);
        }

        .option-card.correct {
            background: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724;
        }

        .option-card.wrong {
            background: #f8d7da !important;
            border-color: var(--error) !important;
            color: #721c24;
        }

        .cross-indicator {
            color: var(--error);
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }

        .option-card.wrong .cross-indicator {
            display: inline;
        }

        /* --- Custom Screen Pop Indicator Layer --- */
        .feedback-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 7rem;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .feedback-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* --- Explanatory System --- */
        .explanation-panel {
            margin-top: 20px;
            background: rgba(241, 196, 15, 0.15);
            border: 1px dashed var(--accent);
            padding: 15px 20px;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
            animation: slideIn 0.4s ease;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(44, 62, 80, 0.2);
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 20px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(44, 62, 80, 0.3);
        }

        /* --- Canvas System for Star Confetti --- */
        #confetti-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        @media(max-width: 600px) {
            .quiz-container { padding: 20px; width: 95%; }
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambient-bg"></div>

    <canvas id="confetti-layer"></canvas>

    <div class="feedback-overlay" id="global-indicator"></div>

    <div id="brand-layer">
        <img src="assets/logo.png" alt="Innovine Logo" onerror="this.style.display='none'; document.getElementById('alt-brand-text').style.display='block';">
        <h2 id="alt-brand-text" style="display:none; font-family:'Playfair Display'; color:var(--secondary)">Innovine</h2>
    </div>

    <div class="quiz-container active-app" id="screen-intro">
        <h1 style="text-align: center;">The Sentence Detective Agency</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem;">
            Crack the cases! Every sentence is a puzzle waiting to be classified. Let's inspect the clues.
        </p>
        <div style="text-align: center;">
            <button class="action-btn" onclick="app.startQuiz()">Launch Investigation</button>
        </div>
    </div>

    <div class="quiz-container" id="screen-gameplay">
        <div class="meta-header">
            <span class="status-badge" id="hud-progress">Case 1/10</span>
            <span class="status-badge" id="hud-score" style="background:rgba(46, 213, 115, 0.1); color:#2ed573;">Score: 0</span>
        </div>
        
        <div class="timer-wrapper">
            <div class="timer-bar" id="runtime-timer"></div>
        </div>

        <div class="scenario-box" id="field-context">Context Scenario</div>
        <div class="question-text" id="field-question">Question String</div>

        <div class="options-layout" id="box-options">
            </div>

        <div class="explanation-panel" id="box-explanation">
            <strong>Case Evidence File:</strong> <span id="text-explanation"></span>
            <br>
            <button class="action-btn" style="padding: 8px 20px; font-size: 0.9rem;" onclick="app.stepNext()">Next Case</button>
        </div>
    </div>

    <div class="quiz-container" id="screen-results" style="text-align: center;">
        <h1>Investigation Closed</h1>
        <p id="result-status" style="font-size: 1.3rem; margin: 20px 0; font-weight: 500;"></p>
        <p id="final-score" style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 30px;"></p>
        <button class="action-btn" onclick="app.resetQuiz()">New Investigation</button>
    </div>

    <audio id="sfx-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="sfx-wrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="sfx-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

    <script>
        const matrixData = [
            {
                context: "The school notice board displays important information for students. One notice reads:\n\"The Annual Day is on 15th December.\"",
                question: "The English teacher asks the class to identify the type of sentence before it is finalized for the notice board. What is the correct classification of this sentence?",
                options: ["Interrogative sentence", "Exclamatory sentence", "Assertive sentence", "Imperative sentence"],
                correct: 2,
                explain: "Assertive (declarative) sentences simply state facts, reports, or clean informational descriptions directly without calling commands or asking queries."
            },
            {
                context: "During a classroom discussion, the teacher asks:\n\"Why are we celebrating Environment Day?\"",
                question: "One student says it is a statement, while another says it is a question. What type of sentence is this?",
                options: ["Assertive sentence", "Exclamatory sentence", "Interrogative sentence", "Imperative sentence"],
                correct: 2,
                explain: "Sentences that explicitly request or ask for information and conclude with a question mark are identified as Interrogative sentences."
            },
            {
                context: "During Sports Day, a student shouts:\n\"What an amazing race the final was!\"",
                question: "The teacher explains that strong feelings such as excitement or surprise are shown using specific sentences. What is the correct type of this sentence?",
                options: ["Assertive sentence", "Interrogative sentence", "Imperative sentence", "Exclamatory sentence"],
                correct: 3,
                explain: "Exclamatory sentences are designed intentionally to emphasize strong emotions, surprise, or profound excitement."
            },
            {
                context: "The English teacher gives the class a sentence:\n\"The sun rises in the east.\"",
                question: "She asks students to transform it into a question form without altering structural integrity. Which is the correct transformation?",
                options: ["Does the sun rise in the east?", "The sun does rise in the east.", "Is the sun rises in the east?", "Why the sun rises in the east?"],
                correct: 0,
                explain: "\"Does the sun rise in the east?\" frames a completely natural and grammatically correct interrogative version of the structural absolute statement."
            },
            {
                context: "A student asks during the assembly rehearsal:\n\"Is today a holiday?\"",
                question: "The teacher asks the class to convert this into a clear statement form for a final report. Which is the correct transformation?",
                options: ["Today is a holiday.", "Today is holiday?", "Is today holiday.", "Today holiday is?"],
                correct: 0,
                explain: "Removing the inverse questioning helper structure normalizes the assertion layout cleanly to 'Today is a holiday.'"
            },
            {
                context: "A librarian is preparing a rule board for students. One sentence reads:\n\"Please return books on time.\"",
                question: "The teacher explains that this sentence gives an instruction, not a fact. Which structural correction makes it a true assertive sentence?",
                options: ["Books return please on time.", "Books are returned on time.", "Are books returned on time?", "Return books on time please?"],
                correct: 1,
                explain: "\"Books are returned on time\" removes the request element entirely, turning it into a declarative tracking statement of factual behavior."
            },
            {
                context: "During a school trip planning session, a student asks:\n\"Where are we going for the picnic?\"",
                question: "The teacher asks students to identify why this sentence structure is important in communication. What is the correct understanding?",
                options: ["It gives information", "It expresses strong emotion", "It asks for information", "It gives a command"],
                correct: 2,
                explain: "The operational task of an interrogative structure is to explicitly prompt a respondent and ask for missing programmatic or structural data."
            },
            {
                context: "While writing a story, Meera writes:\n\"The lion was very powerful.\"",
                question: "The teacher asks her to rewrite it to show strong emotion using an exclamatory sentence architecture. Which is correct?",
                options: ["How powerful the lion was!", "The lion is powerful?", "The lion was powerful.", "Was the lion powerful!"],
                correct: 0,
                explain: "\"How powerful the lion was!\" accurately structures an emotional expression using correct tone adjustments and syntax structure."
            },
            {
                context: "During a debate, students hear the following sentence:\n\"Do you think recycling is important?\"",
                question: "The teacher asks them to identify the type of sentence and explain its core communicative purpose. Which option is correct?",
                options: ["Assertive sentence – gives information", "Interrogative sentence – asks a question", "Exclamatory sentence – shows emotion", "Imperative sentence – gives command"],
                correct: 1,
                explain: "This structure initiates with a helper verb query, uses a question mark, and seeks a targeted perspective response."
            },
            {
                context: "The editor of the school magazine is reviewing a student article. One line reads:\n\"The playground is very clean.\"",
                question: "This is the final challenge! She asks the student to change it into a question form for an interview section. Which revision is correct?",
                options: ["Is the playground very clean?", "The playground very clean is?", "Why the playground is very clean?", "The playground is clean very?"],
                correct: 0,
                explain: "Moving the primary linking verb 'is' straight to the absolute front creates a flawlessly natural closed interrogative check."
            }
        ];

        class DetectiveQuizEngine {
            constructor(data) {
                this.matrix = data;
                this.cursor = 0;
                this.score = 0;
                this.timerId = null;
                this.secondsLeft = 45; 
                this.attempts = 0;
                this.interactiveLocked = false;
            }

            init() {
                setTimeout(() => {
                    const layer = document.getElementById('brand-layer');
                    layer.style.opacity = '0';
                    setTimeout(() => layer.style.display = 'none', 500);
                }, 5000);

                this.generateBackgroundClues();
            }

            generateBackgroundClues() {
                const bg = document.getElementById('ambient-bg');
                const clues = ['?', '!', '.', '🕵️‍♂️', '🔍', '⚙️'];
                for (let i = 0; i < 12; i++) {
                    const item = document.createElement('div');
                    item.className = 'floating-shape';
                    item.innerText = clues[i % clues.length];
                    item.style.fontSize = `${Math.random() * 24 + 16}px`;
                    item.style.left = `${Math.random() * 100}%`;
                    item.style.bottom = `-${Math.random() * 20 + 10}%`;
                    item.style.animationDelay = `${Math.random() * 12}s`;
                    item.style.animationDuration = `${Math.random() * 10 + 15}s`;
                    bg.appendChild(item);
                }
            }

            switchView(targetId) {
                document.querySelectorAll('.quiz-container').forEach(el => el.classList.remove('active-app'));
                document.getElementById(targetId).classList.add('active-app');
            }

            startQuiz() {
                this.cursor = 0;
                this.score = 0;
                this.switchView('screen-gameplay');
                this.renderQuestion();
            }

            renderQuestion() {
                this.interactiveLocked = false;
                this.attempts = 0;
                document.getElementById('box-explanation').style.display = 'none';
                
                const q = this.matrix[this.cursor];
                document.getElementById('hud-progress').innerText = `Case ${this.cursor + 1}/${this.matrix.length}`;
                document.getElementById('hud-score').innerText = `Score: ${this.score}`;
                document.getElementById('field-context').innerText = q.context;
                document.getElementById('field-question').innerText = q.question;

                const optionsBox = document.getElementById('box-options');
                optionsBox.innerHTML = '';

                q.options.forEach((opt, index) => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.innerHTML = `<span>${opt}</span><span class="cross-indicator">✘</span>`;
                    card.onclick = () => this.evaluateAnswer(index, card);
                    optionsBox.appendChild(card);
                });

                this.resetAndLaunchTimer();
            }

            resetAndLaunchTimer() {
                clearInterval(this.timerId);
                this.secondsLeft = 45;
                const bar = document.getElementById('runtime-timer');
                bar.style.width = '100%';
                bar.style.backgroundColor = 'var(--secondary)';

                this.timerId = setInterval(() => {
                    this.secondsLeft--;
                    const pct = (this.secondsLeft / 45) * 100;
                    bar.style.width = `${pct}%`;

                    if(this.secondsLeft <= 10) {
                        bar.style.backgroundColor = 'var(--error)';
                    }

                    if(this.secondsLeft <= 0) {
                        clearInterval(this.timerId);
                        this.handleTimeout();
                    }
                }, 1000);
            }

            evaluateAnswer(selectedIndex, element) {
                if(this.interactiveLocked || element.classList.contains('wrong')) return;

                const currentQ = this.matrix[this.cursor];

                if(selectedIndex === currentQ.correct) {
                    clearInterval(this.timerId);
                    this.interactiveLocked = true;
                    element.classList.add('correct');
                    this.score += 10;
                    document.getElementById('hud-score').innerText = `Score: ${this.score}`;
                    
                    this.triggerIndicator('✔', 'var(--success)');
                    this.playAudio('sfx-correct');
                    triggerStarConfetti();

                    setTimeout(() => this.stepNext(), 1200);
                } else {
                    this.attempts++;
                    element.classList.add('wrong');
                    this.playAudio('sfx-wrong');
                    this.triggerIndicator('✘', 'var(--error)');

                    if(this.attempts >= 2) {
                        clearInterval(this.timerId);
                        this.interactiveLocked = true;
                        this.exposeCorrectAnswers();
                    }
                }
            }

            handleTimeout() {
                this.interactiveLocked = true;
                this.triggerIndicator('✘', 'var(--error)');
                this.playAudio('sfx-wrong');
                this.exposeCorrectAnswers();
            }

            exposeCorrectAnswers() {
                const currentQ = this.matrix[this.cursor];
                const cards = document.querySelectorAll('.option-card');
                
                cards.forEach((card, index) => {
                    if(index === currentQ.correct) {
                        card.classList.add('correct');
                    }
                });

                document.getElementById('text-explanation').innerText = currentQ.explain;
                document.getElementById('box-explanation').style.display = 'block';
            }

            triggerIndicator(symbol, color) {
                const ind = document.getElementById('global-indicator');
                ind.innerText = symbol;
                ind.style.color = color;
                ind.classList.add('show');
                setTimeout(() => ind.classList.remove('show'), 800);
            }

            stepNext() {
                this.cursor++;
                if(this.cursor < this.matrix.length) {
                    this.renderQuestion();
                } else {
                    this.showResultsFloor();
                }
            }

            showResultsFloor() {
                clearInterval(this.timerId);
                this.switchView('screen-results');
                
                const maxScore = this.matrix.length * 10;
                document.getElementById('final-score').innerText = `Evidence Solved: ${this.score} out of ${maxScore} points.`;
                
                const status = document.getElementById('result-status');
                if(this.score >= maxScore * 0.8) {
                    status.innerText = "🕵️‍♂️ Master Detective! Every case cracked perfectly!";
                    this.playAudio('sfx-claps');
                } else if(this.score >= maxScore * 0.5) {
                    status.innerText = "🔍 Certified Investigator! Good logical deduction.";
                } else {
                    status.innerText = "💼 Case Cold. Review the sentence clues and try a new investigation!";
                }
            }

            resetQuiz() {
                this.startQuiz();
            }

            playAudio(id) {
                const el = document.getElementById(id);
                if(el && typeof el.play === 'function') {
                    el.currentTime = 0;
                    el.play().catch(() => {});
                }
            }
        }

        // --- Performance-Safe Star Confetti System ---
        const canvas = document.getElementById('confetti-layer');
        const ctx = canvas.getContext('2d');
        let pieces = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function spawnStar(x, y) {
            return {
                x, y,
                size: Math.random() * 8 + 6,
                speedX: (Math.random() - 0.5) * 8,
                speedY: (Math.random() - 0.7) * 10 - 4,
                color: '#f1c40f', // Sleek golden stars
                rotation: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.2
            };
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function triggerStarConfetti() {
            for(let i=0; i<35; i++) {
                pieces.push(spawnStar(window.innerWidth/2, window.innerHeight/2 + 80));
            }
        }

        function runEngineLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += 0.25; 
                p.rotation += p.rotSpeed;

                ctx.save();
                drawStar(p.x, p.y, 5, p.size, p.size/2, p.color);
                ctx.restore();

                if(p.y > canvas.height) pieces.splice(i, 1);
            }
            requestAnimationFrame(runEngineLoop);
        }
        runEngineLoop();

        const app = new DetectiveQuizEngine(matrixData);
        window.onload = () => app.init();
    </script>
</body>
</html>
