<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cinematic Review - Master Tenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d3436;
            --cinematic-purple: #322640;
            --accent-neon: #00d2d3;
            --glass: rgba(30, 24, 38, 0.95);
            --text-light: #f5f6fa;
            --text-muted: #b2bec3;
            --success: #1dd1a1;
            --error: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e1826 0%, #2c1f3d 50%, #120b1c 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Ambient Film Strip Animations --- */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .floating-icon {
            position: absolute;
            opacity: 0.04;
            color: #ffffff;
            font-size: 2.5rem;
            animation: floatRoll 22s infinite linear;
        }

        @keyframes floatRoll {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- Mandatory Branding Intro Screen --- */
        #brand-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #brand-layer img {
            max-width: 220px;
            height: auto;
            animation: pulseFade 2.5s infinite ease-in-out;
        }

        @keyframes pulseFade {
            0%, 100% { transform: scale(0.95); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* --- Main Layout Container --- */
        .quiz-container {
            width: 90%;
            max-width: 750px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            z-index: 10;
            position: relative;
            display: none;
        }

        .active-app {
            display: block;
            animation: overlaySlideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes overlaySlideIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* --- Performance Header --- */
        .meta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.08);
            color: var(--accent-neon);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Runtime Tracker Timeline --- */
        .timer-wrapper {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-neon) 0%, #00eaec 100%);
            transition: width 1s linear, background-color 0.3s ease;
        }

        /* --- Scenario Content Panels --- */
        .scenario-box {
            background: rgba(255, 255, 255, 0.04);
            border-left: 4px solid var(--accent-neon);
            padding: 15px 20px;
            border-radius: 6px;
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #ffffff;
        }

        /* --- Option Buttons (Playback Control Layout) --- */
        .options-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 22px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .option-card:hover {
            border-color: var(--accent-neon);
            background: rgba(0, 210, 211, 0.1);
            transform: translateX(4px);
        }

        .option-card.correct {
            background: rgba(29, 209, 161, 0.2) !important;
            border-color: var(--success) !important;
            color: #ffffff;
            font-weight: 600;
        }

        .option-card.wrong {
            background: rgba(255, 107, 107, 0.2) !important;
            border-color: var(--error) !important;
            color: #ffffff;
        }

        .cross-indicator {
            color: var(--error);
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }

        .option-card.wrong .cross-indicator {
            display: inline;
        }

        /* --- Interactive Screen Pop Indicator --- */
        .feedback-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 7rem;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .feedback-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* --- Retakes & Explanations Panel --- */
        .explanation-panel {
            margin-top: 25px;
            background: rgba(0, 210, 211, 0.08);
            border: 1px dashed var(--accent-neon);
            padding: 20px;
            border-radius: 12px;
            display: none;
            font-size: 0.95rem;
            animation: overlaySlideIn 0.4s ease;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--accent-neon) 0%, #00a8ff 100%);
            color: #1e1826;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 210, 211, 0.3);
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 210, 211, 0.5);
        }

        /* --- Particle System Canvas --- */
        #confetti-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        @media(max-width: 600px) {
            .quiz-container { padding: 20px; width: 95%; }
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambient-bg"></div>
    <canvas id="confetti-layer"></canvas>
    <div class="feedback-overlay" id="global-indicator"></div>

    <div id="brand-layer">
        <img src="assets/logo.png" alt="Innovine Logo" onerror="this.style.display='none'; document.getElementById('alt-brand-text').style.display='block';">
        <h2 id="alt-brand-text" style="display:none; font-family:'Playfair Display'; color:#1e1826">Innovine</h2>
    </div>

    <div class="quiz-container active-app" id="screen-intro">
        <h1 style="text-align: center; letter-spacing: 1px;">The Cinematic Review</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; line-height: 1.6;">
            Analyze timelines, correct editing frames, and master Past, Present, and Future tenses like an expert movie director.
        </p>
        <div style="text-align: center;">
            <button class="action-btn" onclick="app.startQuiz()">Start Playback</button>
        </div>
    </div>

    <div class="quiz-container" id="screen-gameplay">
        <div class="meta-header">
            <span class="status-badge" id="hud-progress">Frame 1/12</span>
            <span class="status-badge" id="hud-score" style="color:var(--success); background:rgba(29, 209, 161, 0.1);">Score: 0</span>
        </div>
        
        <div class="timer-wrapper">
            <div class="timer-bar" id="runtime-timer"></div>
        </div>

        <div class="scenario-box" id="field-context">Scenario Script</div>
        <div class="question-text" id="field-question">Question String</div>

        <div class="options-layout" id="box-options">
            </div>

        <div class="explanation-panel" id="box-explanation">
            <strong style="color:var(--accent-neon);">Director's Production Note:</strong> <span id="text-explanation" style="color:var(--text-light);"></span>
            <br>
            <button class="action-btn" style="padding: 8px 20px; font-size: 0.85rem; margin-top: 15px;" onclick="app.stepNext()">Next Scene</button>
        </div>
    </div>

    <div class="quiz-container" id="screen-results" style="text-align: center;">
        <h1>Production Complete</h1>
        <p id="result-status" style="font-size: 1.3rem; margin: 20px 0; font-weight: 500; color: var(--accent-neon);"></p>
        <p id="final-score" style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 30px;"></p>
        <button class="action-btn" onclick="app.resetQuiz()">Restart Reel</button>
    </div>

    <audio id="sfx-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="sfx-wrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="sfx-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

    <script>
        const matrixData = [
            {
                context: "The Sports Teacher prepares a notice:\n\"The school celebrate Annual Sports Day next Monday.\"",
                question: "The editor notices a tense error. The sentence talks about a future event, but the verb form is incorrect. Which correction should be made?",
                options: ["The school celebrated Annual Sports Day next Monday.", "The school will celebrates Annual Sports Day next Monday.", "The school will celebrate Annual Sports Day next Monday.", "The school is celebrating Annual Sports Day next Monday."],
                correct: 2,
                explain: "For a planned future action tracking a single specific timeframe, we cleanly deploy 'will' combined with the base root verb ('will celebrate')."
            },
            {
                context: "A student says during class:\n\"I write my project now.\"",
                question: "Another student suggests it is correct because writing is an action. What is the best correction to express ongoing timeline state?",
                options: ["I wrote my project now.", "I am writing my project now.", "I write my project yesterday.", "I will write my project now."],
                correct: 1,
                explain: "Actions systematically transpiring at the absolute current prompt instant demand the present continuous architecture ('am writing')."
            },
            {
                context: "Riya writes in her diary:\n\"Yesterday, I was go to the market with my mother.\"",
                question: "The teacher asks her to fix the tense error properly. Which alternative sentence is correct?",
                options: ["Yesterday, I go to the market with my mother.", "Yesterday, I gone to the market with my mother.", "Yesterday, I went to the market with my mother.", "Yesterday, I am going to the market with my mother."],
                correct: 2,
                explain: "Completed tracking markers from yesterday require the absolute Simple Past tense verb layout ('went')."
            },
            {
                context: "A school news report says:\n\"The players were practicing when the rain started suddenly.\"",
                question: "Which systemic description option best matches the structural timeline of this sentence?",
                options: ["Two completed actions", "One ongoing past action and one sudden past action", "Two future actions", "A habitual action"],
                correct: 1,
                explain: "The past continuous phrase ('were practicing') traces an ongoing backdrop task broken up instantly by a sudden past simple event ('started')."
            },
            {
                context: "The teacher says:\n\"Tomorrow, the class ______ visit the science park.\"",
                question: "Which option completes the planned structural sequence sentence correctly?",
                options: ["visits", "visited", "will visit", "is visiting"],
                correct: 2,
                explain: "The operational timeline marker 'Tomorrow' points forward, signaling a clear Simple Future modal tracking requirement ('will visit')."
            },
            {
                context: "A student writes:\n\"She go to school every day by bus.\"",
                question: "The teacher asks the class to correct the sentence using subject–verb agreement in simple present tense. Which is correct?",
                options: ["She goes to school every day by bus.", "She going to school every day by bus.", "She went to school every day by bus.", "She will goes to school every day by bus."],
                correct: 0,
                explain: "Third-person singular subjects ('She') require the singular verb agreement modification suffix ('goes') for regular daily behaviors."
            },
            {
                context: "A student says:\n\"We were play football when the bell rang.\"",
                question: "The teacher explains that one part is past continuous, but the verb form is incorrect. What is the correct sentence?",
                options: ["We were played football when the bell rang.", "We are playing football when the bell rang.", "We were playing football when the bell rang.", "We play football when the bell rang."],
                correct: 2,
                explain: "Past continuous structures absolutely require auxiliary helpers ('were') linked straight to present participle modifiers ('playing')."
            },
            {
                context: "A science observation report says:\n\"The plant grows fast in sunlight.\"",
                question: "The teacher asks students why simple present architecture is specifically used here. What is the true cause?",
                options: ["It shows future plan", "It shows past action", "It shows a general truth", "It shows ongoing action"],
                correct: 3,
                explain: "Universal operational laws, scientific observations, and unchanging general absolute truths always take Simple Present formats."
            },
            {
                context: "The class timetable says:\n\"At 10 a.m. tomorrow, the students ______ writing their test.\"",
                question: "Which future progress indicator option completes this timeline requirement seamlessly?",
                options: ["write", "wrote", "will be writing", "are wrote"],
                correct: 2,
                explain: "An action planned to be actively ongoing during a specific exact spot in future moments needs Future Continuous ('will be writing')."
            },
            {
                context: "A student writes:\n\"He is play cricket in the ground.\"",
                question: "Which correction is best to lock in standard syntax for ongoing actions?",
                options: ["He is played cricket in the ground.", "He plays cricket in the ground.", "He is playing cricket in the ground.", "He will playing cricket in the ground."],
                correct: 2,
                explain: "The active auxiliary marker 'is' must be paired cleanly with a continuous syntax descriptor form ('playing')."
            },
            {
                context: "\"The dancers were rehearsing when the principal entered the hall.\"",
                question: "Which structural analytical explanation of this performance timeline is correct?",
                options: ["Both actions are in future tense", "One action was ongoing in past and another interrupted it", "Both actions are habitual", "Both actions are completed at the same time"],
                correct: 1,
                explain: "The past progress event ('were rehearsing') was mid-way through its journey when a single past cross-cut ('entered') took place."
            },
            {
                context: "\"The children will be playing in the park at this time tomorrow.\"",
                question: "This is your final editing challenge! Why is this exact tense structure utilized here?",
                options: ["It shows completed action", "It shows a habit", "It shows an action continuing in future at a specific time", "It shows past action"],
                correct: 2,
                explain: "Future Continuous architecture traces progress tracking mapped directly against a localized point in future coordinates."
            }
        ];

        class CinematicQuizEngine {
            constructor(data) {
                this.matrix = data;
                this.cursor = 0;
                this.score = 0;
                this.timerId = null;
                this.secondsLeft = 45; // Grade 5 rule constraint
                this.attempts = 0;
                this.interactiveLocked = false;
            }

            init() {
                setTimeout(() => {
                    const layer = document.getElementById('brand-layer');
                    layer.style.opacity = '0';
                    setTimeout(() => layer.style.display = 'none', 500);
                }, 5000);

                this.generateAmbientElements();
            }

            generateAmbientElements() {
                const bg = document.getElementById('ambient-bg');
                const icons = ['🎬', '🎥', '⏳', '▶️', '⏪', '⏩'];
                for (let i = 0; i < 10; i++) {
                    const item = document.createElement('div');
                    item.className = 'floating-icon';
                    item.innerText = icons[i % icons.length];
                    item.style.left = `${Math.random() * 100}%`;
                    item.style.bottom = `-${Math.random() * 20 + 10}%`;
                    item.style.animationDelay = `${Math.random() * 10}s`;
                    item.style.animationDuration = `${Math.random() * 12 + 12}s`;
                    bg.appendChild(item);
                }
            }

            switchView(targetId) {
                document.querySelectorAll('.quiz-container').forEach(el => el.classList.remove('active-app'));
                document.getElementById(targetId).classList.add('active-app');
            }

            startQuiz() {
                this.cursor = 0;
                this.score = 0;
                this.switchView('screen-gameplay');
                this.renderQuestion();
            }

            renderQuestion() {
                this.interactiveLocked = false;
                this.attempts = 0;
                document.getElementById('box-explanation').style.display = 'none';
                
                const q = this.matrix[this.cursor];
                document.getElementById('hud-progress').innerText = `Frame ${this.cursor + 1}/${this.matrix.length}`;
                document.getElementById('hud-score').innerText = `Score: ${this.score}`;
                document.getElementById('field-context').innerText = q.context;
                document.getElementById('field-question').innerText = q.question;

                const optionsBox = document.getElementById('box-options');
                optionsBox.innerHTML = '';

                q.options.forEach((opt, index) => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.innerHTML = `<span>${opt}</span><span class="cross-indicator">✘</span>`;
                    card.onclick = () => this.evaluateAnswer(index, card);
                    optionsBox.appendChild(card);
                });

                this.resetAndLaunchTimer();
            }

            resetAndLaunchTimer() {
                clearInterval(this.timerId);
                this.secondsLeft = 45;
                const bar = document.getElementById('runtime-timer');
                bar.style.width = '100%';
                bar.style.backgroundColor = 'var(--accent-neon)';

                this.timerId = setInterval(() => {
                    this.secondsLeft--;
                    const pct = (this.secondsLeft / 45) * 100;
                    bar.style.width = `${pct}%`;

                    if(this.secondsLeft <= 10) {
                        bar.style.backgroundColor = 'var(--error)';
                    }

                    if(this.secondsLeft <= 0) {
                        clearInterval(this.timerId);
                        this.handleTimeout();
                    }
                }, 1000);
            }

            evaluateAnswer(selectedIndex, element) {
                if(this.interactiveLocked || element.classList.contains('wrong')) return;

                const currentQ = this.matrix[this.cursor];

                if(selectedIndex === currentQ.correct) {
                    clearInterval(this.timerId);
                    this.interactiveLocked = true;
                    element.classList.add('correct');
                    this.score += 10;
                    document.getElementById('hud-score').innerText = `Score: ${this.score}`;
                    
                    this.triggerIndicator('✔', 'var(--success)');
                    this.playAudio('sfx-correct');
                    triggerStarConfetti();

                    setTimeout(() => this.stepNext(), 1200);
                } else {
                    this.attempts++;
                    element.classList.add('wrong');
                    this.playAudio('sfx-wrong');
                    this.triggerIndicator('✘', 'var(--error)');

                    if(this.attempts >= 2) {
                        clearInterval(this.timerId);
                        this.interactiveLocked = true;
                        this.exposeCorrectAnswers();
                    }
                }
            }

            handleTimeout() {
                this.interactiveLocked = true;
                this.triggerIndicator('✘', 'var(--error)');
                this.playAudio('sfx-wrong');
                this.exposeCorrectAnswers();
            }

            exposeCorrectAnswers() {
                const currentQ = this.matrix[this.cursor];
                const cards = document.querySelectorAll('.option-card');
                
                cards.forEach((card, index) => {
                    if(index === currentQ.correct) {
                        card.classList.add('correct');
                    }
                });

                document.getElementById('text-explanation').innerText = currentQ.explain;
                document.getElementById('box-explanation').style.display = 'block';
            }

            triggerIndicator(symbol, color) {
                const ind = document.getElementById('global-indicator');
                ind.innerText = symbol;
                ind.style.color = color;
                ind.classList.add('show');
                setTimeout(() => ind.classList.remove('show'), 800);
            }

            stepNext() {
                this.cursor++;
                if(this.cursor < this.matrix.length) {
                    this.renderQuestion();
                } else {
                    this.showResultsFloor();
                }
            }

            showResultsFloor() {
                clearInterval(this.timerId);
                this.switchView('screen-results');
                
                const maxScore = this.matrix.length * 10;
                document.getElementById('final-score').innerText = `Production Track: ${this.score} out of ${maxScore} points achieved.`;
                
                const status = document.getElementById('result-status');
                if(this.score >= maxScore * 0.8) {
                    status.innerText = "🎬 Elite Director! Cinematic timelines synchronized flawlessly!";
                    this.playAudio('sfx-claps');
                } else if(this.score >= maxScore * 0.5) {
                    status.innerText = "🎥 Creative Film Editor! Good structural continuity.";
                } else {
                    status.innerText = "🎞️ Production Errors Detected. Let's restart the reel and review.";
                }
            }

            resetQuiz() {
                this.startQuiz();
            }

            playAudio(id) {
                const el = document.getElementById(id);
                if(el && typeof el.play === 'function') {
                    el.currentTime = 0;
                    el.play().catch(() => {});
                }
            }
        }

        // --- Optimized Canvas Star Burst System ---
        const canvas = document.getElementById('confetti-layer');
        const ctx = canvas.getContext('2d');
        let pieces = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function spawnStar(x, y) {
            return {
                x, y,
                size: Math.random() * 6 + 5,
                speedX: (Math.random() - 0.5) * 10,
                speedY: (Math.random() - 0.7) * 12 - 3,
                color: '#00d2d3', // Glowing cyan thematic stars
                rotation: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.25
            };
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function triggerStarConfetti() {
            for(let i=0; i<35; i++) {
                pieces.push(spawnStar(window.innerWidth/2, window.innerHeight/2 + 60));
            }
        }

        function runEngineLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += 0.28; 
                p.rotation += p.rotSpeed;

                ctx.save();
                drawStar(p.x, p.y, 5, p.size, p.size/2, p.color);
                ctx.restore();

                if(p.y > canvas.height) pieces.splice(i, 1);
            }
            requestAnimationFrame(runEngineLoop);
        }
        runEngineLoop();

        const app = new CinematicQuizEngine(matrixData);
        window.onload = () => app.init();
    </script>
</body>
