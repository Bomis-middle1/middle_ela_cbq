<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cinematic Review - Adjective Customizer Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0c1b;
            --panel-bg: rgba(25, 20, 38, 0.95);
            --neon-cyan: #00d2d3;
            --neon-magenta: #ff9ff3;
            --text-light: #f5f6fa;
            --text-muted: #a4b0be;
            --success: #1dd1a1;
            --error: #ff6b6b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #0a0714 0%, #170f26 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Ambient Film Reel Scan Lines --- */
        .film-lines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.02) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* --- Mandatory Branding Intro --- */
        #brand-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        #brand-layer img { max-width: 220px; height: auto; }

        /* --- Main App Container --- */
        .quiz-container {
            width: 92%;
            max-width: 740px;
            background: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            z-index: 10;
            display: none;
            position: relative;
        }

        .active-app { display: block; animation: cameraFocus 0.5s ease-out; }
        @keyframes cameraFocus { from { filter: blur(10px); transform: scale(0.95); opacity: 0; } to { filter: blur(0); transform: scale(1); opacity: 1; } }

        /* --- HUD --- */
        .meta-header { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--neon-magenta); }
        
        .timer-wrapper { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 30px; }
        .timer-bar { height: 100%; width: 100%; background: var(--neon-cyan); transition: width 1s linear; }

        /* --- Video Monitor / Script Blueprint Panel --- */
        .video-monitor {
            background: #000000;
            border: 3px solid #1f192e;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 35px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,210,211,0.2);
            overflow: hidden;
        }
        .video-monitor::before {
            content: 'REC •';
            position: absolute;
            top: 12px; left: 15px;
            color: var(--error);
            font-size: 0.75rem;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .scenario-box { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; line-height: 1.5; }
        .question-text { font-size: 1.15rem; color: #fff; line-height: 1.5; }

        /* --- THE NEW 2X2 DYNAMIC GRID LAYOUT --- */
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 25px;
        }

        .mod-block {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid #1f192e;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mod-block:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 210, 211, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 210, 211, 0.15);
        }

        .mod-block.correct {
            background: rgba(29, 209, 161, 0.1) !important;
            border-color: var(--success) !important;
            color: #fff;
            text-shadow: 0 0 10px var(--success);
        }

        .mod-block.wrong {
            background: rgba(255, 107, 107, 0.1) !important;
            border-color: var(--error) !important;
            color: #fff;
        }

        .cross-badge { position: absolute; top: 8px; right: 12px; color: var(--error); font-size: 0.85rem; display: none; }
        .mod-block.wrong .cross-badge { display: inline; }

        /* --- Director's Operational Note Dropdown Panel --- */
        .explanation-panel {
            margin-top: 25px; background: rgba(0, 210, 211, 0.05);
            border-left: 4px solid var(--neon-cyan); padding: 20px; border-radius: 8px;
            display: none; font-size: 0.95rem; line-height: 1.6;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #00a8ff 100%);
            color: #120b1c; border: none; padding: 14px 45px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; box-shadow: 0 8px 25px rgba(0, 210, 211, 0.3);
            transition: all 0.2s; margin-top: 15px;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0, 210, 211, 0.5); }

        /* --- Feedback Notifications --- */
        .feedback-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            font-size: 8rem; opacity: 0; pointer-events: none; z-index: 100; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .feedback-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #confetti-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        @media(max-width: 600px) {
            .mod-grid { grid-template-columns: 1fr; }
            .quiz-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="film-lines"></div>
    <canvas id="confetti-layer"></canvas>
    <div class="feedback-overlay" id="global-indicator"></div>

    <div id="brand-layer">
        <img src="g5/chp9/adjectives/assets/logo.png" alt="Logo" onerror="this.style.display='none'; document.getElementById('alt-brand-text').style.display='block';">
        <h2 id="alt-brand-text" style="display:none; font-family:'Playfair Display'; color:#0f0c1b">Innovine</h2>
    </div>

    <div class="quiz-container active-app" id="screen-intro">
        <h1 style="text-align: center; margin-bottom: 10px;">The Cinematic Review</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 35px; font-size: 1rem; line-height: 1.6;">
            The adjective modifiers are missing from the scene reels! Select the correct upgrade blocks from the matrix layout below to patch the scripts.
        </p>
        <div style="text-align: center;">
            <button class="action-btn" onclick="app.startQuiz()">Initialize Matrix</button>
        </div>
    </div>

    <div class="quiz-container" id="screen-gameplay">
        <div class="meta-header">
            <span id="hud-progress">Reel Frame: 1/10</span>
            <span id="hud-score">Score: 0</span>
        </div>
        
        <div class="timer-wrapper">
            <div class="timer-bar" id="runtime-timer"></div>
        </div>

        <div class="video-monitor" id="monitor-screen">
            <div class="scenario-box" id="field-context">Script Scene</div>
            <div class="question-text" id="field-question">Question Statement</div>
        </div>

        <div class="mod-grid" id="grid-options">
            </div>

        <div class="explanation-panel" id="box-explanation">
            <strong style="color:var(--neon-cyan); display:block; margin-bottom: 5px;">Director's Operational Note:</strong>
            <span id="text-explanation"></span>
            <br>
            <button class="action-btn" style="padding: 8px 25px; font-size: 0.8rem;" onclick="app.stepNext()">Next Sequence</button>
        </div>
    </div>

    <div class="quiz-container" id="screen-results" style="text-align: center;">
        <h1>Cut! Final Script Version Built</h1>
        <p id="result-status" style="font-size: 1.2rem; margin: 25px 0; color: var(--neon-cyan); font-weight: 500;"></p>
        <p id="final-score" style="font-size: 1rem; color: var(--text-muted); margin-bottom: 35px;"></p>
        <button class="action-btn" onclick="app.resetQuiz()">Edit New Reel</button>
    </div>

    <audio id="sfx-correct" src="g5/chp9/adjectives/assets/correct.mp3" preload="auto"></audio>
    <audio id="sfx-wrong" src="g5/chp9/adjectives/assets/wrong.mp3" preload="auto"></audio>
    <audio id="sfx-claps" src="g5/chp9/adjectives/assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

    <script>
        const matrixData = [
            {
                context: "School Editorial Review: \"The exhibition was good and students liked it.\"",
                question: "The editor feels the description is too weak for publication. What is the BEST revision that improves the adjective usage?",
                options: ["The exhibition was good and very students liked it.", "The exhibition was extremely exciting and students thoroughly enjoyed it.", "The exhibition good was and students enjoy it.", "Exhibition was exciting students good liked it."],
                correct: 1,
                explain: "'Extremely exciting' uses quality descriptive adjectives that create a clear, vivid impression for the target audience."
            },
            {
                context: "Canteen Stock Audit: \"There is many milk left in the container and few biscuits are available.\"",
                question: "The manager checks carefully for quantity and logic traps. Which correction is MOST appropriate?",
                options: ["There is much milk left in the container and a few biscuits are available.", "There are many milk left in the container and few biscuit are available.", "There is many milks left in container and few biscuits are available.", "There are much milk left and few biscuit available."],
                correct: 0,
                explain: "'Milk' is an uncountable noun requiring the modifier 'much', while countable 'biscuits' take 'a few'."
            },
            {
                context: "Library Data Entry: \"Each students received few books during reading week.\"",
                question: "The system flags a precision error in subject-adjective agreement. What is the correct correction?",
                options: ["Each student received a few books during reading week.", "Each students received few books during reading week.", "Every students receive a few books during reading week.", "Each student received few books during reading week only."],
                correct: 0,
                explain: "The distributive adjective 'Each' must track a singular noun ('student') followed by plural countable limits ('a few books')."
            },
            {
                context: "Art Display Layout: \"___ paintings on the far wall were made by Class 5 students.\"",
                question: "The targeted items are far from both the speaker and the students. Which option completes the script frame?",
                options: ["This", "That", "These", "Those"],
                correct: 3,
                explain: "'Those' acts as a demonstrative adjective targeting plural objects positioned at a physical distance."
            },
            {
                context: "Dialogue Review: \"Riya shared she pencil with her friend.\"",
                question: "The teacher explains possessive adjectives before nouns. Which correction is BEST?",
                options: ["Riya shared her pencil with her friend.", "Riya shared she pencils with her friend.", "Riya shared his pencil with her friend.", "Riya shared they pencil with friend."],
                correct: 0,
                explain: "The possessive modifier tracking a female singular owner directly preceding a singular noun is always 'her'."
            },
            {
                context: "Word Formation Track: Root base 'care'",
                question: "Which option correctly forms a descriptor adjective used to characterize individuals or items?",
                options: ["careless", "caring", "carely", "carement"],
                correct: 1,
                explain: "'Caring' successfully shifts the root word into an active adjective category descriptor form."
            },
            {
                context: "Advanced Syntax Placement: \"He bought a shoes new black pair.\"",
                question: "The block breaks adjective order and noun rules. Which option shows the correctly ordered sentence?",
                options: ["He bought a black new pair shoes.", "He bought a new black pair of shoes.", "He bought shoes a black new pair.", "He bought a pair black new shoes."],
                correct: 1,
                explain: "Proper adjective ordering scales age attributes ('new') directly before color classifications ('black')."
            },
            {
                context: "Critical Error Detection: \"There are little chairs in the auditorium for guests.\"",
                question: "The inspector checks whether adjective usage is correct for countable nouns. What is the best correction?",
                options: ["There are little chair in the auditorium.", "There are a little chairs in the auditorium.", "There are many chairs in the auditorium.", "There is little chairs in the auditorium."],
                correct: 2,
                explain: "Plural countable things like 'chairs' cannot take 'little'. 'Many' matches the description logic criteria."
            },
            {
                context: "Context Demonstratives: \"___ charts here and ___ charts over there must be submitted.\"",
                question: "The speaker is referencing nearby items and far objects together. Select the correct matrix module pair.",
                options: ["This, those", "These, those", "That, these", "Those, these"],
                correct: 1,
                explain: "'These' identifies plural nearby charts, while 'those' matches far-away plural target objects."
            },
            {
                context: "Final Challenge Matrix: \"My two red beautiful drawing were selected for exhibition.\"",
                question: "The teacher checks number agreement, adjective order, and noun form. Choose the most accurate upgrade block.",
                options: ["My two beautiful red drawings were selected for exhibition.", "My beautiful two red drawing were selected for exhibition.", "My red beautiful two drawings was selected for exhibition.", "My two red beautiful drawing is selected for exhibition."],
                correct: 0,
                explain: "The correct modifier hierarchy is: Number ('two') + Opinion ('beautiful') + Color ('red') + Plural Noun ('drawings')."
            }
        ];

        class StudioDesignEngine {
            constructor(data) {
                this.matrix = data;
                this.cursor = 0;
                this.score = 0;
                this.timerId = null;
                this.secondsLeft = 45;
                this.attempts = 0;
                this.interactiveLocked = false;
            }

            init() {
                setTimeout(() => {
                    const layer = document.getElementById('brand-layer');
                    layer.style.opacity = '0';
                    setTimeout(() => layer.style.display = 'none', 500);
                }, 5000);
            }

            switchView(targetId) {
                document.querySelectorAll('.quiz-container').forEach(el => el.classList.remove('active-app'));
                document.getElementById(targetId).classList.add('active-app');
            }

            startQuiz() {
                this.cursor = 0;
                this.score = 0;
                this.switchView('screen-gameplay');
                this.renderQuestion();
            }

            renderQuestion() {
                this.interactiveLocked = false;
                this.attempts = 0;
                document.getElementById('box-explanation').style.display = 'none';

                // Reset screen style bounds
                const monitor = document.getElementById('monitor-screen');
                monitor.style.borderColor = "#1f192e";
                monitor.style.boxShadow = "inset 0 0 20px rgba(0,210,211,0.2)";
                
                const q = this.matrix[this.cursor];
                document.getElementById('hud-progress').innerText = `Reel Frame: ${this.cursor + 1}/${this.matrix.length}`;
                document.getElementById('hud-score').innerText = `Score: ${this.score}`;
                document.getElementById('field-context').innerText = q.context;
                document.getElementById('field-question').innerText = q.question;

                const grid = document.getElementById('grid-options');
                grid.innerHTML = '';
                grid.style.display = 'grid';

                q.options.forEach((opt, index) => {
                    const block = document.createElement('div');
                    block.className = 'mod-block';
                    block.innerHTML = `<span>${opt}</span><span class="cross-badge">✘</span>`;
                    block.onclick = () => this.evaluateBlock(index, block);
                    grid.appendChild(block);
                });

                this.resetAndLaunchTimer();
            }

            resetAndLaunchTimer() {
                clearInterval(this.timerId);
                this.secondsLeft = 45;
                const bar = document.getElementById('runtime-timer');
                bar.style.width = '100%';
                bar.style.backgroundColor = 'var(--neon-cyan)';

                this.timerId = setInterval(() => {
                    this.secondsLeft--;
                    const pct = (this.secondsLeft / 45) * 100;
                    bar.style.width = `${pct}%`;

                    if(this.secondsLeft <= 10) bar.style.backgroundColor = 'var(--error)';
                    if(this.secondsLeft <= 0) {
                        clearInterval(this.timerId);
                        this.handleTimeout();
                    }
                }, 1000);
            }

            evaluateBlock(selectedIndex, element) {
                if(this.interactiveLocked || element.classList.contains('wrong')) return;

                const currentQ = this.matrix[this.cursor];
                const monitor = document.getElementById('monitor-screen');

                if(selectedIndex === currentQ.correct) {
                    clearInterval(this.timerId);
                    this.interactiveLocked = true;
                    element.classList.add('correct');
                    
                    monitor.style.borderColor = "var(--success)";
                    monitor.style.boxShadow = "0 0 30px rgba(29, 209, 161, 0.4)";
                    
                    this.score += 10;
                    document.getElementById('hud-score').innerText = `Score: ${this.score}`;
                    this.triggerIndicator('✔', 'var(--success)');
                    this.playAudio('sfx-correct');
                    triggerStarConfetti();

                    setTimeout(() => this.stepNext(), 1500);
                } else {
                    this.attempts++;
                    element.classList.add('wrong');
                    this.playAudio('sfx-wrong');
                    this.triggerIndicator('✘', 'var(--error)');

                    // Camera shutter shake simulation
                    monitor.style.animation = "shake 0.3s ease-in-out";
                    setTimeout(() => monitor.style.animation = "", 300);

                    if(this.attempts >= 2) {
                        clearInterval(this.timerId);
                        this.interactiveLocked = true;
                        this.exposeCorrectSystem();
                    }
                }
            }

            handleTimeout() {
                this.interactiveLocked = true;
                this.triggerIndicator('✘', 'var(--error)');
                this.playAudio('sfx-wrong');
                this.exposeCorrectSystem();
            }

            exposeCorrectSystem() {
                const currentQ = this.matrix[this.cursor];
                const blocks = document.querySelectorAll('.mod-block');
                
                blocks.forEach((block, index) => {
                    if(index === currentQ.correct) block.classList.add('correct');
                });

                const monitor = document.getElementById('monitor-screen');
                monitor.style.borderColor = "var(--error)";

                document.getElementById('text-explanation').innerText = currentQ.explain;
                document.getElementById('box-explanation').style.display = 'block';
            }

            triggerIndicator(symbol, color) {
                const ind = document.getElementById('global-indicator');
                ind.innerText = symbol;
                ind.style.color = color;
                ind.classList.add('show');
                setTimeout(() => ind.classList.remove('show'), 800);
            }

            stepNext() {
                this.cursor++;
                if(this.cursor < this.matrix.length) {
                    this.renderQuestion();
                } else {
                    this.showResultsFloor();
                }
            }

            showResultsFloor() {
                clearInterval(this.timerId);
                this.switchView('screen-results');
                
                const maxScore = this.matrix.length * 10;
                document.getElementById('final-score').innerText = `Scrub Record: Finished with ${this.score} out of ${maxScore} points.`;
                
                const status = document.getElementById('result-status');
                if(this.score >= maxScore * 0.8) {
                    status.innerText = "🎬 MASTER DIRECTOR: All modifier sequences fully optimized!";
                    this.playAudio('sfx-claps');
                } else if(this.score >= maxScore * 0.5) {
                    status.innerText = "🎥 LEAD EDITOR: Great structural adjective placement consistency.";
                } else {
                    status.innerText = "🎞️ RE-TAKE REQUIRED: Let's run through the script alignment again!";
                }
            }

            resetQuiz() { this.startQuiz(); }

            playAudio(id) {
                const el = document.getElementById(id);
                if(el && typeof el.play === 'function') {
                    el.currentTime = 0;
                    el.play().catch(() => {});
                }
            }
        }

        // --- Performance-Safe High-Performance Canvas Star-Burst Engine ---
        const canvas = document.getElementById('confetti-layer');
        const ctx = canvas.getContext('2d');
        let pieces = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function spawnStar(x, y) {
            return {
                x, y, size: Math.random() * 6 + 5,
                speedX: (Math.random() - 0.5) * 12,
                speedY: (Math.random() - 0.7) * 14 - 4,
                color: '#00d2d3', rotation: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.2
            };
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3, x = cx, y = cy, step = Math.PI / spikes;
            ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
                x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius); ctx.closePath(); ctx.fillStyle = color; ctx.fill();
        }

        function triggerStarConfetti() {
            for(let i=0; i<35; i++) pieces.push(spawnStar(window.innerWidth/2, window.innerHeight/2 + 60));
        }

        function runEngineLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i]; p.x += p.speedX; p.y += p.speedY; p.speedY += 0.3; p.rotation += p.rotSpeed;
                ctx.save(); drawStar(p.x, p.y, 5, p.size, p.size/2, p.color); ctx.restore();
                if(p.y > canvas.height) pieces.splice(i, 1);
            }
            requestAnimationFrame(runEngineLoop);
        }
        runEngineLoop();

        const app = new StudioDesignEngine(matrixData);
        window.onload = () => app.init();
    </script>
</body>
</html>
