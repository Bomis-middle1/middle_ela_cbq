<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 5: Chapter 22 - Figures of Speech Quiz</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ec4b6;
            --danger: #e71d36;
            --dark: #2b2d42;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid var(--light);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .logo {
            max-height: 60px;
            margin-bottom: 10px;
            object-fit: contain;
        }

        h1 {
            font-size: 20px;
            margin: 0;
            color: var(--primary);
        }

        h2 {
            font-size: 14px;
            color: #8d99ae;
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: var(--light);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .hint-box {
            font-style: italic;
            color: #6c757d;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--light);
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #edf2f7;
            border-color: #cbd5e1;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success);
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: var(--danger);
            color: #721c24;
        }

        .result-screen {
            display: none;
        }

        .score-display {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
        }

        .restart-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- Active Quiz View -->
    <div id="quiz-view">
        <div class="header">
            <!-- Dynamically uses your logo asset -->
            <img src="assets/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <h1>Figures of Speech</h1>
            <h2>Grade 5 • Chapter 22</h2>
        </div>

        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>

        <div id="question" class="question-box">Loading question...</div>
        <div id="hint" class="hint-box"></div>

        <div id="options" class="options-grid">
            <!-- Buttons dynamically injected here -->
        </div>
    </div>

    <!-- Final Results View -->
    <div id="result-view" class="result-screen">
        <h2>Quiz Completed!</h2>
        <div class="score-display" id="final-score">0/0</div>
        <p id="feedback-text">Great job completing Chapter 22!</p>
        <button class="restart-btn" onclick="resetQuiz()">Try Again</button>
    </div>
</div>

<script>
    // Audio elements configured exactly to your asset pathways
    const audioCorrect = new Audio('assets/correct.mp3');
    const audioWrong = new Audio('assets/wrong.mp3');
    const audioClaps = new Audio('assets/freesound_community-claps-44774.mp3');

    // 5th Grade Level Figure of Speech Questions
    const questions = [
        {
            sentence: '"The autumn leaves danced across the driveway."',
            hint: 'Giving human traits (dancing) to non-human things (leaves).',
            options: ['Simile', 'Metaphor', 'Personification', 'Hyperbole'],
            answer: 'Personification'
        },
        {
            sentence: '"After the soccer match, Tommy slept like a log."',
            hint: 'Compares Tommy\'s sleep to a log using the word "like".',
            options: ['Metaphor', 'Simile', 'Alliteration', 'Onomatopoeia'],
            answer: 'Simile'
        },
        {
            sentence: '"Our classroom was a zoo during the indoor recess."',
            hint: 'Directly states the classroom *was* a zoo without using "like" or "as".',
            options: ['Metaphor', 'Simile', 'Personification', 'Hyperbole'],
            answer: 'Metaphor'
        },
        {
            sentence: '"I have a million miles of reading to finish tonight!"',
            hint: 'A massive exaggeration to make a point.',
            options: ['Onomatopoeia', 'Metaphor', 'Hyperbole', 'Personification'],
            answer: 'Hyperbole'
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let canAnswer = true;

    function loadQuestion() {
        canAnswer = true;
        const currentQuestion = questions[currentQuestionIndex];
        
        // Update progress bar
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;

        // Set text items
        document.getElementById('question').innerText = currentQuestion.sentence;
        document.getElementById('hint').innerText = `Hint: ${currentQuestion.hint}`;
        
        // Clear and build options buttons
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        currentQuestion.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.addEventListener('click', () => handleAnswer(button, option));
            optionsContainer.appendChild(button);
        });
    }

    function handleAnswer(selectedButton, selectedOption) {
        if (!canAnswer) return;
        canAnswer = false;

        const currentQuestion = questions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');

        // Disable all buttons immediately to freeze choices
        buttons.forEach(btn => btn.setAttribute('disabled', 'true'));

        if (selectedOption === currentQuestion.answer) {
            // Correct Answer Actions
            selectedButton.classList.add('correct');
            score++;
            
            audioCorrect.currentTime = 0; // Rewind in case of rapid clicks
            audioCorrect.play().catch(e => console.log("Audio play blocked by browser autonomy laws until user interactions occur."));
        } else {
            // Wrong Answer Actions
            selectedButton.classList.add('wrong');
            
            // Highlight the correct answer for visual feedback
            buttons.forEach(btn => {
                if (btn.innerText === currentQuestion.answer) {
                    btn.classList.add('correct');
                }
            });

            audioWrong.currentTime = 0;
            audioWrong.play().catch(e => console.log("Audio play blocked."));
        }

        // Advance to next screen after 2 seconds so they can see the correction
        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 2000);
    }

    function showResults() {
        document.getElementById('progress').style.width = '100%';
        document.getElementById('quiz-view').style.display = 'none';
        
        const resultView = document.getElementById('result-view');
        resultView.style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        
        // Play the community celebration claps track
        audioClaps.currentTime = 0;
        audioClaps.play().catch(e => console.log("Audio play blocked."));
    }

    function resetQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'block';
        loadQuestion();
    }

    // Initialize the module on script load
    loadQuestion();
</script>

</body>
</html>
