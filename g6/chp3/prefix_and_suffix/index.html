<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ - Prefix and Suffix Mastery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary: #1976d2;
  --primary-hover: #115293;
  --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #fff3e0 100%);
  --surface: #ffffff;
  --text-main: #2c3e50;
  --text-muted: #7f8c8d;
  --correct: #2ecc71;
  --correct-bg: #e8f8f0;
  --wrong: #e74c3c;
  --wrong-bg: #fdedec;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg-gradient);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

.screen {
  display: none;
  width: 100%;
  max-width: 650px;
  margin: 20px;
  padding: 40px 30px;
  background: var(--surface);
  border-radius: 24px;
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.06), 0 5px 15px rgba(0, 0, 0, 0.04);
  text-align: center;
  animation: fadeIn 0.4s ease-out;
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

#splash {
  background: transparent;
  box-shadow: none;
}
.logo {
  width: 180px;
  animation: pulse 2s infinite ease-in-out;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.04); opacity: 1; }
}

h2 { font-size: 1.2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
h3 { font-size: 1.4rem; color: #1a252f; margin-bottom: 20px; font-weight: 700; text-align: left; line-height: 1.5; }
p { color: var(--text-muted); line-height: 1.6; font-size: 1.05rem; margin-bottom: 24px; }

.btn {
  display: inline-block;
  padding: 14px 35px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 12px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 10px rgba(25, 118, 210, 0.25);
}
.btn:hover {
  background: var(--primary-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 15px rgba(25, 118, 210, 0.35);
}

.picture {
  width: 100%;
  max-height: 260px;
  object-fit: contain;
  margin-bottom: 20px;
  border-radius: 14px;
  border: 1px solid #e1e8ed;
  background: #fdfefe;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 15px;
}
.timer {
  font-weight: bold;
  background: #fff3cd;
  color: #856404;
  padding: 4px 14px;
  border-radius: 20px;
}
.progress {
  height: 8px;
  background: #eaeded;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 25px;
}
.progress-bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
  transition: width 0.3s ease;
}

.option {
  display: block;
  width: 100%;
  background: #fdfefe;
  margin: 12px 0;
  padding: 16px 20px;
  border: 2px solid #e2ebf0;
  border-radius: 14px;
  cursor: pointer;
  text-align: left;
  font-size: 0.98rem;
  line-height: 1.4;
  color: #34495e;
  transition: all 0.2s ease;
}
.option:hover {
  background: #f4f6f7;
  border-color: #bdc3c7;
  transform: translateX(4px);
}
.option.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
  color: #196f3d;
  font-weight: 600;
}
.option.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
  color: #943126;
}
.disabled {
  pointer-events: none;
}

#msg {
  font-size: 1rem;
  font-weight: 600;
  margin-top: 15px;
  min-height: 24px;
}

#finalScore {
  font-size: 3.5rem;
  color: var(--primary);
  margin: 20px 0;
  font-weight: 800;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div class="screen active" id="splash">
  <img src="assets/innovine-logo.png" class="logo" alt="Logo">
</div>

<!-- INTRO -->
<div class="screen" id="intro">
  <h2>Grade 6 ELA</h2>
  <h3 style="text-align: center; margin-bottom: 10px;">Chapter 3: Prefix & Suffix</h3>
  <p>Total Assessment Content: 15 Questions</p>
  <button class="btn" onclick="beginQuiz()">Start Challenge</button>
</div>

<!-- IMAGE VIEW -->
<div class="screen" id="imageScreen">
  <h2>Context Setup</h2>
  <img id="caseImage" class="picture" alt="Visual Context">
  <p id="imageText" style="font-weight: 600; color: #1a252f;"></p>
  <button class="btn" onclick="continueFromImage()">Continue to Questions</button>
</div>

<!-- QUESTION -->
<div class="screen" id="quiz">
  <div class="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>Question <span id="qno">1</span>/15</div>
    <div class="timer">⏱ <span id="time">45</span>s</div>
  </div>

  <div class="progress"><div class="progress-bar" id="bar"></div></div>

  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="msg"></p>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <h2>Performance Summary</h2>
  <h3>Result</h3>
  <div id="finalScore">0/15</div>
  <button class="btn" onclick="location.reload()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
let questions = [
  {
    q: "Which option correctly fills ALL SIX blanks on the Science Fair Poster?",
    o: [
      "a) purifyment / redesign / creatious / unpossible / interacting / inventment",
      "b) purification / redesign / creative / impossible / interact / invention",
      "c) purification / redesign / creation / impossible / interaction / invention",
      "d) purifying / design / creative / impossible / interact / inventing"
    ],
    a: 2, 
    imageTrigger: 1
  },
  {
    q: "The Science Fair poster uses the word \"redesign\" (re- + design). What does the prefix re- tell us about the team's plan?",
    o: [
      "a) They will design something completely different from scratch.",
      "b) They will design it for the first time.",
      "c) They will design it again by improving their first attempt.",
      "d) They are unable to design it."
    ],
    a: 2
  },
  {
    q: "The poster changes purify → purification and invent → invention. What kind of suffix is used in both words, and what does it do?",
    o: [
      "a) Inflectional suffix—it changes the tense of the verb.",
      "b) Derivational suffix (-tion/-ation)—it changes a verb into a noun.",
      "c) Prefix—it adds meaning before the root word.",
      "d) Inflectional suffix—it changes singular nouns into plural nouns."
    ],
    a: 1
  },
  {
    q: "Rohan writes \"developation\" and Riya writes \"interactation\" in a WhatsApp chat while preparing their Science Fair project. What is the correct noun form for each word, and what rule did they break?",
    o: [
      "a) developation → development (-ment, not -ation); interactation → interaction (-tion directly from the root word, not -ation)",
      "b) developation → development; interactation → interactation (correct as written)",
      "c) Both are correct because both use the suffix -ation.",
      "d) developation → developing; interactation → interacting."
    ],
    a: 0
  },
  {
    q: "Riya is writing an Instagram caption about her team's Science Fair project. Which option correctly completes the caption?",
    o: [
      "a) creativity / invention / inspirational / proud",
      "b) creative / invention / inspiring / proudness",
      "c) creativeness / inventation / inspirational / proudful",
      "d) creativity / inventment / inspireful / proud"
    ],
    a: 0, 
    imageTrigger: 2
  },
  {
    q: "The WhatsApp chat shows spelling and structure anomalies. Which option correctly identifies ALL the word-building errors in the chat?",
    o: [
      "a) successfull → successful; happyful → happy or happiness; unposssible → impossible (wrong prefix + spelling); rewrite is correctly formed using the prefix re-",
      "b) successfull → successfully; happyful → happyful (correct); unposssible → unpossible; rewrite is incorrect",
      "c) successfull → success; happyful → happiness; unposssible → possible; rewrite → write",
      "d) All the words are correct—there are no word-building errors."
    ],
    a: 0, 
    imageTrigger: 3
  },
  {
    q: "Five newspaper headlines contain blanks. Which option correctly fills all five blanks in order?",
    o: [
      "a) creative / performance / interacted / development / easily",
      "b) creativity / performance / interacted / development / easier",
      "c) creativeness / performing / interact / developing / easier",
      "d) creativity / performing / interaction / development / easily"
    ],
    a: 1, 
    imageTrigger: 4
  },
  {
    q: "A student writes: \"The teams performed, interacted and celebrated.\" The suffix -ed is added to all three verbs. What kind of suffix is this, and why?",
    o: [
      "a) Derivational—it creates completely new words with different meanings.",
      "b) Inflectional—it only changes the tense. The words remain verbs and their basic meaning does not change.",
      "c) It is a prefix, not a suffix.",
      "d) It is a derivational suffix because it changes the verbs into nouns."
    ],
    a: 1
  },
  {
    q: "Which of the following correctly uses the prefix im- to mean \"not\"?",
    o: [
      "a) imhappy",
      "b) impossible",
      "c) imwrite",
      "d) imcelebrate"
    ],
    a: 1
  },
  {
    q: "Sort these suffixes into the correct groups:\nP: -ness (happy → happiness)\nQ: -ed (talk → talked)\nR: -tion (invent → invention)\nS: -s (cat → cats)\n\nWhich option correctly classifies them?",
    o: [
      "a) Derivational: P, Q | Inflectional: R, S",
      "b) Derivational: Q, S | Inflectional: P, R",
      "c) Derivational: P, R | Inflectional: Q, S",
      "d) Derivational: R, S | Inflectional: P, Q"
    ],
    a: 2
  },
  {
    q: "Classify the prefix meanings for these words: [1] impossible, [2] rewrite, [3] interact, [4] unhappy. Which option correctly matches each word with the meaning of its prefix?",
    o: [
      "a) 1 = again, 2 = not, 3 = between, 4 = not",
      "b) 1 = not, 2 = again, 3 = between, 4 = not",
      "c) 1 = between, 2 = not, 3 = again, 4 = not",
      "d) 1 = not, 2 = between, 3 = again, 4 = not"
    ],
    a: 1
  },
  {
    q: "Three of the following words use a prefix meaning \"not.\" One word does not. Which is the odd one out?",
    o: [
      "a) impossible",
      "b) invisible",
      "c) incomplete",
      "d) interact"
    ],
    a: 3
  },
  {
    q: "Riya writes in the class WhatsApp group: \"Our thinking was very creativeness.\" What is wrong with the sentence, and how should it be corrected?",
    o: [
      "a) No error—creativeness is the correct adjective.",
      "b) \"Creativeness\" is a noun. After \"very\", an adjective is needed, so the correct word is \"creative.\"",
      "c) \"Creativeness\" should be replaced only with creativity because both words have the same meaning.",
      "d) \"Very creative\" is incorrect, so very should be removed."
    ],
    a: 1
  },
  {
    q: "A student changes the sentence: \"He is happy\" to \"He has happiness.\" What is the effect of adding the suffix -ness?",
    o: [
      "a) The meaning changes completely because the person is no longer happy.",
      "b) The suffix \"-ness\" changes the adjective \"happy\" into the noun \"happiness\", changing the word class while keeping the core meaning.",
      "c) \"-ness\" is an inflectional suffix because it changes the tense.",
      "d) The sentence becomes grammatically incorrect because nouns cannot replace adjectives."
    ],
    a: 1
  },
  {
    q: "Assertion: Adding -ed to talk (talk → talked) is an inflectional suffix.\nReason: It changes talk into a noun.\n\nChoose the best assessment:",
    o: [
      "a) Both the Assertion and the Reason are correct, and the Reason correctly explains the Assertion.",
      "b) Both the Assertion and the Reason are correct, but the Reason does not explain the Assertion.",
      "c) The Assertion is correct, but the Reason is incorrect because \"-ed\" changes only the tense; \"talked\" remains a verb.",
      "d) Both the Assertion and the Reason are wrong."
    ],
    a: 2
  }
];

let current=0, score=0, attempt=0, timer, timeLeft=45;
let imageViewed = false;

setTimeout(()=>{
  let splash = document.getElementById("splash");
  if(splash.classList.contains("active")){
    splash.classList.remove("active");
    document.getElementById("intro").classList.add("active");
  }
}, 2500);

function beginQuiz(){
  document.getElementById("intro").classList.remove("active");
  evaluateStep();
}

function evaluateStep() {
  if (current >= questions.length) {
    showResult();
    return;
  }
  let q = questions[current];
  if(q.imageTrigger && !imageViewed) {
    showImage(q.imageTrigger);
  } else {
    imageViewed = false;
    show("quiz");
    loadQuestion();
  }
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showImage(triggerId){
  show("imageScreen");
  let img="", txt="";

  if(triggerId === 1){
    img="assets/picture1.png";
    txt="Read the Science Fair Poster carefully before answering Questions 1–3.";
  } else if(triggerId === 2){
    img="assets/picture2.png";
    txt="Observe the picture carefully before answering the question.";
  } else if(triggerId === 3){
    img="assets/picture3.png";
    txt="Observe the picture carefully before answering the question.";
  } else if(triggerId === 4){
    img="assets/picture4.png";
    txt="Observe the picture carefully before answering the question.";
  }

  document.getElementById("caseImage").src=img;
  document.getElementById("imageText").innerText=txt;
}

function continueFromImage(){
  imageViewed = true;
  evaluateStep();
}

function loadQuestion(){
  attempt=0;
  timeLeft=45;
  clearInterval(timer);

  let q = questions[current];
  document.getElementById("qno").innerText = current+1;
  document.getElementById("question").innerText = q.q;
  document.getElementById("msg").innerText = "";
  document.getElementById("msg").style.color = "unset";

  let opt="";
  q.o.forEach((v,i)=>{
    opt+=`<button class='option' onclick='check(${i}, this)'>${escapeHtml(v)}</button>`;
  });

  document.getElementById("options").innerHTML=opt;

  updateProgress();
  startTimer();
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function startTimer(){
  document.getElementById("time").innerText = timeLeft;
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText=timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      check(-1, null);
    }
  },1000);
}

function check(i, btn){
  let q = questions[current];
  let msg = document.getElementById("msg");
  let options = document.querySelectorAll(".option");

  if(i === q.a){
    clearInterval(timer);
    document.querySelectorAll(".option").forEach(el => el.classList.add("disabled"));
    btn.classList.add("correct");
    try { document.getElementById("correctSound").play(); } catch(e){}
    msg.innerText = "✨ Excellent! Correct Answer.";
    msg.style.color = "var(--correct)";
    score++;
    updateProgress();
    setTimeout(nextQ, 1200);
  } else {
    try { document.getElementById("wrongSound").play(); } catch(e){}
    attempt++;
    if(btn) btn.classList.add("wrong");

    if(attempt === 1 && i !== -1){
      msg.innerText = "✕ Not quite. Try one more time!";
      msg.style.color = "var(--wrong)";
      if(btn) {
        setTimeout(() => { btn.classList.remove("wrong"); }, 800);
      }
    } else {
      clearInterval(timer);
      document.querySelectorAll(".option").forEach(el => el.classList.add("disabled"));
      msg.innerText = "Moving forward...";
      msg.style.color = "var(--text-muted)";
      if(options[q.a]) options[q.a].classList.add("correct");
      setTimeout(nextQ, 1500);
    }
  }
}

function nextQ(){
  current++;
  evaluateStep();
}

function updateProgress(){
  document.getElementById("score").innerText = score;
  let p = (current / questions.length) * 100;
  document.getElementById("bar").style.width = p + "%";
}

function showResult(){
  show("result");
  let percent = Math.round((score / questions.length) * 100);
  document.getElementById("finalScore").innerText = `${score}/15`;
  
  let msg = document.getElementById("result").querySelector("h3");
  if(percent >= 80) msg.innerText = "Incredible Job! 🏆";
  else if(percent >= 50) msg.innerText = "Good Effort! 👍";
  else msg.innerText = "Keep Practicing! 📝";
}
</script>
</body>
</html>
