<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Builder Mission</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f6ff;
overflow:hidden;
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{display:flex;}

/* SPLASH */
#splash{
background:white;
opacity:0;
animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

#splash img{
width:220px;
}

/* INTRO */
#intro{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
font-size:26px;
font-weight:bold;
animation:fadeIn 0.5s;
}

/* BRIEFING */
#brief{
background:#eef2ff;
padding:20px;
}

.card{
background:white;
padding:18px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
max-width:90%;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
margin-top:20px;
padding:14px 25px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.95);
}

/* GAME */
#game{
display:none;
padding:10px;
}

.topbar{
display:flex;
justify-content:space-between;
background:#1e3a8a;
color:white;
padding:10px;
border-radius:10px;
}

.qbox{
background:white;
margin-top:10px;
padding:14px;
border-radius:12px;
}

.q{
font-weight:bold;
margin-bottom:10px;
font-size:15px;
}

.opt{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:2px solid #ddd;
background:white;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.opt:active{
transform:scale(0.97);
}

/* POPUP */
#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:10px 18px;
border-radius:10px;
color:white;
font-weight:bold;
display:none;
z-index:999;
}

.good{background:green;}
.bad{background:red;}

.tip{
background:#fff3cd;
color:#333;
padding:10px;
margin-top:10px;
border-radius:10px;
font-size:13px;
}

/* BADGE */
#badge{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#1e3a8a;
color:white;
padding:10px 15px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
<img src="g6/ch2/Capitalisation_and_Punctuation/assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen">
🧠 WORD BUILDER MISSION<br><br>
Prefix & Suffix Adventure
</div>

<!-- BRIEFING -->
<div id="brief" class="screen">
<div class="card">
<div class="title">🧪 SCIENCE FAIR MISSION</div>

Can you help your team become<br><b>WORD BUILDERS?</b><br><br>

✔ 12 Challenges<br>
✔ 60 Seconds<br>
✔ Earn Word Wizard Badge

<button class="btn" onclick="startGame()">START MISSION</button>
</div>
</div>

<!-- GAME -->
<div id="game">

<div class="topbar">
<div>Score: <span id="score">0</span>/12</div>
<div>⏱ <span id="time">60</span></div>
</div>

<div class="qbox" id="qbox"></div>

</div>

<!-- POPUP -->
<div id="popup"></div>

<!-- BADGE -->
<div id="badge"></div>

<audio id="correct" src="g6/ch2/Capitalisation_and_Punctuation/assets/correct.mp3"></audio>
<audio id="wrong" src="g6/ch2/Capitalisation_and_Punctuation/assets/wrong.mp3"></audio>

<script>

let i=0,score=0,time=60,attempt=1;

/* SPLASH FLOW */
setTimeout(()=>{
document.getElementById("splash").classList.remove("active");
document.getElementById("intro").classList.add("active");

setTimeout(()=>{
document.getElementById("intro").classList.remove("active");
document.getElementById("brief").classList.add("active");
},3000);

},5000);

/* START */
function startGame(){
document.getElementById("brief").style.display="none";
document.getElementById("game").style.display="block";
loadQ();
timer();
}

/* TIMER */
function timer(){
setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) endGame();
},1000);
}

/* QUESTIONS */
const q=[
{
q:`Q1. Science Fair Poster – Fill all blanks:
Our team is working on water purification... redesign... creative thinking...`,
options:[
"A. purification / redesign / creative / impossible / interaction / invention",
"B. purifyment / redesign / creatious / unpossible / inventment / interact",
"C. purification / design / creative / impossible / interaction / inventing",
"D. purifying / redesign / creation / impossible / interaction / invention"
],
a:0,
tip:"Prefixes come before root words. Suffixes change word forms."
},
{
q:`Q2. What does 're-' in redesign mean?`,
options:[
"A. first time design",
"B. design again and improve",
"C. stop designing",
"D. design smaller"
],
a:1,
tip:"re- means again."
},
{
q:`Q3. developation vs interactation correction`,
options:[
"A. correct as written",
"B. development / interaction",
"C. both verbs",
"D. no change"
],
a:1,
tip:"-tion forms noun from verb."
},
{
q:`Q4. Instagram caption fill`,
options:[
"A. creativity / invention / inspirational / proud",
"B. creative / invent / inspiring / proudness",
"C. creativeness / inventation / proudful / inspire",
"D. creativity / inventment / inspireful / pride"
],
a:0,
tip:"-ity and -ion make nouns."
},
{
q:`Q5. -ed in verbs means?`,
options:[
"A. noun form",
"B. past tense",
"C. adjective",
"D. prefix"
],
a:1,
tip:"-ed shows past action."
},
{
q:`Q6. Correct im- word`,
options:[
"A. imhappy",
"B. impossible",
"C. imwrite",
"D. imgo"
],
a:1,
tip:"im- means not."
},
{
q:`Q7. Prefix meanings`,
options:[
"A. not again between not",
"B. again not between not",
"C. between again not not",
"D. not between again not"
],
a:0,
tip:"re=again, im=not, inter=between."
},
{
q:`Q8. Odd one out`,
options:[
"A. impossible",
"B. invisible",
"C. incomplete",
"D. interact"
],
a:3,
tip:"inter means between."
},
{
q:`Q9. creativeness error fix`,
options:[
"A. correct",
"B. use creative",
"C. use creativity",
"D. remove sentence"
],
a:1,
tip:"very needs adjective."
},
{
q:`Q10. happy → happiness means`,
options:[
"A. meaning change",
"B. adjective to noun",
"C. tense change",
"D. wrong sentence"
],
a:1,
tip:"-ness makes noun."
},
{
q:`Q11. Assertion Reason`,
options:[
"A. both correct linked",
"B. both correct not linked",
"C. assertion correct reason wrong",
"D. both wrong"
],
a:0,
tip:"-ed is inflectional."
}
];

/* LOAD */
function loadQ(){
attempt=1;
let x=q[i];

let html=`<div class='q'><b>${x.q}</b></div>`;

x.options.forEach((o,idx)=>{
html+=`<button class='opt' onclick='check(${idx})'>${o}</button>`;
});

document.getElementById("qbox").innerHTML=html;
}

/* CHECK */
function check(ans){
let x=q[i];

if(ans===x.a){
score++;
document.getElementById("score").innerText=score;
show("Correct ✔","good");
play("correct");
next();
}else{

if(attempt===1){
attempt++;
show("Try Again ✖","bad");
play("wrong");
}else{
show("Wrong ✔ Answer shown","bad");
showTip(x.tip);
next();
}
}
}

/* TIP */
function showTip(t){
let tip=document.createElement("div");
tip.className="tip";
tip.innerText="💡 " + t;
document.querySelector(".qbox").appendChild(tip);
}

/* POPUP */
function show(msg,type){
let p=document.getElementById("popup");
p.innerText=msg;
p.className=type;
p.style.display="block";
setTimeout(()=>p.style.display="none",900);
}

/* AUDIO */
function play(id){
document.getElementById(id).play().catch(()=>{});
}

/* NEXT */
function next(){
setTimeout(()=>{
i++;
if(i<q.length) loadQ();
else endGame();
},800);
}

/* END */
function endGame(){
document.getElementById("game").innerHTML=
`<div class="card">
<h2>🎉 Mission Complete</h2>
<p>Score: ${score}/12</p>
</div>`;

if(score>=10){
showBadge("🏆 Word Wizard Badge");
}else if(score>=7){
showBadge("🥈 Word Builder Badge");
}else{
showBadge("🥉 Word Learner Badge");
}
}

/* BADGE */
function showBadge(text){
let b=document.getElementById("badge");
b.innerText=text;
b.style.display="block";
}

</script>

</body>
</html>
