<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 6 CBQ - Nouns Mission</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef3ff;
overflow:hidden;
}

/* FULL SCREEN SCREENS */
.screen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{display:flex;}

/* LOGO */
#logoScreen{
background:white;
}

#logoScreen img{
width:240px;
animation:pop 1s ease;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* TOPIC */
#topicScreen{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
font-size:30px;
font-weight:bold;
padding:20px;
}

/* START */
#startScreen{
background:#f4f7ff;
}

button{
padding:14px 24px;
font-size:18px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
cursor:pointer;
}

/* GAME AREA */
#game{
display:none;
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
background:#1e3a8a;
color:white;
padding:12px;
border-radius:10px;
}

.card{
background:white;
margin-top:15px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* WHATSAPP STYLE BOX */
.chat{
background:#e8f0ff;
padding:12px;
border-left:5px solid #1e3a8a;
border-radius:10px;
font-size:14px;
line-height:1.5;
white-space:pre-line;
margin-bottom:10px;
text-align:left;
}

/* QUESTION */
.question{
font-weight:bold;
margin:10px 0;
text-align:left;
}

/* OPTIONS */
.option{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:2px solid #ddd;
background:#fff;
cursor:pointer;
text-align:left;
transition:0.2s;
}

.option:hover{
background:#f1f5ff;
transform:scale(1.01);
}

/* RESULT */
#result{
display:none;
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
}

/* CONFETTI */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<!-- 1. LOGO SCREEN -->
<div id="logoScreen" class="screen active">
<img src="g6/chp1/nouns/assets/innovine-logo.png">
</div>

<!-- 2. TOPIC SCREEN -->
<div id="topicScreen" class="screen">
🕵️‍♂️ NOUNS MISSION<br>
Delhi Trip Investigation
</div>

<!-- 3. START SCREEN -->
<div id="startScreen" class="screen">
<button onclick="startGame()">Start Mission</button>
</div>

<!-- GAME -->
<div id="game">

<div class="header">
<div>Score: <span id="score">0</span>/12</div>
<div>⏱ <span id="time">60</span>s</div>
<button onclick="toggleMute()">🔊</button>
</div>

<div class="card" id="card"></div>

</div>

<!-- RESULT -->
<div id="result"></div>

<audio id="correctSound" src="g6/chp1/nouns/assets/correct.mp3"></audio>
<audio id="wrongSound" src="g6/chp1/nouns/assets/wrong.mp3"></audio>
<audio id="clapSound" src="g6/chp1/nouns/assets/clapping.mp3"></audio>

<canvas id="confetti"></canvas>

<script>

let i=0,score=0,attempts=2,time=60,mute=false;

const questions=[

{
chat:true,
q:`Q1:
Riya: Hey! Are you coming to the Delhi trip next week?

Aarav: Yes! The school has already booked the tickets for all of us and our teachers.
I’m packing my travel kit and a thank-you card for our guide.

Riya: A flock of pigeons was sitting on our school roof this morning — so cool!

Aarav: Don’t forget — bring courage. The heights at Qutub Minar are scary.

Riya: Our class (all 42 students) is going together. It’ll be fun!`,
options:[
"A: Common noun",
"B: Proper noun",
"C: Collective noun",
"D: Abstract noun"
],
answer:1
},

{
q:`Q2:
Aarav says he is packing a "travel kit". What kind of noun is "kit"?`,
options:[
"A: Abstract noun",
"B: Collective noun",
"C: Material noun",
"D: Proper noun"
],
answer:1
},

{
q:`Q3:
A flock of pigeons was sitting on our school roof. What kind of noun is "flock"?`,
options:[
"A: Common noun",
"B: Abstract noun",
"C: Material noun",
"D: Collective noun"
],
answer:3
},

{
q:`Q4:
Bring courage. What kind of noun is "courage"?`,
options:[
"A: Material noun",
"B: Abstract noun",
"C: Collective noun",
"D: Proper noun"
],
answer:1
},

{
q:`Q5:
Class (all 42 students) is a ____ noun.`,
options:["collective","proper","material","abstract"],
answer:0
},

{
q:`Q6:
Which sentence uses uncountable nouns correctly?`,
options:[
"I bought two rices",
"I bought rice and water bottles",
"I bought a rice",
"Rice are good"
],
answer:1
},

{
q:`Q7:
Bangalore vs city difference`,
options:[
"Both proper nouns",
"Both common nouns",
"Proper vs common noun",
"Both abstract nouns"
],
answer:2
},

{
q:`Q8:
Sort: mango, rice, courage, trophy`,
options:["C U A C","C C U U","U C A C","C U C U"],
answer:0
},

{
q:`Q9:
Classify nouns correctly`,
options:["A","B","C","D"],
answer:2
},

{
q:`Q10:
Odd one out`,
options:["Mango","Courage","Rice","Water"],
answer:1
},

{
q:`Q11:
Identify error`,
options:["A","B","C","D"],
answer:0
},

{
q:`Q12:
Gaggle explanation`,
options:["A","B","C","D"],
answer:2
}

];

/* FLOW */
setTimeout(()=>{
document.getElementById("logoScreen").classList.remove("active");
document.getElementById("topicScreen").classList.add("active");

setTimeout(()=>{
document.getElementById("topicScreen").classList.remove("active");
document.getElementById("startScreen").classList.add("active");
},3000);

},5000);

function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
loadQ();
startTimer();
}

function startTimer(){
let t=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0){
clearInterval(t);
endGame();
}
},1000);
}

function loadQ(){
attempts=2;
let q=questions[i];

let html="";

if(q.chat){
html+=`<div class='chat'>${q.q}</div>`;
}else{
html+=`<div class='question'>${q.q}</div>`;
}

q.options.forEach((o,idx)=>{
html+=`<button class='option' onclick='check(${idx})'>${o}</button>`;
});

document.getElementById("card").innerHTML=html;
}

function check(ans){
let q=questions[i];

if(ans===q.answer){
score++;
document.getElementById("score").innerText=score;
play("correct");
confetti();
next();
}else{
attempts--;
play("wrong");
if(attempts<=0) next();
}
}

function next(){
i++;
if(i>=questions.length){
endGame();
}else{
loadQ();
}
}

function endGame(){
document.getElementById("game").innerHTML=
`<h2>Mission Completed 🕵️‍♂️</h2>
<p>Score: ${score}/12</p>`;
}

/* SOUND (FIXED SAFE PLAY) */
function play(type){
if(mute) return;
let audio=document.getElementById(type+"Sound");
audio.currentTime=0;
audio.play().catch(()=>{});
}

function toggleMute(){
mute=!mute;
}

/* CONFETTI */
function confetti(){
for(let i=0;i<35;i++){
let c=document.createElement("div");
c.style.position="fixed";
c.style.left=Math.random()*100+"%";
c.style.top="-10px";
c.style.width="6px";
c.style.height="6px";
c.style.background="gold";
document.body.appendChild(c);

let f=setInterval(()=>{
c.style.top=(parseInt(c.style.top||0)+5)+"px";
if(parseInt(c.style.top)>window.innerHeight){
clearInterval(f);
c.remove();
}
},20);
}
}

</script>

</body>
</html>
