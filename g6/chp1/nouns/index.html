<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouns Mission</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef3ff;
overflow:hidden;
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{display:flex;}

/* LOGO */
#logoScreen{
background:white;
}

#logoScreen img{
width:220px;
}

/* TOPIC (FIXED TITLE) */
#topicScreen{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
font-size:34px;
font-weight:bold;
}

.sub{
font-size:16px;
margin-top:8px;
opacity:0.9;
}

/* START */
#startScreen{
background:#f4f7ff;
}

button{
padding:14px 22px;
font-size:18px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
cursor:pointer;
}

/* GAME */
#game{
display:none;
padding:10px;
}

.header{
display:flex;
justify-content:space-between;
background:#1e3a8a;
color:white;
padding:10px;
border-radius:10px;
font-size:14px;
}

/* CARD FIXED (NO SCROLL DESIGN) */
.card{
background:white;
margin-top:10px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
max-height:75vh;
overflow:hidden;
}

/* CHAT SMALLER */
.chat{
background:#e8f0ff;
padding:8px;
border-left:4px solid #1e3a8a;
border-radius:8px;
font-size:12px;
line-height:1.3;
white-space:pre-line;
margin-bottom:8px;
}

/* QUESTION SMALLER */
.question{
font-size:14px;
font-weight:bold;
margin:6px 0;
line-height:1.3;
}

/* OPTIONS COMPACT */
.option{
display:block;
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:2px solid #ddd;
background:#fff;
cursor:pointer;
text-align:left;
font-size:13px;
}

/* REMOVE SCROLLING SPACE ISSUE */
.option:hover{
background:#f1f5ff;
}

/* RESULT */
#result{
display:none;
text-align:center;
padding:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logoScreen" class="screen active">
<img src="g6/chp1/nouns/assets/innovine-logo.png">
</div>

<!-- TOPIC (FIXED TEXT) -->
<div id="topicScreen" class="screen">
NOUNS
<div class="sub">🕵️‍♂️ Mission Challenge</div>
</div>

<!-- START -->
<div id="startScreen" class="screen">
<button onclick="startGame()">Start Mission</button>
</div>

<!-- GAME -->
<div id="game">
<div class="header">
<div>Score: <span id="score">0</span>/12</div>
<div>⏱ <span id="time">60</span>s</div>
<button onclick="toggleMute()">🔊</button>
</div>

<div class="card" id="card"></div>
</div>

<audio id="correctSound" src="g6/chp1/nouns/assets/correct.mp3"></audio>
<audio id="wrongSound" src="g6/chp1/nouns/assets/wrong.mp3"></audio>

<script>

let i=0,score=0,attempts=2,time=60,mute=false;

/* QUESTIONS (UNCHANGED LOGIC) */
let questions=[

{
type:"chat",
q:`Q1:
Riya: Hey! Are you coming to the Delhi trip next week?

Aarav: Yes! The school has booked tickets for all of us.

Riya: A flock of pigeons was sitting on our roof.

Aarav: Bring courage.

Riya: Our class (42 students) is going together.`,
options:[
"Common noun",
"Proper noun",
"Collective noun",
"Abstract noun"
],
answer:1
},

{
q:"Q2: Kit is a ____ noun.",
options:["Abstract","Collective","Material","Proper"],
answer:1
},

{
q:"Q3: Flock of pigeons is ____ noun.",
options:["Common","Abstract","Material","Collective"],
answer:3
},

{
q:"Q4: Courage is ____ noun.",
options:["Material","Abstract","Collective","Proper"],
answer:1
},

{
q:"Q5: Class is ____ noun.",
options:["Collective","Proper","Material","Abstract"],
answer:0
},

{
q:"Q6: Correct uncountable usage",
options:[
"I bought rices",
"I bought rice and water bottles",
"I bought a rice",
"Rice are good"
],
answer:1
},

{
q:"Q7: Bangalore vs city",
options:["Both proper","Both common","Proper vs common","Both abstract"],
answer:2
},

{
q:"Q8: Sort nouns",
options:["C U A C","C C U U","U C A C","C U C U"],
answer:0
},

{
q:"Q9: Classify nouns",
options:["A","B","C","D"],
answer:2
},

{
q:"Q10: Odd one out",
options:["Mango","Courage","Rice","Water"],
answer:1
},

{
q:"Q11: Error question",
options:["A","B","C","D"],
answer:0
},

{
q:"Q12: Gaggle explanation",
options:["A","B","C","D"],
answer:2
}

];

/* FLOW */
setTimeout(()=>{
document.getElementById("logoScreen").classList.remove("active");
document.getElementById("topicScreen").classList.add("active");

setTimeout(()=>{
document.getElementById("topicScreen").classList.remove("active");
document.getElementById("startScreen").classList.add("active");
},3000);

},5000);

function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
loadQ();
startTimer();
}

function startTimer(){
setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) endGame();
},1000);
}

function loadQ(){
attempts=2;
let q=questions[i];

let html="";

if(q.type==="chat"){
html+=`<div class='chat'>${q.q}</div>`;
}else{
html+=`<div class='question'>${q.q}</div>`;
}

q.options.forEach((o,idx)=>{
html+=`<button class='option' onclick='check(${idx})'>${o}</button>`;
});

document.getElementById("card").innerHTML=html;
}

function check(ans){
let q=questions[i];

if(ans===q.answer){
score++;
play("correct");
next();
}else{
attempts--;
play("wrong");
if(attempts<=0) next();
}
}

function next(){
i++;
if(i>=questions.length){
endGame();
}else{
loadQ();
}
}

function endGame(){
document.getElementById("game").innerHTML=
`<h2>Mission Completed 🕵️‍♂️</h2><p>Score: ${score}/12</p>`;
}

function play(type){
if(mute) return;
document.getElementById(type+"Sound").play().catch(()=>{});
}

function toggleMute(){
mute=!mute;
}

</script>

</body>
</html>
