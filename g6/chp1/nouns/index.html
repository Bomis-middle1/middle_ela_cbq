<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade 6 English - Nouns CBQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef7ff;
overflow:hidden;
}

/*---------------- Splash Screen ----------------*/

#splash{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

#splash img{
width:260px;
max-width:80%;
animation:zoomLogo 5s ease-in-out;
}

@keyframes zoomLogo{

0%{
transform:scale(.5);
opacity:0;
}

30%{
opacity:1;
}

80%{
transform:scale(1.08);
}

100%{
opacity:1;
}

}

/*---------------- Topic Screen ----------------*/

#topicScreen{
display:none;
position:fixed;
inset:0;
background:linear-gradient(135deg,#5b8cff,#8d59ff);
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:90;
}

#topicTitle{

font-size:58px;
font-weight:bold;
letter-spacing:8px;
animation:popTitle .8s infinite alternate;
text-shadow:0 0 25px gold;

}

#topicSub{

font-size:26px;
margin-top:20px;
}

@keyframes popTitle{

from{

transform:scale(1);

}

to{

transform:scale(1.1);

}

}

/*---------------- Start Screen ----------------*/

#startScreen{

display:none;

position:fixed;

inset:0;

background:linear-gradient(#dff4ff,#ffffff);

justify-content:center;

align-items:center;

flex-direction:column;

padding:25px;

text-align:center;

}

.card{

background:white;

padding:35px;

border-radius:25px;

width:95%;

max-width:700px;

box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.card h1{

font-size:40px;

color:#1b4ea3;

margin-bottom:15px;

}

.card h2{

font-size:28px;

margin-bottom:15px;

color:#ff5722;

}

.card p{

font-size:22px;

margin:10px 0;

}

button{

cursor:pointer;

border:none;

border-radius:15px;

font-size:24px;

padding:18px;

transition:.3s;

}

#startBtn{

background:#1f7cff;

color:white;

margin-top:25px;

width:280px;

}

#startBtn:hover{

transform:scale(1.05);

}

/*---------------- Quiz ----------------*/

#game{

display:none;

height:100vh;

padding:15px;

}

.topBar{

display:flex;

justify-content:space-between;

align-items:center;

background:#1d4ed8;

color:white;

padding:15px;

border-radius:15px;

font-size:22px;

margin-bottom:15px;

}

#muteBtn{

background:white;

color:#1d4ed8;

padding:10px 18px;

font-size:18px;

}

#questionCard{

background:white;

border-radius:25px;

padding:20px;

height:calc(100vh - 120px);

display:flex;

flex-direction:column;

justify-content:space-between;

box-shadow:0 12px 30px rgba(0,0,0,.2);

}

#question{

font-size:26px;

line-height:1.45;

font-weight:bold;

color:#0f172a;

overflow:auto;

padding-right:10px;

}

#options{

display:grid;

grid-template-columns:1fr;

gap:15px;

margin-top:20px;

}

.option{

background:#e7f1ff;

border:3px solid transparent;

padding:18px;

font-size:21px;

border-radius:18px;

cursor:pointer;

transition:.25s;

text-align:left;

}

.option:hover{

background:#d5e8ff;

transform:translateY(-2px);

}

.correct{

background:#4caf50!important;

color:white;

animation:correctPulse .5s;

}

@keyframes correctPulse{

50%{

transform:scale(1.05);

}

}

.wrong{

background:#ef5350!important;

color:white;

animation:shake .35s;

}

@keyframes shake{

0%{transform:translateX(-6px);}
25%{transform:translateX(6px);}
50%{transform:translateX(-6px);}
75%{transform:translateX(6px);}
100%{transform:translateX(0);}

}

/*---------------- Result ----------------*/

#result{

display:none;

position:fixed;

inset:0;

background:linear-gradient(#e0f7ff,#ffffff);

justify-content:center;

align-items:center;

padding:20px;

}

.resultCard{

background:white;

padding:40px;

border-radius:25px;

width:95%;

max-width:650px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.resultCard h1{

font-size:48px;

color:#1565c0;

margin-bottom:20px;

}

.resultCard p{

font-size:28px;

margin:15px 0;

}

#restartBtn{

background:#1565c0;

color:white;

width:280px;

margin-top:20px;

}

/*---------------- Confetti Canvas ----------------*/

#confetti{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

pointer-events:none;

z-index:999;

}

/*---------------- Mobile ----------------*/

@media(max-width:768px){

#question{

font-size:21px;

}

.option{

font-size:18px;

padding:15px;

}

.topBar{

font-size:18px;

}

.card h1{

font-size:30px;

}

.card h2{

font-size:22px;

}

.card p{

font-size:19px;

}

}

</style>
</head>

<body>

<!-- Splash -->

<div id="splash">

<img src="assets/innovine-logo.png" alt="Innovine Logo">

</div>

<!-- Topic -->

<div id="topicScreen">

<div id="topicTitle">📚 NOUNS ✨</div>

<div id="topicSub">Grade 6 English</div>

</div>

<!-- Start -->

<div id="startScreen">

<div class="card">

<h1>Grade 6 English</h1>

<h2>Chapter 1 : NOUNS</h2>

<p>📝 12 Questions</p>

<p>⏱ 60 Seconds</p>

<p>⭐ One Retry for Every Wrong Answer</p>

<button id="startBtn">▶ START GAME</button>

</div>

</div>

<!-- Quiz -->

<div id="game">

<div class="topBar">

<div id="scoreBox">Score : 0 / 12</div>

<div id="timerBox">⏱ 60</div>

<button id="muteBtn">🔊</button>

</div>

<div id="questionCard">

<div id="question"></div>

<div id="options"></div>

</div>

</div>

<!-- Result -->

<div id="result">

<div class="resultCard">

<h1>Quiz Finished</h1>

<p id="finalScore"></p>

<p id="resultMsg"></p>

<button id="restartBtn">Play Again</button>

</div>

</div>

<canvas id="confetti"></canvas>

<script>/*==========================
  ASSETS & GAME VARIABLES
==========================*/

const correctSound = new Audio("assets/correct.mp3");
const wrongSound = new Audio("assets/wrong.mp3");
const clapSound = new Audio("assets/clapping.mp3");

let muted = false;

const splash = document.getElementById("splash");
const topicScreen = document.getElementById("topicScreen");
const startScreen = document.getElementById("startScreen");
const game = document.getElementById("game");
const result = document.getElementById("result");

const questionDiv = document.getElementById("question");
const optionsDiv = document.getElementById("options");

const timerBox = document.getElementById("timerBox");
const scoreBox = document.getElementById("scoreBox");

const finalScore = document.getElementById("finalScore");
const resultMsg = document.getElementById("resultMsg");

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const muteBtn = document.getElementById("muteBtn");

let currentQuestion = 0;
let score = 0;
let timeLeft = 60;
let timer;

let retryUsed = false;

/*==========================
 QUESTIONS
==========================*/

const questions = [

{
question:`Read the conversation carefully:

Riya: Hey! Are you coming to the Delhi trip next week?

Aarav: Yes! The school has already booked the tickets for all of us and our teachers. I'm packing my travel kit and a thank-you card for our guide.

Riya: A flock of pigeons was sitting on our school roof this morning.

Aarav: Don't forget—bring courage. The heights at Qutub Minar are scary.

Riya: Our class (all 42 students) is going together.

What kind of noun is "Delhi"?`,

options:[
"Common noun",
"Proper noun",
"Collective noun",
"Abstract noun"
],

answer:1

},

{

question:`Aarav says he is packing a travel kit.

Kit is a ____ noun.`,

options:[
"Abstract noun",
"Collective noun",
"Material noun",
"Proper noun"
],

answer:1

},

{

question:`Riya uses the phrase:

"a flock of pigeons"

What kind of noun is "flock"?`,

options:[
"Common noun",
"Abstract noun",
"Material noun",
"Collective noun"
],

answer:3

},

{

question:`Aarav tells Riya to

"Bring courage."

What kind of noun is "courage"?`,

options:[
"Material noun",
"Abstract noun",
"Collective noun",
"Proper noun"
],

answer:1

},

{

question:`Riya says:

"Our class (all 42 students) is going together."

Class is a ____ noun.`,

options:[
"Collective noun",
"Proper noun",
"Material noun",
"Abstract noun"
],

answer:0

},

{

question:`Which sentence uses uncountable nouns correctly?`,

options:[
"I bought two rices and three waters.",
"I bought two bags of rice and three bottles of water.",
"I bought a rice and a water.",
"Rice and water are countable so both can take plurals."
],

answer:1

},

{

question:`"Bangalore" is different from "city" because...`,

options:[
"Both are proper nouns.",
"Both are common nouns.",
"Bangalore is a proper noun, city is a common noun.",
"Bangalore is an abstract noun."
],

answer:2

},

{

question:`Sort:

mango, rice, courage, trophy`,

options:[
"mango & trophy (countable) | rice & courage (uncountable)",
"rice & courage (countable) | mango & trophy (uncountable)",
"mango & rice (countable) | courage & trophy (uncountable)",
"courage & trophy (countable) | mango & rice (uncountable)"
],

answer:0

},

{

question:`Classify:

honesty

gold

gaggle

Mumbai`,

options:[
"Abstract, Material, Collective, Proper",
"Material, Abstract, Proper, Collective",
"Collective, Material, Abstract, Proper",
"Proper, Collective, Material, Abstract"
],

answer:0

},

{

question:`Odd one out:

mango

courage

rice

water`,

options:[
"Mango",
"Courage",
"Rice",
"Water"
],

answer:1

},

{

question:`The team showed many braveries and won two trophys and one certificat.

Identify the correct correction.`,

options:[
"braveries → bravery; trophys → trophies; certificat → certificate",
"braveries → braver; trophys → trophies; certificat → certificates",
"braveries → brave; trophys → trophy; certificat → certification",
"No errors"
],

answer:0

},

{

question:`Rohan says "gaggle" is a proper noun because it starts a sentence.

What is correct?`,

options:[
"Rohan is correct.",
"Both are correct.",
"Rohan confuses capitalisation with noun type; gaggle is a collective noun.",
"Neither is correct."
],

answer:2

}

];

/*==========================
  STARTUP FLOW
==========================*/

setTimeout(()=>{

splash.style.display="none";

topicScreen.style.display="flex";

setTimeout(()=>{

topicScreen.style.display="none";

startScreen.style.display="flex";

},3000);

},5000);

/*==========================
 MUTE
==========================*/

muteBtn.onclick=()=>{

muted=!muted;

correctSound.muted=muted;
wrongSound.muted=muted;
clapSound.muted=muted;

muteBtn.innerHTML=muted?"🔇":"🔊";

};

/*==========================
 START GAME
==========================*/

startBtn.onclick=()=>{

startScreen.style.display="none";

game.style.display="block";

loadQuestion();

startTimer();

};

/*==========================
 TIMER
==========================*/

function startTimer(){

clearInterval(timer);

timeLeft=60;

timerBox.innerHTML="⏱ "+timeLeft;

timer=setInterval(()=>{

timeLeft--;

timerBox.innerHTML="⏱ "+timeLeft;

if(timeLeft<=0){

clearInterval(timer);

showResult();

}

},1000);

}

/*==========================
 LOAD QUESTION
==========================*/

function loadQuestion(){

retryUsed=false;

const q=questions[currentQuestion];

questionDiv.innerHTML=

"<b>Question "+(currentQuestion+1)+" of 12</b><br><br>"+q.question;

optionsDiv.innerHTML="";

q.options.forEach((opt,index)=>{

const btn=document.createElement("button");

btn.className="option";

btn.innerHTML=opt;

btn.onclick=()=>checkAnswer(index,btn);

optionsDiv.appendChild(btn);

});

scoreBox.innerHTML="Score : "+score+" / 12";

}

/*==========================
 CHECK ANSWER
==========================*/

function checkAnswer(selected,button){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll(".option");

buttons.forEach(b=>b.disabled=true);

if(selected===q.answer){

button.classList.add("correct");

correctSound.play();

clapSound.play();

score++;

scoreBox.innerHTML="Score : "+score+" / 12";

setTimeout(()=>{

launchConfetti();

nextQuestion();

},900);

}

else{

button.classList.add("wrong");

wrongSound.play();

if(!retryUsed){

retryUsed=true;

setTimeout(()=>{

buttons.forEach((b)=>{

b.disabled=false;

b.classList.remove("wrong");

});

},900);

}

else{

buttons[q.answer].classList.add("correct");

setTimeout(()=>{

nextQuestion();

},1200);

}

}
}/*==========================
 NEXT QUESTION
==========================*/

function nextQuestion(){

currentQuestion++;

if(currentQuestion>=questions.length){

showResult();

return;

}

loadQuestion();

}

/*==========================
 RESULT
==========================*/

function showResult(){

clearInterval(timer);

game.style.display="none";

result.style.display="flex";

finalScore.innerHTML=`You scored <b>${score}</b> out of <b>${questions.length}</b>`;

let percent=(score/questions.length)*100;

if(percent>=75){

resultMsg.innerHTML="🎉 <b>Good Job!</b>";

}
else if(percent>=40){

resultMsg.innerHTML="📘 <b>Review this chapter and try again.</b>";

}
else{

resultMsg.innerHTML="💪 <b>Let's practise more!</b>";

}

}

/*==========================
 RESTART
==========================*/

restartBtn.onclick=function(){

currentQuestion=0;

score=0;

timeLeft=60;

retryUsed=false;

result.style.display="none";

game.style.display="block";

loadQuestion();

startTimer();

};

/*==========================
 CONFETTI
==========================*/

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

let particles=[];

function resizeCanvas(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

function launchConfetti(){

particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,

y:-20,

r:Math.random()*8+4,

dx:(Math.random()-0.5)*8,

dy:Math.random()*4+3,

color:`hsl(${Math.random()*360},100%,50%)`

});

}

animateConfetti();

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();

ctx.fillStyle=p.color;

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fill();

p.x+=p.dx;

p.y+=p.dy;

});

particles=particles.filter(p=>p.y<canvas.height+30);

if(particles.length){

requestAnimationFrame(animateConfetti);

}else{

ctx.clearRect(0,0,canvas.width,canvas.height);

}

}

/*==========================
 PRELOAD AUDIO
==========================*/

correctSound.load();
wrongSound.load();
clapSound.load();

</script>

</body>
</html>
