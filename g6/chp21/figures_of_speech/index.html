<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 Figures of Speech</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fff1eb,#ace0f9);
overflow-x:hidden;
}

.screen{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:15px;
}

.active{display:flex;}

.logo{
width:220px;
animation:zoom 2s ease;
}

@keyframes zoom{
from{transform:scale(0.4);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.card{
background:white;
width:95%;
max-width:750px;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.q{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.option{
background:#f1f1f1;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.option:hover{background:#ddd;}

.correct{background:#2ecc71!important;color:white;}
.wrong{background:#e74c3c!important;color:white;}

.top{
display:flex;
justify-content:space-between;
width:100%;
max-width:750px;
margin-bottom:10px;
font-size:16px;
}

img{
max-width:100%;
border-radius:10px;
margin:10px 0;
}

#timer{
font-weight:bold;
color:#d63031;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div class="screen active" id="splash">
<img src="assets/innovine-logo.png" class="logo">
</div>

<!-- GAME -->
<div class="screen" id="game">

<div class="top">
<div>Score: <span id="score">0</span></div>
<div>⏱ <span id="timer">45</span></div>
<div>🔊 <input type="range" min="0" max="1" step="0.1" id="vol"></div>
</div>

<div class="card">
<div id="qbox"></div>
<div id="obox"></div>
<div id="exp"></div>
</div>

</div>

<!-- RESULT -->
<div class="screen" id="result">
<div class="card">
<h2>Final Result</h2>
<div id="final"></div>
<button onclick="location.reload()">Restart</button>
</div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

const questions = [
{
q:`You are writing a poem about a fast runner. Which sentence helps the reader imagine his speed by comparing it to something else using “like” or “as”?`,
o:["He is a lightning bolt on the track.","He runs as fast as the wind.","He ran to the finish line quickly.","The track was long and dusty."],
a:1,
exp:"Simile uses 'as fast as' comparison."
},
{
q:`You are describing a very cold room. Which sentence describe the room by directly comparing it to something else without using "like" or "as".`,
o:["The room was like a refrigerator.","The room was as cold as ice.","The room was an icebox.","It was very cold in the room."],
a:2,
exp:"Metaphor makes direct comparison without 'like/as'."
},
{
q:`You are writing a poem about a windy evening: "The wind whistled through the trees and tugged at the curtains." Which figure of speech is being used?`,
o:["Hyperbole","Alliteration","Personification","Onomatopoeia"],
a:2,
exp:"Wind is given human actions → Personification."
},
{
q:`You are extremely hungry after football practice. "I am so hungry I could eat a horse!" What figure of speech is this?`,
o:["Personification","Hyperbole","Idiom","Metaphor"],
a:1,
exp:"Extreme exaggeration → Hyperbole."
},
{
q:`"Break a leg!" What does it mean?`,
o:["I hope you get injured.","Good luck with your performance.","Dance faster.","Sit down."],
a:1,
exp:"Idiomatic expression meaning good luck."
},

{
q:`[picture1] Identify figures of speech in the poem.`,
o:["Simile & Hyperbole","Personification & Alliteration","Metaphor & Onomatopoeia","Alliteration & Simile"],
a:1,
img:"picture1.png",
exp:"Personification + Alliteration observed."
},

{
q:`[picture2] What figure of speech is shown?`,
o:["Alliteration","Personification","Onomatopoeia","Hyperbole"],
a:2,
img:"picture2.png",
exp:"Sound words like BUZZ, CRASH → Onomatopoeia."
},

{
q:`Which sentence repeats starting sounds?`,
o:["Stars winked at me.","Laughter is medicine.","Seven slippery snakes slid slowly.","Million times told."],
a:2,
exp:"Repeated 's' sound → Alliteration."
},

{
q:`Fire swallowed forest / I've told you thousand times`,
o:["Simile/Metaphor","Personification/Hyperbole","Alliteration/Idiom","Onomatopoeia/Personification"],
a:1,
exp:"Fire acts human + exaggeration."
},

{
q:`Simile vs Metaphor classification`,
o:["Simile: P,R Metaphor: Q,S","Simile: P,Q Metaphor: R,S","Simile: Q,S Metaphor: P,R","Simile: R,S Metaphor: P,Q"],
a:2,
exp:"Like/as = simile, direct = metaphor."
},

{
q:`Classify figures of speech`,
o:["1-P,2-I,3-H,4-O","1-H,2-O,3-I,4-P","1-I,2-P,3-O,4-H","1-O,2-H,3-P,4-I"],
a:2,
exp:"Correct classification logic."
},

{
q:`Odd one out`,
o:["Stars danced","Ran like wind","Million times","Sun rises east"],
a:3,
exp:"Only literal sentence."
},

{
q:`Wrong label identification`,
o:["a","b","c","d"],
a:1,
exp:"Classroom was a zoo → Metaphor not simile."
},

{
q:`Effect of simile change`,
o:["Wrong grammar","Slower meaning","More vivid description","Becomes metaphor"],
a:2,
exp:"Simile improves imagery."
},

{
q:`Buzzing bee assertion`,
o:["Both correct & explained","Both correct no link","Assertion correct","Both wrong"],
a:0,
exp:"Buzz mimics sound → onomatopoeia."
}
];

let i=0,score=0,attempt=0,timer=45,interval;

const qbox=document.getElementById("qbox");
const obox=document.getElementById("obox");
const exp=document.getElementById("exp");

function start(){
document.getElementById("splash").classList.remove("active");
document.getElementById("game").classList.add("active");
load();
startTimer();
}

function load(){
clearInterval(interval);
timer=45;
attempt=0;

let q=questions[i];

qbox.innerHTML=q.q;
obox.innerHTML="";
exp.innerHTML="";
document.getElementById("score").innerText=score;

if(q.img){
let im=document.createElement("img");
im.src="assets/"+q.img;
qbox.appendChild(im);
}

q.o.forEach((o,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=o;
d.onclick=()=>check(idx,q,d);
obox.appendChild(d);
});
}

function check(idx,q,el){

if(idx===q.a){
el.classList.add("correct");
score++;
document.getElementById("correct").play();
exp.innerHTML=q.exp;
setTimeout(next,1200);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrong").play();

if(attempt===1){
exp.innerHTML="Try again!";
}
else{
exp.innerHTML="❌ Correct Answer: <b>"+q.o[q.a]+"</b><br>📘 "+q.exp;
setTimeout(next,2000);
}
}
}

function next(){
i++;
if(i<questions.length)load();
else end();
}

function startTimer(){
interval=setInterval(()=>{
timer--;
document.getElementById("timer").innerText=timer;
if(timer<=0)next();
},1000);
}

function end(){
document.getElementById("game").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("clap").play();
document.getElementById("final").innerHTML=
"Score: "+score+"/"+questions.length;
}

window.onload=()=>{
setTimeout(start,5000);
};

document.getElementById("vol").oninput=(e)=>{
document.querySelectorAll("audio").forEach(a=>a.volume=e.target.value);
};

</script>

</body>
</html>
