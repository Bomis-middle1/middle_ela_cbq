<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Position & Sequence of Adverbs Mastery Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --bg-gradient: linear-gradient(135deg, #eef2f6 0%, #f1f5f9 50%, #e2e8f0 100%);
    --surface: rgba(255, 255, 255, 0.95);
    --text-main: #1e293b;
    --text-muted: #64748b;
    --correct: #10b981;
    --correct-bg: #ecfdf5;
    --wrong: #ef4444;
    --wrong-bg: #fef2f2;
    --hint-color: #d97706;
    --border-radius: 16px;
    --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 10px 25px -5px rgba(79, 70, 229, 0.1), 0 8px 16px -6px rgba(79, 70, 229, 0.05);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
    background: var(--bg-gradient);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
}

/* APP CONTAINERS & SCREENS */
.screen-layout {
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    text-align: center;
    display: none;
    animation: screenReveal 0.4s ease forwards;
}

#splash {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#splash img {
    width: 180px;
    height: auto;
    margin-bottom: 24px;
    animation: smoothPop 2.5s ease-in-out infinite;
}

#splash h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: #0f172a;
    line-height: 1.3;
    margin-bottom: 24px;
}

#splash b {
    color: var(--primary);
    font-size: 2.1rem;
    display: block;
    margin-top: 6px;
}

@keyframes smoothPop {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
    50% { transform: scale(1.04); filter: drop-shadow(0 12px 20px rgba(79,70,229,0.15)); }
}

@keyframes screenReveal {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* TOP STATUS PANELS */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 16px;
    gap: 12px;
}

.badge {
    background: #ffffff;
    padding: 8px 16px;
    border-radius: 30px;
    box-shadow: var(--shadow-sm);
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    border: 1px solid #e2e8f0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

/* PROGRESS METRICS */
.progress-container {
    background: #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
    height: 8px;
    width: 100%;
    margin-bottom: 20px;
}

.progress {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #8b5cf6);
    width: 0%;
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.score-strip {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
}

.score-strip .badge {
    flex: 1;
    justify-content: center;
}

/* MEDIA CONTENT */
.image-box {
    width: 100%;
    margin-bottom: 20px;
    display: none;
}

.image-box img {
    width: 100%;
    max-height: 240px;
    object-fit: contain;
    border-radius: var(--border-radius);
    border: 1px solid #e2e8f0;
    background: #f8fafc;
    padding: 6px;
}

/* QUESTION CARD */
.question {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.5;
    color: #0f172a;
    margin-bottom: 16px;
    text-align: left;
}

/* FEEDBACK HELP TEXT */
.feedback-box {
    text-align: left;
    margin-bottom: 16px;
    font-size: 0.98rem;
    font-weight: 600;
    min-height: 54px;
    line-height: 1.4;
}

/* OPTIONS GRID */
.options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
}

.option {
    padding: 14px 18px;
    border-radius: var(--border-radius);
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    cursor: pointer;
    text-align: left;
    font-size: 1rem;
    font-weight: 600;
    color: #334155;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.option:hover {
    transform: translateY(-2px);
    border-color: var(--primary);
    background: #f5f3ff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.08);
}

.option.correct {
    background: var(--correct-bg) !important;
    border-color: var(--correct) !important;
    color: #065f46;
    transform: none !important;
    box-shadow: none !important;
}

.option.wrong {
    background: var(--wrong-bg) !important;
    border-color: var(--wrong) !important;
    color: #991b1b;
    animation: structuralShake 0.4s ease-in-out;
    transform: none !important;
    box-shadow: none !important;
}

@keyframes structuralShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
}

.disabled-node {
    pointer-events: none;
    opacity: 0.5;
}

.lock-clicks {
    pointer-events: none;
}

/* SCORE SUMMARY PANEL */
#scoreScreen h1 {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 12px;
}

#finalScore {
    font-size: 3.8rem;
    font-weight: 800;
    color: var(--primary);
    margin: 16px 0;
}

#remark {
    font-size: 1.15rem;
    font-weight: 700;
    color: #475569;
    margin-bottom: 32px;
}

/* CONTROL ELEMENT ACTIONS */
.btn-primary {
    background: var(--primary);
    color: #ffffff;
    font-size: 1rem;
    font-weight: 700;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
    transition: all 0.2s ease;
}

.btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
}

.btn-secondary {
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
    padding: 6px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-secondary:hover {
    background: #f1f5f9;
    color: var(--text-main);
}

.footer {
    margin-top: 32px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
}

@media(max-width:540px){
    body { padding: 12px; }
    .screen-layout { padding: 24px 16px; }
}
</style>
</head>

<body>

<!-- SPLASH INTRO SCREEN -->
<div id="splash" class="screen-layout" style="display: flex;">
    <img src="assets/innovine-logo.png" alt="Innovine Logo" onerror="this.style.display='none'">
    <h1>
        English Grammar Mastery
        <b>Position & Sequence of Adverbs</b>
    </h1>
    <button class="btn-primary" onclick="startGameSession()">Start Challenge</button>
</div>

<!-- MAIN SYSTEM DESK RUNTIME -->
<div id="game" class="screen-layout">
    <div class="top-bar">
        <div class="badge" id="progressText">Question 1 of 12</div>
        <button class="btn-secondary" onclick="restartGame()">Restart</button>
    </div>

    <div class="progress-container">
        <div class="progress" id="progressBar"></div>
    </div>

    <div class="score-strip">
        <div class="badge" style="background:#f0fdf4; color:#15803d; border-color:#bbf7d0;">⭐ Points: &nbsp;<span id="score">0</span></div>
        <div class="badge" style="background:#fef2f2; color:#b91c1c; border-color:#fee2e2;">✕ Missed: &nbsp;<span id="wrong">0</span></div>
    </div>

    <div id="imageBox" class="image-box"></div>
    <div class="question" id="question"></div>
    <div id="feedbackBox" class="feedback-box"></div>
    <div class="options" id="options"></div>
</div>

<!-- RESULTS BOARD COMPONENT -->
<div id="scoreScreen" class="screen-layout">
    <h1>🎉 Challenge Completed!</h1>
    <div id="finalScore">0/12</div>
    <p id="remark">Keep Practicing!</p>
    <button class="btn-primary" onclick="restartGame()">Play Again</button>
    <div class="footer">Innovine Learning Portal</div>
</div>

<!-- PIEPLINE PIPELINE SOURCE -->
<audio id="introAudio" src="assets/intro.mp3" preload="auto"></audio>
<audio id="clickAudio" src="assets/click.mp3" preload="auto"></audio>
<audio id="correctAudio" src="assets/correct.mp3" preload="auto"></preload>
<audio id="wrongAudio" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapAudio" src="assets/clapping.mp3" preload="auto"></audio>
<audio id="gameoverAudio" src="assets/gameover.mp3" preload="auto"></audio>

<script>
/* ================= DATABASE ================= */
const questions = [
    {
        q: "Choose the correct sentence that places the adverb of frequency correctly:",
        options: ["She is always late.", "She always arrives late.", "She arrives always late.", "Always she arrives late."],
        answer: 1,
        hint: "Adverbs of frequency usually go *before* main action verbs, but *after* 'be' verbs."
    },
    {
        q: "What rule applies to the placement of the limiting adverb 'only' in a sentence?",
        options: [
            "It doesn't matter where you put it",
            "Where you put it changes focus and meaning",
            "One specific position is always grammatically wrong",
            "It must always be the first word of the sentence"
        ],
        answer: 1,
        hint: "'Only' modifies the word immediately following it. Changing its place changes the focus."
    },
    {
        q: "Which sentence accurately arranges multiple adverbs in the standard Manner, Place, Frequency, and Time (MPFT) order?",
        options: [
            "He ran daily fast in the park last month.",
            "He ran fast in the park daily last month.",
            "He ran last month daily in the park fast.",
            "He ran fast daily in the park last month."
        ],
        answer: 1,
        hint: "Follow the sequence architecture rule: How (Fast) → Where (In the park) → How Often (Daily) → When (Last month)."
    },
    {
        q: "What is the correct position of an adverb when using a auxiliary 'be' verb?",
        options: [
            "I always am ready.",
            "I am always ready.",
            "Always I am ready.",
            "I am ready always."
        ],
        answer: 1,
        hint: "Adverbs of frequency follow right *after* the auxiliary 'am/is/are/was/were' elements."
    },
    {
        q: "Look closely at the image context. Select the option that flawlessly displays the standard Manner → Place → Time adverb sequencing pattern.",
        options: ["Sentence 1", "Sentence 2", "Sentence 3", "Sentence 4"],
        answer: 1,
        image: "picture1.png",
        hint: "Identify the line ordering how it happened, where it happened, and then when it happened."
    },
    {
        q: "Review the provided graphic. Why is Sentence 3 marked structurally incorrect?",
        options: [
            "'Seldom' must follow the 'is' verb, not precede it",
            "The adverb 'late' should be changed to 'lately'",
            "The subject pronoun 'He' should be 'him'",
            "The sentence layout is completely correct"
        ],
        answer: 0,
        image: "picture2.png",
        hint: "Look at where the frequency modifier 'seldom' sits relative to the linking verb 'is'."
    },
    {
        q: "Analyze the structures. Which distribution correctly matches the working sets?",
        options: [
            "Correct: P, R — Incorrect: Q, S",
            "Correct: P, Q — Incorrect: R, S",
            "Correct: Q, S — Incorrect: P, R",
            "Correct: R, S — Incorrect: P, Q"
        ],
        answer: 0,
        hint: "Check which lines follow basic placement positions and sort out the mismatched faulty ones."
    },
    {
        q: "Classify the items. Which pairs accurately represent mid-position vs end-position modifiers?",
        options: [
            "Mid: 1,4 — End: 2,3",
            "Mid: 2,3 — End: 1,4",
            "Mid: 1,3 — End: 2,4",
            "Mid: 3,4 — End: 1,2"
        ],
        answer: 2,
        hint: "Mid-position adverbs sit inside the verb phrase. End-position structures reside at the very back."
    },
    {
        q: "Identify the odd one out among these adverb structures:",
        options: [
            "I have never seen a beach this blue.",
            "She always arrives on time.",
            "He ran fast in the park yesterday.",
            "I yesterday went to the market."
        ],
        answer: 3,
        hint: "One sentence puts a definite time adverb right between the subject and verb, which breaks typical syntax rules."
    },
    {
        q: "Evaluate the presentation choices. Which observation is accurate?",
        options: [
            "First sentence has error",
            "Second sentence has error",
            "Both sentences have errors",
            "None of the sentences have errors"
        ],
        answer: 0,
        hint: "Check the first example line to spot a mistake in how its adverbs are ordered."
    },
    {
        q: "What happens to a statement when you move the adverb 'only' to different spots?",
        options: [
            "It automatically becomes grammatically incorrect",
            "The meaning remains completely unchanged",
            "The primary focus of the statement changes",
            "It turns directly into an adjective modifier"
        ],
        answer: 2,
        hint: "Moving 'only' shifts what specific target object or action is being singled out."
    },
    {
        q: "Assertion: Frequency modifiers go before regular action verbs. Reason: Position depends on whether a main action verb or a 'be' auxiliary is used.",
        options: [
            "Both correct and reason explains assertion",
            "Both correct but reason does not explain assertion",
            "Assertion is correct but reason is wrong",
            "Both statements are wrong"
        ],
        answer: 0,
        hint: "Consider how verb classification directly dictates where adverbs land."
    }
];

/* ================= STATE ================= */
let activeIdx = 0;
let scoreCount = 0;
let wrongCount = 0;
let currentAttempt = 1;

function startGameSession() {
    document.getElementById("splash").style.display = "none";
    document.getElementById("game").style.display = "block";
    triggerAudio("introAudio");
    renderQuestion();
}

function renderQuestion() {
    if (activeIdx >= questions.length) {
        endGame();
        return;
    }

    currentAttempt = 1;
    let item = questions[activeIdx];

    document.getElementById("progressText").innerText = `Question ${activeIdx + 1} of ${questions.length}`;
    document.getElementById("progressBar").style.width = (activeIdx / questions.length) * 100 + "%";
    document.getElementById("question").innerText = item.q;
    document.getElementById("feedbackBox").innerHTML = "";

    // Graphics processing unit
    let imgNode = document.getElementById("imageBox");
    if (item.image) {
        imgNode.innerHTML = `<img src="assets/${item.image}" alt="Visual Context">`;
        imgNode.style.display = "block";
    } else {
        imgNode.style.display = "none";
        imgNode.innerHTML = "";
    }

    // Render loop options
    let optionBox = document.getElementById("options");
    optionBox.innerHTML = "";

    item.options.forEach((text, index) => {
        let div = document.createElement("div");
        div.className = "option";
        div.innerText = text;
        div.onclick = () => evaluateChoice(div, index, item.answer, item.hint);
        optionBox.appendChild(div);
    });
}

function evaluateChoice(domElement, clickedIdx, correctIdx, hintText) {
    triggerAudio("clickAudio");
    let optionsList = document.querySelectorAll(".option");
    let feedback = document.getElementById("feedbackBox");

    // Correct hit logic path
    if (clickedIdx === correctIdx) {
        optionsList.forEach(el => el.classList.add("lock-clicks"));
        domElement.classList.add("correct");
        scoreCount++;
        document.getElementById("score").innerText = scoreCount;
        triggerAudio("correctAudio");
        feedback.innerHTML = "<span style='color:var(--correct);'>✨ Brilliant work! That's correct.</span>";

        setTimeout(() => {
            activeIdx++;
            renderQuestion();
        }, 1800);
        return;
    }

    // False hit path - Second chance engine step
    if (currentAttempt === 1) {
        currentAttempt++;
        domElement.classList.add("wrong");
        domElement.classList.add("disabled-node");
        triggerAudio("wrongAudio");
        feedback.innerHTML = `<span style='color:var(--hint-color);'>⚠️ <b>Not quite! Try again.</b><br><small style="color:var(--text-muted)"><b>Hint:</b> ${hintText}</small></span>`;
    } else {
        // Ultimate mistake failure path
        optionsList.forEach(el => el.classList.add("lock-clicks"));
        domElement.classList.add("wrong");
        wrongCount++;
        document.getElementById("wrong").innerText = wrongCount;
        triggerAudio("wrongAudio");
        feedback.innerHTML = "<span style='color:var(--wrong);'>✕ Incorrect. Let's see the correct placement.</span>";

        optionsList[correctIdx].classList.add("correct");

        setTimeout(() => {
            activeIdx++;
            renderQuestion();
        }, 3000);
    }
}

function endGame() {
    document.getElementById("game").style.display = "none";
    document.getElementById("scoreScreen").style.display = "block";

    let percentage = Math.round((scoreCount / questions.length) * 100);
    document.getElementById("finalScore").innerText = `${scoreCount}/${questions.length} (${percentage}%)`;

    let remarkBox = document.getElementById("remark");
    if (percentage >= 80) {
        remarkBox.innerText = "Exceptional Mastery! You've perfectly localized and sequenced your adverbs! 🌟";
        triggerAudio("clapAudio");
    } else {
        remarkBox.innerText = "Keep practicing! Review modifier placement details to build structural accuracy. 👍";
        triggerAudio("gameoverAudio");
    }
}

function restartGame() {
    window.location.reload();
}

function triggerAudio(domId) {
    const soundNode = document.getElementById(domId);
    if (soundNode) {
        soundNode.currentTime = 0;
        soundNode.play().catch(() => { /* Prevent interface locks due to browser security settings */ });
    }
}
</script>

</body>
</html>
