<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 English - Adjectives</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}
#splash img{width:220px}

/* SCREEN */
.screen{
    display:none;
    height:100vh;
    padding:10px;
}
.active{display:block}

/* CARD (FIXED SCROLL ISSUE) */
.card{
    max-width:850px;
    margin:auto;
    background:white;
    padding:16px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);

    height:92vh;
    overflow-y:auto;
}

/* TOP BAR */
#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin-bottom:10px;
}
#timer{color:#d9534f}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

/* IMAGE */
#qimg{
    width:55%;
    max-height:160px;
    object-fit:contain;
    display:block;
    margin:10px auto;
    border-radius:10px;
}

/* OPTIONS */
.option{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
    cursor:pointer;
    white-space:normal;
    word-break:break-word;
}
.option:hover{background:#e6e6e6}

.correct{background:#b7f7b7 !important;}
.wrong{background:#ffb3b3 !important;}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 6: Adjectives</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimg">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/10</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

const questions = [

{
q:`Q1. You are reading a travel brochure: "The Japanese tea ceremony is a peaceful experience."
What types of adjectives are Japanese and peaceful?`,
options:[
"A. Quality / Number",
"B. Proper Adjective / Quality",
"C. Quantity / Demonstrative",
"D. Possessive / Proper Adjective"
],
a:1
},

{
q:`Q2. A chef says, "I need some sugar and two eggs for this cake."
Identify the types of adjectives used for some and two.`,
options:[
"A. Quantity / Number",
"B. Quality / Quantity",
"C. Demonstrative / Number",
"D. Interrogative / Quality"
],
a:0
},

{
q:`Q3. A fridge has four sticky notes:
• We have little milk left.
• There are three apples inside.
• Buy some bread.
• That pizza is still there.
Match each underlined adjective with its correct type.`,
img:"assets/question3.png",
options:[
"A. little = Quality, three = Number, some = Quantity, that = Possessive",
"B. little = Quantity, three = Number, some = Quantity, that = Demonstrative",
"C. little = Number, three = Quantity, some = Demonstrative, that = Quality",
"D. little = Demonstrative, three = Quality, some = Number, that = Quantity"
],
a:1
},

{
q:`Q4. This is my book. This book is mine.
In which sentence is This used as a Demonstrative Adjective?`,
options:[
"A. Sentence A",
"B. Sentence B",
"C. Both sentences",
"D. Neither sentence"
],
a:1
},

{
q:`Q5. Sort adjectives into Number and Quantity:
few, much, several, little`,
options:[
"A. Number: few, much | Quantity: several, little",
"B. Number: much, little | Quantity: few, several",
"C. Number: few, several | Quantity: much, little",
"D. Number: several, little | Quantity: few, much"
],
a:2
},

{
q:`Q6. Classify adjectives:
1. Whose pen is this?
2. Her bag is on the desk.
3. Which route is shorter?
4. Our team played well.`,
options:[
"A. Possessive, Interrogative, Possessive, Interrogative",
"B. Interrogative, Possessive, Interrogative, Possessive",
"C. Interrogative, Interrogative, Possessive, Possessive",
"D. Possessive, Possessive, Interrogative, Interrogative"
],
a:1
},

{
q:`Q7. Which cannot describe uncountable nouns?`,
options:[
"A. much",
"B. little",
"C. some",
"D. several"
],
a:3
},

{
q:`Q8. Identify error:
I don't have many milk left. Can you buy some?`,
options:[
"A. many → much",
"B. some → any",
"C. many → few",
"D. No error"
],
a:0
},

{
q:`Q9. He likes food from Italy → He likes Italian food.
What change is made?`,
options:[
"A. Proper Adjective used",
"B. Quality changed to Quantity",
"C. Demonstrative changed",
"D. Number adjective used"
],
a:0
},

{
q:`Q10. Assertion-Reason:
Assertion: ten is Adjective of Number.
Reason: It shows how many.`,
options:[
"A. Both correct, reason explains",
"B. Both correct, but no relation",
"C. Assertion correct, reason wrong",
"D. Both incorrect"
],
a:0
}

];

let i=0,score=0,timer;

/* SPLASH */
setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){
clearInterval(timer);

let q=questions[i];
document.getElementById("question").innerText=q.q;

let img=document.getElementById("qimg");
if(q.img){
img.src=q.img;
img.style.display="block";
}else{
img.style.display="none";
}

let html="";
q.options.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("options").innerHTML=html;

/* TIMER */
let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);
}

function check(idx,btn){

if(idx===questions[i].a){
btn.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText=score;
setTimeout(next,700);
}else{
btn.classList.add("wrong");
document.getElementById("wrongSound").play();
setTimeout(next,800);
}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
document.getElementById("clapSound").play();
}

</script>

</body>
</html>
