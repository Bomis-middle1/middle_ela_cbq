<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 English - Adjectives</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}
#splash img{width:220px}

/* SCREEN */
.screen{display:none;height:100vh;padding:10px;}
.active{display:block}

/* CARD */
.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:16px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    height:92vh;
    overflow-y:auto;
}

/* TOP */
#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
}

/* IMAGE */
#qimg{
    width:60%;
    max-height:170px;
    object-fit:contain;
    display:block;
    margin:10px auto;
}

/* OPTIONS */
.option{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    cursor:pointer;
    white-space:normal;
}

.option:hover{background:#e6e6e6}

.correct{background:#b7f7b7 !important;}
.wrong{background:#ffb3b3 !important;}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
<h2>Grade 6 English</h2>
<p>Chapter 6: Adjectives</p>
<button onclick="start()" class="option">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
<div>Score: <span id="score">0</span></div>
<div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimg">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
<h2>Quiz Completed 🎉</h2>
<p>Your Score: <span id="final"></span>/10</p>
<button onclick="location.reload()" class="option">Play Again</button>
</div>
</div>

<script>

const questions = [

/* Q1 EXACT */
{
q:`Q1. You are reading a travel brochure: "The Japanese tea ceremony is a peaceful experience."
What types of adjectives are Japanese and peaceful?`,
options:[
"A. Quality / Number",
"B. Proper Adjective / Quality",
"C. Quantity / Demonstrative",
"D. Possessive / Proper Adjective"
],
a:1
},

/* Q2 EXACT */
{
q:`Q2. A chef says, "I need some sugar and two eggs for this cake."
Identify the types of adjectives used for some and two.`,
options:[
"A. Quantity / Number",
"B. Quality / Quantity",
"C. Demonstrative / Number",
"D. Interrogative / Quality"
],
a:0
},

/* Q3 IMAGE EXACT */
{
q:`Q3. A fridge has four sticky notes.
• We have little milk left.
• There are three apples inside.
• Buy some bread.
• That pizza is still there.
Match each underlined adjective with its correct type.`,
img:"assets/question3.png",
options:[
"A. little = Quality, three = Number, some = Quantity, that = Possessive",
"B. little = Quantity, three = Number, some = Quantity, that = Demonstrative",
"C. little = Number, three = Quantity, some = Demonstrative, that = Quality",
"D. little = Demonstrative, three = Quality, some = Number, that = Quantity"
],
a:1
},

/* Q4 EXACT */
{
q:`Q4. Read the two sentences carefully.
Sentence A: This is my book.
Sentence B: This book is mine.
In which sentence is This used as a Demonstrative Adjective?`,
options:[
"A. Sentence A, because \"This\" stands alone.",
"B. Sentence B, because \"This\" describes the noun \"book.\"",
"C. Both sentences.",
"D. Neither sentence."
],
a:1
},

/* Q5 EXACT */
{
q:`Q5. Sort these adjectives into Adjectives of Number and Adjectives of Quantity.
P. few       Q. much     R. several      S. little`,
options:[
"A. Number: P, Q | Quantity: R, S",
"B. Number: Q, S | Quantity: P, R",
"C. Number: P, R | Quantity: Q, S",
"D. Number: R, S | Quantity: P, Q"
],
a:2
},

/* Q6 EXACT */
{
q:`Q6. Classify the underlined adjectives.
1. Whose pen is this?
2. Her bag is on the desk.
3. Which route is shorter?
4. Our team played well.`,
options:[
"A. Possessive, Interrogative, Possessive, Interrogative",
"B. Interrogative, Possessive, Interrogative, Possessive",
"C. Interrogative, Interrogative, Possessive, Possessive",
"D. Possessive, Possessive, Interrogative, Interrogative"
],
a:1
},

/* Q7 EXACT */
{
q:`Q7. A teacher says, "One of these adjectives cannot describe an uncountable noun."
Which one is it?`,
options:[
"A. much",
"B. little",
"C. some",
"D. several"
],
a:3
},

/* Q8 EXACT */
{
q:`Q8. A student sends this message: "I don't have many milk left in the fridge. Can you buy some?"
Which adjective is used incorrectly, and why?`,
options:[
"A. many — milk is uncountable, so much should be used.",
"B. some should be replaced with any.",
"C. many should be replaced with few.",
"D. There is no error."
],
a:0
},

/* Q9 EXACT */
{
q:`Q9. A student rewrites this sentence:
He likes food from Italy. as -He likes Italian food.
What change has been made?`,
options:[
"A. The phrase \"from Italy\" has been replaced by the Proper Adjective Italian.",
"B. A Proper Adjective has been changed into a Quality Adjective.",
"C. A Demonstrative Adjective has become a Possessive Adjective.",
"D. A Number Adjective has become a Quantity Adjective."
],
a:0
},

/* Q10 EXACT */
{
q:`Q10. Assertion: In the phrase "ten mangoes," ten is an Adjective of Number.
Reason: Adjectives of Number are used with countable nouns to show how many.`,
options:[
"A. Both are correct, and the reason correctly explains the assertion.",
"B. Both are correct, but the reason does not explain the assertion.",
"C. The assertion is correct, but the reason is incorrect.",
"D. Both are incorrect."
],
a:0
}

];

let i=0,score=0,timer;

setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){
clearInterval(timer);

let q=questions[i];
document.getElementById("question").innerText=q.q;

let img=document.getElementById("qimg");
if(q.img){
img.src=q.img;
img.style.display="block";
}else{
img.style.display="none";
}

let html="";
q.options.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("options").innerHTML=html;

let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);
}

function check(idx,btn){
if(idx===questions[i].a){
btn.classList.add("correct");
score++;
document.getElementById("score").innerText=score;
setTimeout(next,700);
}else{
btn.classList.add("wrong");
setTimeout(next,800);
}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
}

</script>

</body>
</html>
