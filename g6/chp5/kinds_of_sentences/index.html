<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 - Kinds of Sentences</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

#splash{
    position:fixed;
    inset:0;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#splash img{width:220px}

.screen{display:none;height:100vh;padding:15px;}
.active{display:block}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

#qimg{
    width:100%;
    max-height:240px;
    object-fit:contain;
    margin:10px 0;
    display:none;
}

.option{
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
}

.option:hover{background:#e6e6e6}

.correct{background:#c8f7c5 !important;}
.wrong{background:#ffd6d6 !important;}

#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin-bottom:10px;
}

#timer{color:#d9534f}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 5: Kinds of Sentences</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimg">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/15</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* ================= EXACT QUESTIONS (UNCHANGED) ================= */
const questions = [
{
text:`Q1. You see this sticker on your water bottle:
"Drink more water every day."
What kind of sentence is it?`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
answer:2
},
{
text:`Q2. Your friend sends you a message:
"Did you finish the science homework?"`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
answer:1
},
{
text:`Q3. Aarav jumps into a cold swimming pool and shouts,
"How freezing the water is!"`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
answer:3
},
{
text:`Q4. A teacher writes:
"He is always on time."`,
options:["He is never on time","He is never late","Is he ever on time","He not always on time"],
answer:1
},
{
text:`Q5. Convert to question form:
"It was a great victory for the team."`,
options:["Was it a great victory for the team?","It was a great victory?","Did it was victory?","How great victory!"],
answer:0
},
{
text:`Q6. The class notice board has these four notes.`,
img:"assets/question6.png",
options:[
"1=Declarative, 2=Exclamatory, 3=Imperative, 4=Interrogative",
"1=Declarative, 2=Imperative, 3=Exclamatory, 4=Interrogative",
"1=Interrogative, 2=Declarative, 3=Exclamatory, 4=Imperative",
"1=Exclamatory, 2=Imperative, 3=Declarative, 4=Interrogative"
],
answer:1
},
{
text:`Q7. A student forgot punctuation.`,
img:"assets/question7.png",
options:["! ? .",". . !","? . !","! ! ?"],
answer:0
},
{
text:`Q8. Which is negative declarative sentence?`,
options:["Don't go","Why not","She does not like apples","What a shame"],
answer:2
},
{
text:`Q9. Meaning of statement form`,
options:["All live forever","No person can live forever","Can live forever","Live forever"],
answer:1
},
{
text:`Q10. Sort sentences`,
options:["P,R Q,S","Q,S P,R","P,S Q,R","Q,R P,S"],
answer:1
},
{
text:`Q11. Group sentences`,
options:["A","B","C","D"],
answer:1
},
{
text:`Q12. Odd one out`,
options:["A","B","C","D"],
answer:2
},
{
text:`Q13. Imperative error`,
options:["A","B","C","D"],
answer:1
},
{
text:`Q14. Effect of change`,
options:["A","B","C","D"],
answer:1
},
{
text:`Q15. Best email sentence`,
options:["A","B","C","D"],
answer:2
}
];

let i=0,score=0,timer;

/* SPLASH */
setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){

clearInterval(timer);

let q = questions[i];

document.getElementById("question").innerText = q.text;

/* IMAGE */
let img=document.getElementById("qimg");
if(q.img){
img.src=q.img;
img.style.display="block";
}else{
img.style.display="none";
}

/* OPTIONS */
let html="";
q.options.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});

document.getElementById("options").innerHTML=html;

/* TIMER */
let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);

}

function check(idx,btn){

if(idx===questions[i].answer){
btn.classList.add("correct");
score++;
document.getElementById("score").innerText=score;
setTimeout(next,700);
}else{
btn.classList.add("wrong");
setTimeout(next,900);
}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
}

</script>

</body>
</html>
