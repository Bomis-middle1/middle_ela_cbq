
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 - Kinds of Sentences</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#splash img{width:220px}

/* SCREEN */
.screen{
    display:none;
    height:100vh;
    padding:10px;
}
.active{display:block}

/* QUIZ CARD (CRITICAL FIX: SCROLL ENABLED) */
.card{
    max-width:850px;
    margin:auto;
    background:white;
    padding:16px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);

    height:90vh;
    overflow-y:auto;   /* 🔴 FIX: prevents cut-off */
}

/* TOP BAR */
#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin-bottom:10px;
}
#timer{color:#d9534f}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

/* IMAGE (Q6/Q7 FIX) */
#qimg{
    width:55%;
    max-height:140px;
    object-fit:contain;
    display:block;
    margin:10px auto;
    border-radius:10px;
}

/* OPTIONS */
.option{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
    cursor:pointer;
    white-space:normal;
}
.option:hover{background:#e6e6e6}

.correct{background:#b7f7b7 !important;}
.wrong{background:#ffb3b3 !important;}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 5: Kinds of Sentences</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimg">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/15</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

const questions = [
{
q:`Q1. You see this sticker on your water bottle:
"Drink more water every day."
What kind of sentence is it?`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
a:2
},
{
q:`Q2. Your friend sends you a message:
"Did you finish the science homework?"`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
a:1
},
{
q:`Q3. Aarav jumps into a cold swimming pool and shouts,
"How freezing the water is!"
Later, he writes about the experience in his diary. Which sentence is the best diary entry?`,
options:["How cold is the water?","Don't touch the cold water.","The water was very cold.","The water was not cold."],
a:2
},
{
q:`Q4. A teacher writes in a report:
"He is always on time."
She wants to rewrite it using the word "never" without changing the meaning.
Which sentence is correct?`,
options:["He is never on time.","He is never late.","Is he ever on time?","He is not always on time."],
a:1
},
{
q:`Q5. After winning a match, the captain says,
"It was a great victory for the team."
A reporter wants to ask this as a question.
Which sentence is correct?`,
options:["Was it a great victory for the team?","It was a great victory for the team?","Did it was a great victory for the team?","How great the victory was!"],
a:0
},

/* Q6 FIX */
{
q:`Q6. The class notice board has these four notes.
Match each note with its correct sentence type.`,
img:"assets/question6.png",
options:[
"1=Declarative, 2=Exclamatory, 3=Imperative, 4=Interrogative",
"1=Declarative, 2=Imperative, 3=Exclamatory, 4=Interrogative",
"1=Interrogative, 2=Declarative, 3=Exclamatory, 4=Imperative",
"1=Exclamatory, 2=Imperative, 3=Declarative, 4=Interrogative"
],
a:1
},

/* Q7 FIX */
{
q:`Q7. A student forgot to add punctuation to these sentences.`,
img:"assets/question7.png",
options:["! ? .",". . !","? . !","! ! ?"],
a:0
},

{
q:`Q8. Which sentence is a negative declarative sentence?`,
options:["Don't go there.","Why are you not coming?","She does not like apples.","What a shame!"],
a:2
},
{
q:`Q9. A student asks:
"Can any person live forever?"
What is the correct statement meaning?`,
options:["Every person can live forever.","No person can live forever.","Can a person live forever?","Live forever everyone."],
a:1
},
{
q:`Q10. Sort sentences into types`,
options:["P,R | Q,S","Q,S | P,R","P,S | Q,R","Q,R | P,S"],
a:1
}
];

let i=0,score=0,timer;

/* SPLASH */
setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){
clearInterval(timer);

let q=questions[i];
document.getElementById("question").innerText=q.q;

/* IMAGE */
let img=document.getElementById("qimg");
if(q.img){
img.src=q.img;
img.style.display="block";
}else{
img.style.display="none";
}

/* OPTIONS */
let html="";
q.options.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("options").innerHTML=html;

/* TIMER */
let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);
}

function check(idx,btn){

if(idx===questions[i].a){
btn.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText=score;
setTimeout(next,700);
}else{
btn.classList.add("wrong");
document.getElementById("wrongSound").play();
setTimeout(next,900);
}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
document.getElementById("clapSound").play();
}

</script>

</body>
</html>
