<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 English - Kinds of Sentences</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#splash img{width:220px}

/* SCREEN */
.screen{display:none;height:100vh;padding:15px;}
.active{display:block}

/* CARD */
.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

/* IMAGE */
#qimg{
    width:100%;
    max-height:250px;
    object-fit:contain;
    margin:10px 0;
    border-radius:10px;
    display:none;
}

/* OPTIONS */
.option{
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
    cursor:pointer;
}
.option:hover{background:#e6e6e6}

.correct{background:#c8f7c5 !important;}
.wrong{background:#ffd6d6 !important;}

/* TOP */
#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin-bottom:10px;
}
#timer{color:#d9534f}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 5: Kinds of Sentences</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimg">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/15</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>
/* ================= FULL QUESTIONS ================= */
const questions = [
{
q:`Q1. You see this sticker on your water bottle:
"Drink more water every day."
What kind of sentence is it?`,
options:["A. Declarative","B. Interrogative","C. Imperative","D. Exclamatory"],
answer:2
},
{
q:`Q2. Your friend sends you a message:
"Did you finish the science homework?"
What kind of sentence is this?`,
options:["A. Declarative","B. Interrogative","C. Imperative","D. Exclamatory"],
answer:1
},
{
q:`Q3. Aarav jumps into a cold swimming pool and shouts,
"How freezing the water is!"
Later, he writes about the experience in his diary. Which sentence is the best diary entry?`,
options:["A. How cold is the water?","B. Don't touch the cold water.","C. The water was very cold.","D. The water was not cold."],
answer:2
},
{
q:`Q4. A teacher writes in a report:
"He is always on time."
She wants to rewrite it using the word "never" without changing the meaning.
Which sentence is correct?`,
options:["A. He is never on time.","B. He is never late.","C. Is he ever on time?","D. He is not always on time."],
answer:1
},
{
q:`Q5. After winning a match, the captain says,
"It was a great victory for the team."
A reporter wants to ask this as a question.
Which sentence is correct?`,
options:["A. Was it a great victory for the team?","B. It was a great victory for the team?","C. Did it was a great victory for the team?","D. How great the victory was!"],
answer:0
},
{
q:`Q6. The class notice board has these four notes.
Note 1: The trip is on Friday.
Note 2: Wear your school uniform!
Note 3: What an exciting day this will be!
Note 4: Is your permission slip ready?
Match each note with its correct sentence type.`,
img:"assets/question6.png",
options:[
"A. 1=Declarative, 2=Exclamatory, 3=Imperative, 4=Interrogative",
"B. 1=Declarative, 2=Imperative, 3=Exclamatory, 4=Interrogative",
"C. 1=Interrogative, 2=Declarative, 3=Exclamatory, 4=Imperative",
"D. 1=Exclamatory, 2=Imperative, 3=Declarative, 4=Interrogative"
],
answer:1
},
{
q:`Q7. A student forgot to add punctuation to these sentences.
1. Stop talking ___
2. Where is my bag ___
3. I love ice cream ___
Which option correctly completes them?`,
img:"assets/question7.png",
options:["A. ! ? .","B. . . !","C. ? . !","D. ! ! ?"],
answer:0
},
{
q:`Q8. Which sentence is a negative declarative sentence?`,
options:["A. Don't go there.","B. Why are you not coming?","C. She does not like apples.","D. What a shame that he lost!"],
answer:2
},
{
q:`Q9. A student asks,
"Can any person live forever?"
What is the actual meaning when written as a statement?`,
options:["A. Every person can live forever.","B. No person can live forever.","C. Can a person live forever?","D. Live forever, everyone."],
answer:1
},
{
q:`Q10. Sort these sentences into Imperative and Exclamatory.
P. What a goal that was!
Q. Please sit down quietly.
R. How beautiful the sunset looks!
S. Always respect your elders.`,
options:[
"A. Imperative: P, R | Exclamatory: Q, S",
"B. Imperative: Q, R | Exclamatory: P, S",
"C. Imperative: Q, S | Exclamatory: P, R",
"D. Imperative: P, S | Exclamatory: Q, R"
],
answer:2
},
{
q:`Q11. A student has written four sentences.
Which option correctly groups the Imperative and Declarative sentences?`,
options:[
"A. Imperative: Wash your hands. / The sun rises in the east. Declarative: Close the door. / Birds fly south in winter.",
"B. Imperative: Wash your hands. / Close the door. Declarative: The sun rises in the east. / Birds fly south in winter.",
"C. Imperative: The sun rises in the east. / Birds fly south in winter. Declarative: Wash your hands. / Close the door.",
"D. Imperative: Close the door. / Birds fly south in winter. Declarative: Wash your hands. / The sun rises in the east."
],
answer:1
},
{
q:`Q12. Three of these are Imperative sentences. One is not. Which is the odd one out?`,
options:[
"A. Switch off the lights before you leave.",
"B. Please hand in your homework tomorrow.",
"C. What a wonderful surprise this is!",
"D. Always tell the truth."
],
answer:2
},
{
q:`Q13. A student is writing cooking instructions. Which sentence does not correctly use the Imperative form?`,
options:[
"A. First, wash the vegetables.",
"B. Then, you are cutting them into small pieces.",
"C. Add a pinch of salt.",
"D. Serve the dish hot."
],
answer:1
},
{
q:`Q14. A student changes
"What a terrible mess this is!" to "This is a terrible mess."
What is the effect of this change?`,
options:[
"A. It becomes an Interrogative sentence.",
"B. It loses its emotion and becomes a Declarative sentence.",
"C. It becomes an Imperative sentence.",
"D. It becomes grammatically incorrect."
],
answer:1
},
{
q:`Q15. You are writing a polite email to your teacher asking them to explain a Maths problem again. Which sentence is the most appropriate?`,
options:[
"A. Explain this Maths problem again!",
"B. Why can't you explain this problem again?",
"C. Please explain this Maths problem again.",
"D. You will explain this Maths problem again."
],
answer:2
}
];

let i=0,score=0,timer;

/* SPLASH */
setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){
clearInterval(timer);
let q=questions[i];
document.getElementById("question").innerText=q.q;

/* IMAGE */
let img=document.getElementById("qimg");
if(q.img){ img.src=q.img; img.style.display="block"; } else { img.style.display="none"; }

/* OPTIONS */
let html="";
q.options.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("options").innerHTML=html;

/* TIMER */
let t=45;
document.getElementById("timer").innerText=t;
timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);
}

function check(idx,btn){
if(idx===questions[i].answer){ btn.classList.add("correct"); score++; document.getElementById("score").innerText=score; setTimeout(next,700);}
else{ btn.classList.add("wrong"); setTimeout(next,900);}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
}
</script>

</body>
</html>
