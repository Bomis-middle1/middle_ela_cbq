<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 - Kinds of Sentences</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}
#splash img{width:220px}

/* SCREEN */
.screen{display:none;height:100vh;padding:15px;}
.active{display:block}

/* CARD */
.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

/* IMAGE FIX (IMPORTANT) */
.qimg{
    width:70%;
    max-height:180px;
    object-fit:contain;
    display:block;
    margin:10px auto;
    border-radius:10px;
}

/* OPTIONS */
.option{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
    cursor:pointer;
}

.option:hover{background:#e6e6e6}

.correct{background:#b7f7b7 !important;}
.wrong{background:#ffb3b3 !important;}

/* TOP */
#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}
#timer{color:#d9534f}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    background:gold;
    top:-10px;
    animation:fall 1s linear forwards;
}
@keyframes fall{
    to{transform:translateY(600px) rotate(360deg);opacity:0}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 5: Kinds of Sentences</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimg" class="qimg">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/15</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

const questions = [
{
q:`Q1. You see this sticker on your water bottle:
"Drink more water every day."
What kind of sentence is it?`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
a:2
},
{
q:`Q2. Your friend sends:
"Did you finish the science homework?"`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
a:1
},
{
q:`Q3. Aarav shouts:
"How freezing the water is!"`,
options:["Declarative","Interrogative","Imperative","Exclamatory"],
a:3
},
{
q:`Q4. He is always on time → rewrite using never`,
options:["He is never on time","He is never late","Is he ever on time","Not always"],
a:1
},
{
q:`Q5. Convert to question form`,
options:["Was it a great victory?","It was a great victory?","Did it was victory?","How great!"],
a:0
},

/* Q6 IMAGE */
{
q:`Q6. Match sentence types shown in the image`,
img:"assets/question6.png",
options:[
"1=Declarative, 2=Exclamatory, 3=Imperative, 4=Interrogative",
"1=Declarative, 2=Imperative, 3=Exclamatory, 4=Interrogative",
"1=Interrogative, 2=Declarative, 3=Exclamatory, 4=Imperative",
"1=Exclamatory, 2=Imperative, 3=Declarative, 4=Interrogative"
],
a:1
},

/* Q7 IMAGE */
{
q:`Q7. Punctuation task shown in image`,
img:"assets/question7.png",
options:["! ? .",". . !","? . !","! ! ?"],
a:0
},

{
q:`Q8. Negative declarative sentence`,
options:["Don't go","Why not","She does not like apples","What a shame"],
a:2
},

{
q:`Q9. Meaning of statement form`,
options:["All live forever","No person can live forever","Can live forever","Live forever"],
a:1
}
];

let i=0,score=0,timer;

setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){
clearInterval(timer);
let q=questions[i];

document.getElementById("question").innerText=q.q;

/* IMAGE */
let img=document.getElementById("qimg");
if(q.img){
img.src=q.img;
img.style.display="block";
}else{
img.style.display="none";
}

/* OPTIONS */
let html="";
q.options.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("options").innerHTML=html;

/* TIMER */
let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);
}

function check(idx,btn){

let correct = questions[i].a;

if(idx===correct){
btn.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText=score;
confetti();
setTimeout(next,800);
}else{
btn.classList.add("wrong");
document.getElementById("wrongSound").play();
setTimeout(next,800);
}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
document.getElementById("clapSound").play();
}

function confetti(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}
}

</script>

</body>
</html>
