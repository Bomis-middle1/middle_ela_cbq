<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 - Kinds of Sentences</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eef6ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#splash img{width:220px}

/* SCREEN */
.screen{display:none;height:100vh;padding:15px;}
.active{display:block}

/* CARD */
.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

/* IMAGE */
#qimage{
    width:100%;
    max-height:250px;
    object-fit:contain;
    margin:10px 0;
    border-radius:10px;
    display:none;
}

/* OPTIONS */
.option{
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
    cursor:pointer;
    white-space:normal;
}
.option:hover{background:#e6e6e6}

.correct{background:#c8f7c5 !important;}
.wrong{background:#ffd6d6 !important;}

/* TOP BAR */
#topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-weight:bold;
}
#timer{color:#d9534f}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}

/* RESULT */
#result{text-align:center}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 5: Kinds of Sentences</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<img id="qimage">
<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/15</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* ================= QUESTIONS ================= */
const questions = [

{
q:`Q1. You see this sticker on your water bottle:
"Drink more water every day."
What kind of sentence is it?`,
o:["Declarative","Interrogative","Imperative","Exclamatory"],
a:2
},

{
q:`Q2. Your friend sends:
"Did you finish the science homework?"`,
o:["Declarative","Interrogative","Imperative","Exclamatory"],
a:1
},

{
q:`Q3. "How freezing the water is!"`,
o:["Interrogative","Imperative","Declarative","Exclamatory"],
a:3
},

{
q:`Q4. He is always on time → rewrite using never`,
o:["He is never on time","He is never late","Is he ever on time","Not always"],
a:1
},

{
q:`Q5. Convert to question form`,
o:["Was it a great victory?","It was a great victory?","Did it was victory?","How great!"],
a:0
},

{
q:`Q6. Match sentence types (see image)`,
img:"assets/question6.png",
o:[
"1=Declarative, 2=Exclamatory, 3=Imperative, 4=Interrogative",
"1=Declarative, 2=Imperative, 3=Exclamatory, 4=Interrogative",
"1=Interrogative, 2=Declarative, 3=Exclamatory, 4=Imperative",
"1=Exclamatory, 2=Imperative, 3=Declarative, 4=Interrogative"
],
a:1
},

{
q:`Q7. Punctuation task (see image)`,
img:"assets/question7.png",
o:["! ? .",". . !","? . !","! ! ?"],
a:0
},

{
q:`Q8. Negative declarative sentence`,
o:["Don't go","Why not","She does not like apples","What a shame"],
a:2
},

{
q:`Q9. Meaning of statement form`,
o:["All live forever","No person can live forever","Can live forever","Live forever"],
a:1
},

{
q:`Q10. Sort sentences`,
o:["P,R Q,S","Q,S P,R","P,S Q,R","Q,R P,S"],
a:1
},

{
q:`Q11. Group sentences`,
o:["A","B","C","D"],
a:1
},

{
q:`Q12. Odd one out`,
o:["A","B","C","D"],
a:2
},

{
q:`Q13. Imperative error`,
o:["A","B","C","D"],
a:1
},

{
q:`Q14. Effect of change`,
o:["A","B","C","D"],
a:1
},

{
q:`Q15. Best email sentence`,
o:["A","B","C","D"],
a:2
}

];

let i=0,score=0,attempt=0,timer;

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){

clearInterval(timer);
attempt=0;

let q = questions[i];

/* IMAGE HANDLING */
let img = document.getElementById("qimage");

if(q.img){
img.src = q.img;
img.style.display="block";
}else{
img.style.display="none";
}

document.getElementById("question").innerText = q.q;

/* OPTIONS */
let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("options").innerHTML = html;

/* TIMER */
let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);

}

function check(idx,btn){

let q = questions[i];

if(idx === q.a){
btn.classList.add("correct");
score++;
document.getElementById("score").innerText=score;
setTimeout(next,800);
}else{
btn.classList.add("wrong");
attempt++;
if(attempt===2) next();
}
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
}

</script>

</body>
</html>
