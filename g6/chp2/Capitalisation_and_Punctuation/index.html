<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBQ - Capitalisation & Punctuation</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef3ff;
overflow:hidden;
}

.screen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* LOGO */
#logo{
background:white;
}

#logo img{
width:220px;
}

/* TOPIC */
#topic{
background:#1e3a8a;
color:white;
font-size:28px;
font-weight:bold;
}

/* START */
#start{
background:#f4f7ff;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
cursor:pointer;
}

/* GAME */
#game{
display:none;
padding:10px;
}

.topbar{
display:flex;
justify-content:space-between;
background:#1e3a8a;
color:white;
padding:10px;
border-radius:10px;
}

.card{
background:white;
margin-top:10px;
padding:12px;
border-radius:12px;
}

.question{
font-size:15px;
font-weight:bold;
margin-bottom:10px;
white-space:pre-line;
}

.option{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:2px solid #ddd;
background:white;
text-align:left;
cursor:pointer;
}

/* POPUP */
#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:10px 18px;
border-radius:10px;
color:white;
font-weight:bold;
display:none;
z-index:999;
}

.good{background:green;}
.bad{background:red;}
</style>
</head>

<body>

<!-- LOGO (FIXED PATH) -->
<div id="logo" class="screen active">
<img src="g6/chp2/Capitalisation_and_Punctuation/assets/innovine-logo.png">
</div>

<!-- TOPIC -->
<div id="topic" class="screen">
CAPITALISATION & PUNCTUATION
</div>

<!-- START -->
<div id="start" class="screen">
<button onclick="startGame()">Start Mission</button>
</div>

<!-- GAME -->
<div id="game">

<div class="topbar">
<div>Score: <span id="score">0</span>/13</div>
<div>⏱ <span id="time">60</span></div>
</div>

<div class="card" id="card"></div>

</div>

<!-- POPUP -->
<div id="popup"></div>

<!-- AUDIO (FIXED PATHS) -->
<audio id="correctSound" src="g6/chp2/Capitalisation_and_Punctuation/assets/correct.mp3"></audio>
<audio id="wrongSound" src="g6/chp2/Capitalisation_and_Punctuation/assets/wrong.mp3"></audio>
<audio id="clapSound" src="g6/chp2/Capitalisation_and_Punctuation/assets/clapping.mp3"></audio>

<script>

let i=0;
let score=0;
let time=60;
let unlocked=false;

/* START */
function startGame(){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
loadQ();
timer();
}

/* TIMER */
function timer(){
setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) endGame();
},1000);
}

/* QUESTIONS (CHAPTER 2) */
const q=[
{
q:"Fix: hey aarav are you coming to dehradun",
options:[
"Hey Aarav, are you coming to Dehradun?",
"hey aarav are you coming",
"HEY AARAV",
"come dehradun"
],
a:0
},
{
q:"Correct sentence",
options:[
"Yes my mom said Ganges Tuesday",
"Yes, my mom said we visit the Ganges on Tuesday.",
"yes ganges",
"no capital"
],
a:1
},
{
q:"Wow expression",
options:[
"Wow that's amazing",
"Wow! That's amazing!",
"wow amazing",
"wow?"
],
a:1
}
];

/* LOAD */
function loadQ(){
let x=q[i];
let html=`<div class='question'>${x.q}</div>`;

x.options.forEach((o,idx)=>{
html+=`<button class='option' onclick='check(${idx})'>${o}</button>`;
});

document.getElementById("card").innerHTML=html;
}

/* CHECK */
function check(ans){
let x=q[i];

if(ans===x.a){
score++;
show("Correct ✔","good");
play("correctSound");
}else{
show("Wrong ✖","bad");
play("wrongSound");
}

setTimeout(()=>{
i++;
if(i<q.length) loadQ();
else endGame();
},800);
}

/* POPUP */
function show(msg,type){
let p=document.getElementById("popup");
p.innerText=msg;
p.className=type;
p.style.display="block";

setTimeout(()=>p.style.display="none",800);
}

/* AUDIO FIX */
function play(id){
document.getElementById(id).play().catch(()=>{});
}

/* END */
function endGame(){
document.getElementById("game").innerHTML=
`<h2>Completed</h2><p>Score: ${score}</p>`;
}

</script>

</body>
</html>
