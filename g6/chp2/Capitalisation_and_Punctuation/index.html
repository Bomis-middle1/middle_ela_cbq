
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBQ Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef3ff;
overflow:hidden;
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
}

.show{display:flex;}

/* LOGO */
#logo{
background:white;
}

/* TOPIC */
#topic{
background:#1e3a8a;
color:white;
font-size:28px;
font-weight:bold;
}

/* START */
#start{
background:#f4f7ff;
}

button{
padding:14px 20px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
font-size:16px;
cursor:pointer;
}

/* GAME */
#game{
display:none;
padding:10px;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
background:#1e3a8a;
color:white;
padding:10px;
border-radius:10px;
}

/* CARD */
.card{
background:white;
margin-top:10px;
padding:12px;
border-radius:12px;
}

/* QUESTION */
.q{
font-weight:bold;
font-size:14px;
margin-bottom:10px;
}

/* OPTIONS */
.opt{
display:block;
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:2px solid #ddd;
background:white;
text-align:left;
cursor:pointer;
}

/* POPUP */
#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:10px 18px;
border-radius:10px;
color:white;
font-weight:bold;
display:none;
z-index:9999;
}

.good{background:green;}
.bad{background:red;}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="screen show">
<img src="g6/chp1/nouns/assets/innovine-logo.png" width="220">
</div>

<!-- TOPIC -->
<div id="topic" class="screen">
NOUNS MISSION
</div>

<!-- START -->
<div id="start" class="screen">
<button onclick="enableSound()">Tap to Start</button>
</div>

<!-- GAME -->
<div id="game">

<div class="topbar">
<div>Score: <span id="score">0</span>/13</div>
<div>⏱ <span id="time">60</span></div>
</div>

<div class="card" id="card"></div>

</div>

<!-- POPUP -->
<div id="popup"></div>

<audio id="correct" src="g6/chp1/nouns/assets/correct.mp3"></audio>
<audio id="wrong" src="g6/chp1/nouns/assets/wrong.mp3"></audio>

<script>

let i=0,score=0,time=60,unlocked=false;

/* 1. FIXED FLOW */
setTimeout(()=>{
document.getElementById("logo").classList.remove("show");
document.getElementById("topic").classList.add("show");

setTimeout(()=>{
document.getElementById("topic").classList.remove("show");
document.getElementById("start").classList.add("show");
},3000);

},5000);

/* 2. SOUND UNLOCK */
function enableSound(){
unlocked=true;
startGame();
}

/* 3. START GAME */
function startGame(){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
loadQ();
timer();
}

/* 4. TIMER */
function timer(){
setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) endGame();
},1000);
}

/* 5. QUESTIONS */
const q=[
{
q:"Fix capitalisation: hey aarav are you coming to dehradun",
a:["Hey Aarav, are you coming to Dehradun?", "wrong1", "wrong2", "wrong3"],
c:0
},
{
q:"Correct sentence",
a:["Yes, we visit Ganges on Tuesday.", "wrong", "wrong", "wrong"],
c:0
},
{
q:"Wow expression",
a:["Wow! That's amazing!", "wrong", "wrong", "wrong"],
c:0
}
];

/* 6. LOAD */
function loadQ(){
let x=q[i];
let html=`<div class='q'>${x.q}</div>`;

x.a.forEach((o,idx)=>{
html+=`<button class='opt' onclick='check(${idx})'>${o}</button>`;
});

document.getElementById("card").innerHTML=html;
}

/* 7. CHECK */
function check(ans){
let x=q[i];

if(ans===x.c){
score++;
document.getElementById("score").innerText=score;
show("Correct ✔","good");
play("correct");
}else{
show("Wrong ✖","bad");
play("wrong");
}

setTimeout(()=>{
i++;
if(i<q.length) loadQ();
else endGame();
},900);
}

/* 8. POPUP FIX */
function show(msg,type){
let p=document.getElementById("popup");
p.innerText=msg;
p.className=type;
p.style.display="block";

setTimeout(()=>p.style.display="none",900);
}

/* 9. AUDIO FIX */
function play(id){
if(!unlocked) return;
document.getElementById(id).play().catch(()=>{});
}

/* 10. END */
function endGame(){
document.getElementById("game").innerHTML=
`<h2>Completed</h2><p>Score: ${score}</p>`;
}

</script>

</body>
</html>
