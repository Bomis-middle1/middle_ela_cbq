<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homophones CBQ Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef6ff,#f7fbff);
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
width:92%;
max-width:750px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

.option{
padding:12px;
margin:8px 0;
background:#f3f3f3;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{background:#e3f2fd}

img.qimg{
max-width:100%;
max-height:260px;
border-radius:12px;
margin:10px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.top{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
width:0%;
background:#4caf50;
transition:0.3s;
}

#msg{
font-size:14px;
color:#444;
margin-top:10px;
}

.observe{
font-size:18px;
margin-top:10px;
color:#333;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="center">
<img src="assests/innovine-logo.png"
style="width:180px"
onerror="this.outerHTML='<h3>Upload innovine-logo.png inside assests folder</h3>'">
</div>

<!-- INTRO -->
<div id="intro" class="center" style="display:none;">
<div class="card">
<h2>Chapter 23</h2>
<h3>Homophones, Homonyms & Homographs</h3>
<p>Grade 6 • English</p>
<p>15 Questions + Bonus</p>
<button onclick="startQuiz()">START QUIZ</button>
</div>
</div>

<!-- OBSERVE SCREEN -->
<div id="observe" class="center" style="display:none;">
<div class="card">
<h3>Observe the image carefully</h3>
<img id="obsImg" class="qimg">
<p class="observe">Look carefully and understand the meaning</p>
<button onclick="nextFromObserve()">Next</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="center" style="display:none;">
<div class="card">

<div class="top">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">45</span></div>
</div>

<div class="progress"><div class="fill" id="fill"></div></div>

<h3 id="qtext"></h3>

<img id="qimg" class="qimg" style="display:none">

<div id="options"></div>

<p id="msg"></p>

</div>
</div>

<!-- RESULT -->
<div id="result" class="center" style="display:none;">
<div class="card">
<h2 id="finalMsg"></h2>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<audio id="correct" src="assests/correct.mp3"></audio>
<audio id="wrong" src="assests/wrong.mp3"></audio>
<audio id="clap" src="assests/clapping.mp3"></audio>

<script>

/* ---------------- QUESTIONS ---------------- */
const questions = [
{
type:"text",
q:"Riya is texting directions: I am ___ waiting for you.",
options:["their","there","here","hear"],
answer:"here"
},
{
type:"text",
q:"Mix one cup of ___ with sugar.",
options:["flower","flour","floor","fleur"],
answer:"flour"
},
{
type:"text",
q:"Meaning of 'wound' shows:",
options:["Homophone","Homograph","Homonym","Same meaning"],
answer:"Homograph"
},
{
type:"text",
q:"Bank (river / money) is a:",
options:["Homophone","Homograph","Homonym","Antonym"],
answer:"Homonym"
},

/* ---------------- IMAGE Q6 ---------------- */
{
type:"observe",
image:"assests/picture1.png",
q:"Q6: Based on the worksheet, choose correct order of words.",
options:["their / there / they're / their",
"they're / there / their / their",
"there / their / they're / there",
"they're / their / there / they're"],
answer:"there / their / they're / there"
},

/* ---------------- IMAGE Q7 ---------------- */
{
type:"observe",
image:"assests/picture2.png",
q:"Q7: What type of word relationship is shown?",
options:["Homophones","Homographs","Homonyms","Antonyms"],
answer:"Homonyms"
},

{
type:"text",
q:"I need to ___ a letter.",
options:["right","write","rite","wright"],
answer:"write"
},

{
type:"text",
q:"Lead pipe / lead team shows:",
options:["Homophone","Homograph","Homonym","Same"],
answer:"Homograph"
}
];

/* ---------------- STATE ---------------- */
let index=0;
let score=0;
let attempts=0;
let pendingObserve=false;

/* ---------------- SPLASH ---------------- */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("intro").style.display="flex";
},5000);

/* ---------------- START ---------------- */
function startQuiz(){
document.getElementById("intro").style.display="none";
loadQuestion();
}

/* ---------------- LOAD ---------------- */
function loadQuestion(){

if(index>=questions.length){
showResult();
return;
}

attempts=0;

let q=questions[index];

/* IMAGE OBSERVE FLOW */
if(q.type==="observe"){
pendingObserve=true;

document.getElementById("observe").style.display="flex";
document.getElementById("obsImg").src=q.image;
return;
}

/* NORMAL QUESTION */
showQuiz(q);
}

function nextFromObserve(){
document.getElementById("observe").style.display="none";
showQuiz(questions[index]);
}

function showQuiz(q){

document.getElementById("quiz").style.display="flex";

document.getElementById("qtext").innerText=q.q;

let html="";
let shuffled=[...q.options].sort(()=>Math.random()-0.5);

shuffled.forEach(o=>{
html+=`<div class="option" onclick="check('${o}')">${o}</div>`;
});

document.getElementById("options").innerHTML=html;

document.getElementById("fill").style.width=
(index/questions.length)*100+"%";
}

/* ---------------- CHECK ---------------- */
function check(opt){

let q=questions[index];

if(opt===q.answer){
score++;
document.getElementById("score").innerText=score;
next();
}else{
attempts++;
if(attempts<2){
document.getElementById("msg").innerText="Try Again!";
}else{
document.getElementById("msg").innerText=
"Correct Answer: "+q.answer;
setTimeout(next,2000);
}
}
}

/* ---------------- NEXT ---------------- */
function next(){
index++;
document.getElementById("msg").innerText="";
document.getElementById("quiz").style.display="none";
loadQuestion();
}

/* ---------------- RESULT ---------------- */
function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="flex";

let percent=Math.round((score/questions.length)*100);

document.getElementById("finalScore").innerText=
"Score: "+score+"/"+questions.length+" ("+percent+"%)";

let msg="💪 Keep Practising!";
if(percent>=70) msg="🏆 Outstanding!";
else if(percent>=60) msg="🌟 Excellent!";
else if(percent>=45) msg="😊 Good Job!";

document.getElementById("finalMsg").innerText=msg;

if(percent>=70){
document.getElementById("clap").play();
}
}

</script>

</body>
</html>
