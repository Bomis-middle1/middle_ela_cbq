<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homophones CBQ Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef6ff,#f7fbff);
overflow-x:hidden;
}

/* FLOATING BACKGROUND */
.star{
position:fixed;
width:6px;
height:6px;
background:#ffffff55;
border-radius:50%;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* LAYOUT */
.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.12);
width:92%;
max-width:780px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

.option{
padding:12px;
margin:8px 0;
background:#f3f3f3;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{background:#e3f2fd}

/* IMAGE */
img{
max-width:100%;
max-height:220px;
object-fit:contain;
border-radius:12px;
margin:10px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* TOP BAR */
.top{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
}

.timer{
font-weight:bold;
color:#d32f2f;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
width:0%;
background:#4caf50;
transition:0.3s;
}

/* FEEDBACK */
.correct{background:#c8f7c5 !important}
.wrong{background:#ffd6d6 !important}

#msg{
font-size:14px;
margin-top:10px;
color:#444;
}
</style>
</head>

<body>

<!-- BACKGROUND ANIMATION -->
<script>
for(let i=0;i<25;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(6+Math.random()*8)+"s";
document.body.appendChild(s);
}
</script>

<!-- SPLASH -->
<div id="splash" class="center">
<img src="assets/innovine-logo.png"
style="width:180px"
onerror="this.outerHTML='<h3>⚠️ Upload innovine-logo.png inside assets folder</h3>'">
</div>

<!-- INTRO -->
<div id="intro" class="center" style="display:none;">
<div class="card">
<h2>Homophones, Homonyms & Homographs</h2>
<p>Grade 6 English CBQ</p>
<button onclick="startGame()">START QUIZ</button>
</div>
</div>

<!-- OBSERVE SCREEN -->
<div id="observe" class="center" style="display:none;">
<div class="card">
<h3>👀 Observe Carefully</h3>
<img id="obsImg">
<p>Study the image before answering</p>
<button onclick="nextFromObserve()">Next</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="center" style="display:none;">
<div class="card">

<div class="top">
<div>Score: <span id="score">0</span></div>
<div class="timer">Time: <span id="time">45</span></div>
</div>

<div class="progress"><div class="fill" id="fill"></div></div>

<h3 id="qtext"></h3>

<div id="options"></div>

<p id="msg"></p>

</div>
</div>

<!-- RESULT -->
<div id="result" class="center" style="display:none;">
<div class="card">
<h2 id="finalMsg"></h2>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<audio id="clap" src="assets/clapping.mp3"></audio>
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

/* ================= QUESTIONS ================= */

const questions = [
{
type:"text",
q:`Q1. Riya is texting directions: I am ___ waiting for you near the gate.`,
options:["their","there","here","hear"],
answer:"there"
},
{
type:"text",
q:`Q2. Mix one cup of ___ with sugar.`,
options:["flower","flour","floor","fleur"],
answer:"flour"
},

/* OBSERVE Q6 */
{
type:"observe",
image:"assets/picture1.png",
q:`Q6. Which set correctly fills all blanks in order?`,
options:[
"they're / their / there / they're",
"they're / there / their / their",
"there / their / they're / there",
"their / there / they're / their"
],
answer:"there / their / they're / there"
},

/* OBSERVE Q7 */
{
type:"observe",
image:"assets/picture2.png",
q:`Q7. What type of word relationship is shown?`,
options:["Homophones","Homographs","Homonyms","Antonyms"],
answer:"Homonyms"
},

{
type:"text",
q:`Q8. I need to ___ a letter.`,
options:["right","write","rite","wright"],
answer:"write"
}
];

/* ================= STATE ================= */

let index=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=45;

/* ================= SPLASH ================= */

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("intro").style.display="flex";
},5000);

/* ================= START ================= */

function startGame(){
document.getElementById("intro").style.display="none";
loadQuestion();
}

/* ================= LOAD ================= */

function loadQuestion(){

if(index>=questions.length){
showResult();
return;
}

let q=questions[index];

if(q.type==="observe"){
document.getElementById("observe").style.display="flex";
document.getElementById("quiz").style.display="none";
document.getElementById("obsImg").src=q.image;
return;
}

showQuiz(q);
}

/* ================= NEXT OBSERVE ================= */

function nextFromObserve(){
document.getElementById("observe").style.display="none";
showQuiz(questions[index]);
}

/* ================= SHOW QUIZ ================= */

function showQuiz(q){

document.getElementById("quiz").style.display="flex";
document.getElementById("msg").innerText="";
document.getElementById("qtext").innerText=q.q;

let html="";
q.options.forEach(o=>{
html+=`<div class="option" onclick="check('${o}',this)">${o}</div>`;
});

document.getElementById("options").innerHTML=html;

startTimer();
}

/* ================= TIMER ================= */

function startTimer(){
clearInterval(timer);
timeLeft=45;
document.getElementById("time").innerText=timeLeft;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;

if(timeLeft<=0){
wrongAnswer();
}
},1000);
}

/* ================= CHECK ================= */

function check(opt,el){

let q=questions[index];

if(opt===q.answer){
score++;
document.getElementById("score").innerText=score;
el.classList.add("correct");
setTimeout(()=>next(),700);
}else{
attempts++;
el.classList.add("wrong");

if(attempts<2){
document.getElementById("msg").innerText="Try again!";
}else{
wrongAnswer();
}
}
}

/* ================= WRONG ================= */

function wrongAnswer(){
index++;
attempts=0;
loadQuestion();
}

/* ================= NEXT ================= */

function next(){
index++;
attempts=0;
loadQuestion();
}

/* ================= RESULT ================= */

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="flex";

let percent=Math.round((score/questions.length)*100);

let msg="Keep Practising!";
if(percent>=70) msg="🏆 Outstanding!";
else if(percent>=60) msg="🌟 Excellent!";
else if(percent>=45) msg="😊 Good Job!";

document.getElementById("finalMsg").innerText=msg;
document.getElementById("finalScore").innerText=
"Score: "+score+"/"+questions.length+" ("+percent+"%)";
}

</script>

</body>
</html>
