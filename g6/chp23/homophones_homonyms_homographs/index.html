<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Quiz Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#eaf6ff,#f7fbff);
overflow:hidden;
}

/* floating background animation */
.bg-star{
position:fixed;
width:6px;height:6px;
background:#ffffff55;
border-radius:50%;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* layout */
.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.12);
width:92%;
max-width:780px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

/* options */
.option{
padding:12px;
margin:8px 0;
background:#f3f3f3;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}
.option:hover{background:#e3f2fd}

/* visuals */
.correctFlash{
background:#c8f7c5 !important;
animation:pop 0.4s;
}
.wrongFlash{
background:#ffd6d6 !important;
animation:shake 0.4s;
}

@keyframes pop{0%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
100%{transform:translateX(0)}
}

/* image */
img{
max-width:100%;
max-height:240px;
border-radius:12px;
margin:10px 0;
}

/* top bar */
.top{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
}

/* timer */
.timer{
font-weight:bold;
color:#d32f2f;
}

/* confetti */
.confetti{
position:fixed;
width:8px;height:8px;
background:gold;
top:0;
animation:fall 2s linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh);opacity:0}
}
</style>
</head>

<body>

<!-- background stars -->
<script>
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="bg-star";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(s);
}
</script>

<!-- SPLASH -->
<div id="splash" class="center">
<img src="assets/innovine-logo.png"
style="width:180px"
onerror="this.outerHTML='<h3>⚠️ Upload innovine-logo.png inside assets folder</h3>'">
</div>

<!-- INTRO -->
<div id="intro" class="center" style="display:none;">
<div class="card">
<h2>Homophones CBQ Game</h2>
<p>Grade 6 English</p>
<button onclick="startGame()">START</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="center" style="display:none;">
<div class="card">

<div class="top">
<div>Score: <span id="score">0</span></div>
<div class="timer">Time: <span id="time">45</span></div>
</div>

<h3 id="qtext"></h3>
<img id="img" style="display:none">

<div id="options"></div>

<p id="msg"></p>

</div>
</div>

<!-- RESULT -->
<div id="result" class="center" style="display:none;">
<div class="card">
<h2 id="finalMsg"></h2>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<audio id="clap" src="assets/clapping.mp3"></audio>
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

/* ================= DATA ================= */

const questions = [
{
q:"Riya is texting directions: I am ___ waiting for you near the gate.",
options:["their","there","here","hear"],
answer:"there",
explanation:"'There' refers to a place."
},
{
q:"Mix one cup of ___ with sugar.",
options:["flower","flour","floor","fleur"],
answer:"flour",
explanation:"Flour is used in baking."
},
{
q:"Bank (river / money) is a:",
options:["Homophone","Homograph","Homonym","Antonym"],
answer:"Homonym",
explanation:"Same spelling, different meanings."
},
{
q:"Lead pipe / lead team:",
options:["Homophone","Homograph","Homonym","Same"],
answer:"Homograph",
explanation:"Different pronunciation."
}
];

/* ================= STATE ================= */

let index=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=45;

/* ================= START ================= */

function startGame(){
document.getElementById("intro").style.display="none";
loadQ();
}

/* ================= LOAD QUESTION ================= */

function loadQ(){

if(index>=questions.length){
finalChallenge();
return;
}

let q=questions[index];

attempts=0;
timeLeft=45;

document.getElementById("quiz").style.display="flex";
document.getElementById("msg").innerText="";

document.getElementById("qtext").innerText=q.q;

let html="";
q.options.forEach(o=>{
html+=`<div class='option' onclick="check('${o}',this)">${o}</div>`;
});
document.getElementById("options").innerHTML=html;

startTimer();
}

/* ================= TIMER ================= */

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;

if(timeLeft<=0){
wrongAnswer(true);
}
},1000);
}

/* ================= CHECK ================= */

function check(opt,el){

let q=questions[index];

if(opt===q.answer){
score++;
document.getElementById("score").innerText=score;
el.classList.add("correctFlash");
playSound("correct");
setTimeout(()=>next(),800);
}else{
attempts++;
el.classList.add("wrongFlash");
playSound("wrong");

if(attempts<2){
document.getElementById("msg").innerText="Try again!";
}else{
wrongAnswer(false);
}
}
}

/* ================= WRONG ================= */

function wrongAnswer(timeout){

let q=questions[index];

document.getElementById("msg").innerText=
"Correct Answer: "+q.answer+" | "+q.explanation;

setTimeout(()=>next(),1500);
}

/* ================= NEXT ================= */

function next(){
index++;
loadQ();
}

/* ================= FINAL CHALLENGE ================= */

function finalChallenge(){

document.getElementById("quiz").style.display="none";

let bonus = confirm("FINAL CHALLENGE: Answer correctly for +2 points!\n\n'bat (animal) / bat (sports)' is what type?");

if(bonus){
score+=2;
showConfetti();
}

showResult();
}

/* ================= RESULT ================= */

function showResult(){

document.getElementById("result").style.display="flex";

let total = questions.length+2;
let percent=Math.round((score/total)*100);

document.getElementById("finalScore").innerText=
"Score: "+score+"/"+total+" ("+percent+"%)";

let msg="Keep Practising!";
if(percent>=70) msg="🏆 Outstanding!";
else if(percent>=60) msg="🌟 Excellent!";
else if(percent>=45) msg="😊 Good Job!";

document.getElementById("finalMsg").innerText=msg;

if(percent>=70){
document.getElementById("clap").play();
}
}

/* ================= AUDIO ================= */

function playSound(id){
let a=document.getElementById(id);
if(!a) return;
a.currentTime=0;
a.play().catch(()=>{});
}

/* ================= CONFETTI ================= */

function showConfetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["gold","skyblue","pink","lightgreen"][Math.floor(Math.random()*4)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

</script>

</body>
</html>
