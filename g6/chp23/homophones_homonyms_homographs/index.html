<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homophones CBQ Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef6ff,#f7fbff);
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
width:92%;
max-width:780px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

.option{
padding:12px;
margin:8px 0;
background:#f3f3f3;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{background:#e3f2fd}

img.qimg{
max-width:100%;
max-height:220px;
object-fit:contain;
border-radius:12px;
margin:10px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.top{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
width:0%;
background:#4caf50;
transition:0.3s;
}

#msg{
font-size:14px;
margin-top:10px;
color:#444;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="center">
<img src="assests/innovine-logo.png"
style="width:180px"
onerror="this.outerHTML='<h3>Upload innovine-logo.png inside assests folder</h3>'">
</div>

<!-- INTRO -->
<div id="intro" class="center" style="display:none;">
<div class="card">
<h2>Chapter 23</h2>
<h3>Homophones, Homonyms & Homographs</h3>
<p>Grade 6 English CBQ</p>
<button onclick="startQuiz()">START QUIZ</button>
</div>
</div>

<!-- OBSERVE SCREEN -->
<div id="observe" class="center" style="display:none;">
<div class="card">
<h3>Observe the image carefully</h3>
<img id="obsImg" class="qimg">
<p>Think before answering the question</p>
<button onclick="nextFromObserve()">Next</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="center" style="display:none;">
<div class="card">

<div class="top">
<div>Score: <span id="score">0</span></div>
<div>Time: 45</div>
</div>

<div class="progress"><div class="fill" id="fill"></div></div>

<h3 id="qtext"></h3>

<div id="options"></div>

<p id="msg"></p>

</div>
</div>

<!-- RESULT -->
<div id="result" class="center" style="display:none;">
<div class="card">
<h2 id="finalMsg"></h2>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<!-- AUDIO -->
<audio id="correct" src="assests/correct.mp3"></audio>
<audio id="wrong" src="assests/wrong.mp3"></audio>
<audio id="clap" src="assests/clapping.mp3"></audio>

<script>

/* ================= QUESTIONS (STRICT - NO CHANGE) ================= */

const questions = [
{
type:"text",
q:`Q1. Riya is texting directions to Aarav: "Come to the park. I am ___ waiting for you near the gate." Which word correctly fills the blank?`,
options:["their","there","here","hear"],
answer:"there"
},

{
type:"text",
q:`Q2. Meera is writing a recipe: "Mix one cup of ___ with sugar and knead into dough." Which homophone is correct?`,
options:["flower","flour","floor","fleur"],
answer:"flour"
},

{
type:"text",
q:`Q3. Rohan's science teacher wrote two sentences on the board: Sentence A: "The doctor dressed the wound carefully." Sentence B: "She wound the thread around the bobbin." What does this tell us about the word 'wound'?`,
options:[
"It is a homophone — same sound, different spelling",
"It is a homograph — same spelling but different pronunciation and meaning",
"It is a homonym — same sound and spelling, same meaning",
"Both sentences use 'wound' in exactly the same way"
],
answer:"It is a homograph — same spelling but different pronunciation and meaning"
},

{
type:"text",
q:`Q4. A student reads: "The bank was flooded after the heavy rains." His friend reads: "I deposited my savings at the bank." What kind of word is 'bank'?`,
options:[
"Homophone",
"Homograph",
"Homonym",
"They are two different words"
],
answer:"Homonym"
},

{
type:"text",
q:`Q5. Aarav is writing a story: "The brave ___ rode through the dark ___."`,
options:["night / knight","knight / night","knight / knight","night / night"],
answer:"knight / night"
},

/* ================= OBSERVE Q6 ================= */

{
type:"observe",
image:"assests/picture1.png",
q:`Q6. Which set correctly fills all four blanks in order?`,
options:[
"they're / their / there / they're",
"they're / there / their / their",
"their / there / they're / their",
"there / their / they're / there"
],
answer:"there / their / they're / there"
},

/* ================= OBSERVE Q7 ================= */

{
type:"observe",
image:"assests/picture2.png",
q:`Q7. What type of word relationship is shown?`,
options:[
"Homophones",
"Homographs",
"Homonyms",
"Antonyms"
],
answer:"Homonyms"
},

{
type:"text",
q:`Q8. A student writes: "I need to right a letter to my teacher." What is the error?`,
options:[
"right should be rite",
"right should be write",
"no error",
"right should be wright"
],
answer:"right should be write"
},

{
type:"text",
q:`Q9. Lead pipe / lead team shows:`,
options:["Homophone","Homograph","Homonym","Same meaning"],
answer:"Homograph"
}
];

/* ================= STATE ================= */

let index=0;
let score=0;

/* ================= SPLASH ================= */

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("intro").style.display="flex";
},5000);

/* ================= START ================= */

function startQuiz(){
document.getElementById("intro").style.display="none";
loadQuestion();
}

/* ================= LOAD ================= */

function loadQuestion(){

if(index>=questions.length){
showResult();
return;
}

let q=questions[index];

/* OBSERVE FLOW */
if(q.type==="observe"){
document.getElementById("observe").style.display="flex";
document.getElementById("obsImg").src=q.image;
return;
}

showQuiz(q);
}

/* ================= NEXT FROM OBSERVE ================= */

function nextFromObserve(){
document.getElementById("observe").style.display="none";
showQuiz(questions[index]);
}

/* ================= SHOW QUIZ ================= */

function showQuiz(q){

document.getElementById("quiz").style.display="flex";

document.getElementById("qtext").innerText=q.q;

let opts=[...q.options].sort(()=>Math.random()-0.5);

let html="";
opts.forEach(o=>{
html+=`<div class="option" onclick="check('${o}')">${o}</div>`;
});

document.getElementById("options").innerHTML=html;

}

/* ================= CHECK ================= */

function check(opt){

let q=questions[index];

if(opt===q.answer){
score++;
document.getElementById("score").innerText=score;
index++;
loadQuestion();
}else{
index++;
loadQuestion();
}
}

/* ================= RESULT ================= */

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="flex";

let percent=Math.round((score/questions.length)*100);

let msg="Keep Practising!";
if(percent>=70) msg="🏆 Outstanding!";
else if(percent>=60) msg="🌟 Excellent!";
else if(percent>=45) msg="😊 Good Job!";

document.getElementById("finalMsg").innerText=msg;
document.getElementById("finalScore").innerText=
"Score: "+score+"/"+questions.length+" ("+percent+"%)";
}

</script>

</body>
</html>
