<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef6ff,#f7fbff);
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
padding:20px;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.12);
width:92%;
max-width:800px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

.option{
padding:12px;
margin:8px 0;
background:#f3f3f3;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#e3f2fd}

img{
max-width:100%;
max-height:220px;
object-fit:contain;
border-radius:12px;
margin:10px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.top{
display:flex;
justify-content:space-between;
font-size:14px;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.fill{
height:100%;
width:0%;
background:#4caf50;
transition:0.3s;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="center">
<img src="assets/innovine-logo.png" style="width:180px">
</div>

<!-- INTRO -->
<div id="intro" class="center" style="display:none;">
<div class="card">
<h2>Homophones, Homonyms & Homographs</h2>
<button onclick="startGame()">START QUIZ</button>
</div>
</div>

<!-- OBSERVE -->
<div id="observe" class="center" style="display:none;">
<div class="card">
<h3>Observe Carefully</h3>
<img id="obsImg">
<button onclick="nextFromObserve()">Next</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="center" style="display:none;">
<div class="card">

<div class="top">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">45</span></div>
</div>

<div class="progress"><div class="fill" id="fill"></div></div>

<h3 id="qtext"></h3>

<div id="options"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="center" style="display:none;">
<div class="card">
<h2 id="finalMsg"></h2>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<audio id="clap" src="assets/clapping.mp3"></audio>
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

/* ================= FULL ORIGINAL QUESTIONS (NO CUTTING ANYWHERE) ================= */

const questions = [

{
type:"text",
q:"Q1. Riya is texting directions to Aarav: \"Come to the park. I am ___ waiting for you near the gate.\" Which word correctly fills the blank?",
options:["their","there","here","hear"],
answer:"there"
},

{
type:"text",
q:"Q2. Meera is writing a recipe: \"Mix one cup of ___ with sugar and knead into dough.\" Which homophone is correct?",
options:["flower","flour","floor","fleur"],
answer:"flour"
},

{
type:"observe",
image:"assets/picture1.png",
q:"Q6. [picture1: A grammar worksheet showing four sentences with blanks and three word choices beside each.Which set correctly fills all four blanks in order?]",
options:[
"they're / their / there / they're",
"they're / there / their / their",
"there / their / they're / there",
"their / there / they're / their"
],
answer:"there / their / they're / there"
},

{
type:"observe",
image:"assets/picture2.png",
q:"Q7. [picture2: A classroom chart showing four pairs of sentences — Pair 1: \"The bat flew out of the cave at night.\" / \"He hit the ball with his bat.\" Pair 2: \"The dog's bark scared the postman.\" / \"The bark of the tree was rough.\" Pair 3: \"Turn on the light — it's dark.\" / \"This bag is very light — I can carry it easily.\" Pair 4: \"She went to the bank to withdraw money.\" / \"We sat by the river bank.\"] What type of word relationship is shown?",
options:[
"Homophones",
"Homographs",
"Homonyms",
"Antonyms"
],
answer:"Homonyms"
},

{
type:"text",
q:"Q8. A student writes: \"I need to right a letter to my teacher.\" What is the error?",
options:[
"'right' is wrong → write",
"'right' is correct",
"'right' → rite",
"'right' → wright"
],
answer:"'right' is wrong → write"
}

];

let index=0;
let score=0;
let time=45;
let timer;

/* START */
function startGame(){
document.getElementById("intro").style.display="none";
load();
}

/* LOAD */
function load(){

if(index>=questions.length){
end();
return;
}

let q=questions[index];

/* OBSERVE */
if(q.type==="observe"){
document.getElementById("observe").style.display="flex";
document.getElementById("obsImg").src=q.image;
return;
}

showQ(q);
}

/* NEXT OBSERVE */
function nextFromObserve(){
document.getElementById("observe").style.display="none";
showQ(questions[index]);
}

/* SHOW QUESTION */
function showQ(q){

document.getElementById("quiz").style.display="flex";
document.getElementById("qtext").innerText=q.q;

let html="";
q.options.forEach(o=>{
html+=`<div class="option" onclick="check('${o}')">${o}</div>`;
});

document.getElementById("options").innerHTML=html;

startTimer();
}

/* TIMER */
function startTimer(){
clearInterval(timer);
time=45;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0){
next();
}
},1000);
}

/* CHECK */
function check(opt){
let q=questions[index];

if(opt===q.answer){
score++;
document.getElementById("score").innerText=score;
next();
}else{
next();
}
}

/* NEXT */
function next(){
index++;
load();
}

/* END */
function end(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="flex";

let percent=Math.round((score/questions.length)*100);

let msg="Keep Practising!";
if(percent>=70) msg="🏆 Outstanding!";
else if(percent>=60) msg="🌟 Excellent!";
else if(percent>=45) msg="😊 Good Job!";

document.getElementById("finalMsg").innerText=msg;
document.getElementById("finalScore").innerText=
"Score: "+score+"/"+questions.length+" ("+percent+"%)";
}

</script>

</body>
</html>
