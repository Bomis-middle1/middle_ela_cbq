<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Subject & Predicate Mastery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary: #1976d2;
  --primary-hover: #115293;
  --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #fce4ec 100%);
  --surface: #ffffff;
  --text-main: #2c3e50;
  --text-muted: #7f8c8d;
  --correct: #2ecc71;
  --correct-bg: #e8f8f0;
  --wrong: #e74c3c;
  --wrong-bg: #fdedec;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg-gradient);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

.screen {
  display: none;
  width: 100%;
  max-width: 650px;
  margin: 20px;
  padding: 40px 30px;
  background: var(--surface);
  border-radius: 24px;
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.06), 0 5px 15px rgba(0, 0, 0, 0.04);
  text-align: center;
  animation: fadeIn 0.4s ease-out;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

#intro {
  background: transparent;
  box-shadow: none;
}

.logo {
  width: 180px;
  margin-bottom: 20px;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.04); opacity: 1; }
}

h1 { font-size: 2rem; color: #1a252f; margin-bottom: 15px; font-weight: 800; }
h2 { font-size: 1.2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
h3 { font-size: 1.35rem; color: #1a252f; margin-bottom: 20px; font-weight: 700; text-align: left; line-height: 1.5; width: 100%; }
p { color: var(--text-muted); line-height: 1.6; font-size: 1.05rem; margin-bottom: 24px; }

.btn {
  display: inline-block;
  padding: 14px 35px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 12px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 10px rgba(25, 118, 210, 0.25);
}

.btn:hover {
  background: var(--primary-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 15px rgba(25, 118, 210, 0.35);
}

.utility-btn {
  background: #f4f6f7;
  color: var(--text-main);
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  border: 1px solid #e1e8ed;
  cursor: pointer;
}

.utility-btn:hover { background: #eaeded; }

.picture {
  width: 100%;
  max-height: 240px;
  object-fit: contain;
  margin-bottom: 20px;
  border-radius: 14px;
  border: 1px solid #e1e8ed;
  background: #fdfefe;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 15px;
  width: 100%;
}

.timer {
  font-weight: bold;
  background: #fff3cd;
  color: #856404;
  padding: 4px 14px;
  border-radius: 20px;
}

.progress {
  height: 8px;
  background: #eaeded;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 25px;
  width: 100%;
}

.progress-bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
  transition: width 0.3s ease;
}

#options {
  width: 100%;
}

.option {
  display: block;
  width: 100%;
  background: #fdfefe;
  margin: 12px 0;
  padding: 16px 20px;
  border: 2px solid #e2ebf0;
  border-radius: 14px;
  cursor: pointer;
  text-align: left;
  font-size: 0.98rem;
  line-height: 1.4;
  color: #34495e;
  transition: all 0.2s ease;
}

.option:hover {
  background: #f4f6f7;
  border-color: #bdc3c7;
  transform: translateX(4px);
}

.option.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
  color: #196f3d;
  font-weight: 600;
}

.option.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
  color: #943126;
}

.disabled {
  pointer-events: none;
}

#msg {
  font-size: 1rem;
  font-weight: 600;
  margin-top: 15px;
  min-height: 24px;
  width: 100%;
  text-align: left;
  line-height: 1.4;
}

#finalScore {
  font-size: 3.5rem;
  color: var(--primary);
  margin: 20px 0;
  font-weight: 800;
}

.shake {
  animation: shake 0.4s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
</style>
</head>

<body>

<div id="intro" class="screen active">
  <img src="assets/innovine-logo.png" class="logo" alt="Logo">
  <h2>Loading Chapter Content...</h2>
</div>

<div id="start" class="screen">
  <h2>Grade 6 ELA</h2>
  <h1>Subject & Predicate</h1>
  <p>Total Assessment Content: 15 Questions</p>
  <button class="btn" onclick="startGame()">Start Challenge</button>
</div>

<div id="quiz" class="screen">
  <div class="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>Question <span id="qno">1</span>/15</div>
    <div class="timer">⏱ <span id="timerText">60</span>s</div>
    <div style="display: flex; gap: 6px;">
      <button class="utility-btn" onclick="toggleMute()" id="muteBtn">🔊</button>
      <button class="utility-btn" onclick="restart()">🔁</button>
    </div>
  </div>

  <div class="progress"><div id="bar" class="progress-bar"></div></div>

  <div id="pictureArea" style="width:100%;"></div>
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="msg"></p>
</div>

<div id="result" class="screen">
  <h2>Performance Summary</h2>
  <h1>Result</h1>
  <div id="finalScore">0/15</div>
  <p id="perf" style="font-weight:600; color:#1a252f;"></p>
  <button class="btn" onclick="restart()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const questions = [
  {
    q: "A teacher writes this on the board:\n\"The tall oak tree at the corner of our school fell during the storm.\"\n\nWhich option correctly identifies the complete subject?",
    options: [
      "fell during the storm",
      "The tall oak tree at the corner of our school",
      "the corner of our school",
      "The tall oak tree"
    ],
    answer: 1,
    hint: "Look for who or what the whole sentence is talking about.",
    explain: "The complete subject includes the noun phrase and all associated structural modifiers description elements."
  },
  {
    q: "Riya reads:\n\"The small brown puppy with the torn ear barked at the postman.\"\n\nWhat is the simple subject?",
    options: [
      "The small brown puppy",
      "barked at the postman",
      "puppy",
      "postman"
    ],
    answer: 2,
    hint: "Find the single core noun executing the main verb action.",
    explain: "The simple subject is the specific foundational noun stripped of modifying descriptors."
  },
  {
    q: "In the sentence:\n\"Down the long winding road walked the tired soldier.\"\n\nWhat is the subject?",
    options: [
      "Down the long winding road",
      "walked",
      "the tired soldier",
      "road"
    ],
    answer: 2,
    hint: "Identify who actually executed the action of walking.",
    explain: "In an inverted sentence structure, the subject is positioned downstream following the main verb."
  },
  {
    q: "Students are asked:\n\"Are the science textbooks on the shelf?\"\n\nWhere is the subject?",
    options: [
      "Are",
      "the shelf",
      "on the shelf",
      "the science textbooks"
    ],
    answer: 3,
    hint: "In questions, the subject normally splits or follows the opening verb phrase elements.",
    explain: "The true subject of an interrogative construction typically follows the helper auxiliary verb directly."
  },
  {
    q: "Zara writes:\n\"There are twelve players on the football field.\"\n\nWhat is the real subject?",
    options: ["There", "twelve", "the football field", "twelve players"],
    answer: 3,
    hint: "Ignore introductory words like 'There'. Focus on what actually exists.",
    explain: "Words like 'there/here' act as placeholders; the structural subject is the active noun clause following the verb."
  },
  {
    q: "Which strip is the complete subject and which is the complete predicate?",
    options: [
      "Strip A = subject; Strip B = predicate",
      "Strip B = subject; Strip A = predicate",
      "Both strips are subjects",
      "Both strips are predicates"
    ],
    answer: 1,
    hint: "Subject represents the actor entity; Predicate declares the action/state details.",
    explain: "The sentence correctly breaks out the main structural noun collection from the operational verb block phrase.",
    imageTrigger: 1
  },
  {
    q: "What does the underlined part represent?",
    options: [
      "Simple predicate",
      "Complete predicate",
      "Complete subject",
      "Simple subject"
    ],
    answer: 2,
    hint: "Examine whether it includes the entire primary descriptive block introducing the clause actor.",
    explain: "The complete block incorporates the primary reference element alongside its accompanying modifiers.",
    imageTrigger: 2
  },
  {
    q: "Identify the simple predicate in the sentence:\n\"The sleepy students slowly walked into the crowded hall.\"",
    options: [
      "slowly walked",
      "the sleepy students",
      "walked",
      "into the crowded hall"
    ],
    answer: 2,
    hint: "Isolate the precise single functional core action verb item.",
    explain: "The simple predicate refers strictly to the singular main structural operating verb context."
  },
  {
    q: "Which sentence can stand alone as a complete sentence block?",
    options: [
      "Running through the fields.",
      "The children in the park.",
      "The birds sang sweetly at dawn.",
      "All the flowers in the garden."
    ],
    answer: 2,
    hint: "A standalone complete statement strictly requires both an active subject and a functional predicate.",
    explain: "Only option C presents a fully functional clause satisfying all contextual subject-verb dependencies."
  },
  {
    q: "Classify the parts of the sentence:\n\"The little girl laughed.\"",
    options: [
      "Subject: girl | Predicate: little girl laughed",
      "Subject: The little girl | Predicate: laughed",
      "Subject: laughed | Predicate: The little girl",
      "Subject: The little | Predicate: girl laughed"
    ],
    answer: 1,
    hint: "Group the complete agent entity apart from the operational action event.",
    explain: "The statement splits cleanly into a complete identifying noun subject block and its single predicate action verb."
  },
  {
    q: "Which is the complete predicate in this sentence:\n\"The hungry cat drank the warm milk.\"",
    options: [
      "The hungry cat",
      "The hungry cat drank",
      "drank the warm milk",
      "the warm milk"
    ],
    answer: 2,
    hint: "Locate the primary action verb and include all trailing modifying object phrases.",
    explain: "The complete predicate starts from the opening action verb element and captures all descriptive target parameters down to the period."
  },
  {
    q: "Which is NOT a complete sentence?",
    options: [
      "The moon rose over the mountains.",
      "After the long and tiring journey.",
      "She sang a beautiful song.",
      "Dogs make wonderful pets."
    ],
    answer: 1,
    hint: "Look for a dependent prepositional phrase fragment that lacks an operational main action verb or actor.",
    explain: "Option B forms an introductory temporal fragment lacking concrete primary action predicates or core structural elements."
  },
  {
    q: "Find the error structural issue within the following collection:\nLine 1: Every morning, the students arrive on time.\nLine 2: The new library books are exciting.\nLine 3: Opened last Tuesday.",
    options: [
      "Line 1 has a missing predicate",
      "Line 2 has a missing subject",
      "Line 3 is a fragment sentence lacking a subject",
      "There are no structural errors present"
    ],
    answer: 2,
    hint: "Examine the third line to determine who or what was actually opened.",
    explain: "Line 3 introduces a broken past-participial fragment missing its coordinating subject connection point entirely."
  },
  {
    q: "What structural effect happens to a complete sentence clause if its entire predicate component is removed?",
    options: [
      "It becomes an interrogative question",
      "It turns into an imperative command phrase",
      "It breaks down into an incomplete fragment sentence",
      "It automatically scales into a complex compound sentence frame"
    ],
    answer: 2,
    hint: "Stripping away the functional action leaves behind an isolated noun reference item without operational focus.",
    explain: "Removing the predicate drops the active core assertion, turning the leftover subject components into a fragment."
  },
  {
    q: "Is Riya grammatically correct when stating that every declarative standard sentence fundamentally requires both a clear subject and a predicate?",
    options: [
      "No, statements only strictly require verbs.",
      "No, subjects alone can fully form clean sentences.",
      "Yes, both structural components are required to resolve a complete complete thought expression.",
      "No, commands show that neither entity is required."
    ],
    answer: 2,
    hint: "Think about the baseline rules for processing complete standalone English statements.",
    explain: "To form a proper standard standalone clause expression, both the entity actor and the state details must be present."
  }
];

let current=0, score=0, time=60, interval;
let mute=false, attempts=0, imageViewed=false;

// Splash interface transition trigger
setTimeout(()=>{
  let introScreen = document.getElementById("intro");
  if(introScreen.classList.contains("active")){
    introScreen.classList.remove("active");
    document.getElementById("start").classList.add("active");
  }
}, 2500);

function startGame(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("quiz").classList.add("active");
  evaluateFlowState();
}

function evaluateFlowState() {
  if (current >= questions.length) {
    endQuizChallenge();
    return;
  }
  let q = questions[current];
  if(q.imageTrigger && !imageViewed) {
    triggerImageContextView(q.imageTrigger);
  } else {
    imageViewed = false;
    clearDisplayContextFrames();
    document.getElementById("quiz").classList.add("active");
    loadQuestionCardData();
  }
}

function clearDisplayContextFrames() {
  document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
}

function triggerImageContextView(triggerId){
  clearDisplayContextFrames();
  document.getElementById("quiz").classList.add("active");
  
  let src = triggerId === 1 ? "assets/picture1.png" : "assets/picture2.png";
  let promptTag = triggerId === 1 ? "Q6" : "Q7";
  
  document.getElementById("question").innerText = "";
  document.getElementById("options").innerHTML = "";
  document.getElementById("msg").innerText = "";
  
  document.getElementById("pictureArea").innerHTML = `
    <img src="${src}" class="picture" alt="Visual Context Data Assets">
    <p style="font-weight: 600; color: #1a252f; margin-bottom:15px;">🖼️ Observe the reference layout carefully before addressing ${promptTag}.</p>
    <button class="btn" onclick="confirmImageNavigation()">Continue to Question</button>
  `;
}

function confirmImageNavigation(){
  imageViewed = true;
  document.getElementById("pictureArea").innerHTML = "";
  evaluateFlowState();
}

function loadQuestionCardData(){
  attempts = 0;
  time = 60;
  clearInterval(interval);
  
  let quizCard = document.getElementById("quiz");
  quizCard.classList.remove("shake");
  
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("qno").innerText = current + 1;
  document.getElementById("msg").innerText = "";
  document.getElementById("msg").style.color = "unset";
  
  document.getElementById("bar").style.width = ((current) / questions.length) * 100 + "%";
  
  let html = "";
  q.options.forEach((opt, i) => {
    html += `<button class='option' onclick='checkAnswerOptionSelection(${i}, this)'>${escapeHtml(opt)}</button>`;
  });
  document.getElementById("options").innerHTML = html;
  
  document.getElementById("timerText").innerText = time;
  interval = setInterval(timerCountdownExecution, 1000);
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function timerCountdownExecution(){
  time--;
  document.getElementById("timerText").innerText = time;
  if(time <= 0){
    clearInterval(interval);
    checkAnswerOptionSelection(-1, null);
  }
}

function checkAnswerOptionSelection(selectedIndex, btnElement){
  let q = questions[current];
  let msgBox = document.getElementById("msg");
  let optionsList = document.querySelectorAll(".option");
  let quizCard = document.getElementById("quiz");
  
  quizCard.classList.remove("shake");

  if(selectedIndex === q.answer){
    clearInterval(interval);
    optionsList.forEach(el => el.classList.add("disabled"));
    if(btnElement) btnElement.classList.add("correct");
    playSoundAsset("correct");
    
    msgBox.innerText = "✨ Excellent! Correct Answer.";
    msgBox.style.color = "var(--correct)";
    score++;
    setTimeout(advanceToNextQuestionStep, 1500);
  } else {
    playSoundAsset("wrong");
    attempts++;
    
    // Trigger visual reflow layout warning rumble
    void quizCard.offsetWidth; 
    quizCard.classList.add("shake");
    
    if(btnElement) btnElement.classList.add("wrong");
    
    if(attempts === 1 && selectedIndex !== -1){
      msgBox.innerHTML = `✕ Not quite. Try one more time!<br><span style="font-weight:normal; font-size:0.9rem; color:var(--text-muted);">Hint: ${escapeHtml(q.hint)}</span>`;
      msgBox.style.color = "var(--wrong)";
      if(btnElement) {
        setTimeout(() => { btnElement.classList.remove("wrong"); quizCard.classList.remove("shake"); }, 900);
      }
    } else {
      clearInterval(interval);
      optionsList.forEach(el => el.classList.add("disabled"));
      
      if(selectedIndex === -1) {
        msgBox.innerHTML = `<span style="color:var(--wrong);">⏱️ Time's up!</span><br><span style="font-weight:normal; font-size:0.9rem; color:var(--text-main);"><b>Explanation:</b> ${escapeHtml(q.explain)}</span>`;
      } else {
        msgBox.innerHTML = `<span style="color:var(--wrong);">Incorrect.</span><br><span style="font-weight:normal; font-size:0.9rem; color:var(--text-main);"><b>Explanation:</b> ${escapeHtml(q.explain)}</span>`;
      }
      
      if(optionsList[q.answer]) optionsList[q.answer].classList.add("correct");
      setTimeout(advanceToNextQuestionStep, 3500);
    }
  }
}

function advanceToNextQuestionStep(){
  current++;
  evaluateFlowState();
}

function endQuizChallenge(){
  clearDisplayContextFrames();
  document.getElementById("result").classList.add("active");
  
  let percent = Math.round((score / questions.length) * 100);
  document.getElementById("finalScore").innerText = `${score}/${questions.length}`;
  
  let performanceFeedback = document.getElementById("perf");
  if(percent >= 75) {
    performanceFeedback.innerText = "🏆 Fantastic Masterclass Performance!";
  } else if(percent >= 40) {
    performanceFeedback.innerText = "👍 Good Effort! Review the concepts and try again.";
  } else {
    performanceFeedback.innerText = "📝 Let's practice a bit more to solidifying your foundations.";
  }
}

function playSoundAsset(type){
  if(mute) return;
  try {
    let soundPlayer = document.getElementById(type === "correct" ? "correctSound" : "wrongSound");
    soundPlayer.currentTime = 0;
    soundPlayer.play();
  } catch(soundException){}
}

function toggleMute(){
  mute = !mute;
  document.getElementById("muteBtn").innerText = mute ? "🔇" : "🔊";
}

function restart(){
  clearInterval(interval);
  current = 0;
  score = 0;
  attempts = 0;
  imageViewed = false;
  clearDisplayContextFrames();
  document.getElementById("start").classList.add("active");
}
</script>
</body>
</html>
