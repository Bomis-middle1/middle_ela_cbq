<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 6 English - Subject & Predicate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eef5ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}
#splash img{width:220px}

/* SCREEN */
.screen{display:none;height:100vh;padding:15px;}
.active{display:block}

/* CARD */
.card{
    max-width:780px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* QUESTION */
#question{
    white-space:pre-wrap;
    line-height:1.6;
    font-size:16px;
}

/* OPTIONS */
.option{
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    text-align:left;
    font-size:16px;
    cursor:pointer;
    white-space:normal;
}
.option:hover{background:#e6e6e6}

.correct{background:#c8f7c5 !important;}
.wrong{background:#ffd6d6 !important;}

/* TOP BAR */
#topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-weight:bold;
}
#timer{color:#d9534f}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:16px;
}

/* FEEDBACK */
#feedback{
    margin-top:10px;
    font-weight:bold;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;height:8px;
    background:gold;
    top:-10px;
    animation:fall 1s linear forwards;
}
@keyframes fall{
    to{transform:translateY(600px) rotate(360deg);opacity:0}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" onerror="this.style.display='none'">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
<div class="card">
    <h2>Grade 6 English</h2>
    <p>Chapter 4: Subject and Predicate</p>
    <button class="btn" onclick="start()">Start Quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">

<div id="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>⏱ <span id="timer">45</span>s</div>
</div>

<div id="question"></div>
<div id="options"></div>
<div id="feedback"></div>

</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
    <h2>Quiz Completed 🎉</h2>
    <p>Your Score: <span id="final"></span>/13</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* ================= QUESTIONS ================= */
const questions = [

`Q1.A teacher writes this sentence on the board:
"The tall oak tree at the corner of our school fell during the storm."
A student underlines "The tall oak tree" as the complete subject.
Is the student correct?
Options:
A. Yes, because the subject is always only the noun.
B. No, because the complete subject includes all the words describing the tree.
C. No, because "fell during the storm" is the subject.
D. Yes, because the location belongs to the predicate.
Correct Answer: B`,

`Q2.Riya reads the sentence:
"The small brown puppy with the torn ear barked at the postman."
What is the simple subject?
Options:
A. The small brown puppy
B. barked at the postman
C. puppy
D. postman
Correct Answer: C`,

`Q3.Read the sentence.
"Across the playground ran the excited children."
Why does the subject appear after the verb?
Options:
A. Because the sentence is written in an inverted order.
B. Because every subject comes after the verb.
C. Because "across the playground" is the subject.
D. Because the verb must always come first.
Correct Answer: A`,

`Q4.The teacher asks,
"Are the science textbooks on the shelf?"
Where is the subject in this question?
Options:
A. Are
B. the shelf
C. on the shelf
D. the science textbooks
Correct Answer: D`,

`Q5.Read the sentence.
"There are twelve students waiting outside the science lab."
Why is "There" not the subject?
Options:
A. Because it only introduces the sentence; the real subject is "twelve students."
B. Because "There" is always a verb.
C. Because "science lab" is the subject.
D. Because "twelve" is the only subject.
Correct Answer: A`,

`Q6. Identify the simple predicate in the sentence.
"The sleepy students slowly walked into the crowded hall."
Options:
A. slowly walked
B. the sleepy students
C. walked
D. into the crowded hall
Correct Answer: C`,

`Q7.Which sentence would your teacher accept as a complete sentence?
Options:
A. Running through the fields.
B. The children in the park.
C. The birds sang sweetly at dawn.
D. All the flowers in the garden.
Correct Answer: C`,

`Q8. Read the sentence.
"The little girl laughed."
Which option correctly identifies the subject and the predicate?
Options:
A. "The little girl" is the predicate; "laughed" is the subject.
B. "The little girl" is the subject; "laughed" is the predicate.
C. "The little girl" is the simple predicate; "laughed" is the simple subject.
D. Both together form the subject.
Correct Answer: B`,

`Q9. In the sentence
"The hungry cat drank the warm milk."
Which part is the complete predicate?
Options:
A. The hungry cat
B. The hungry cat drank
C. drank the warm milk
D. the warm milk
Correct Answer: C`,

`Q10. Your friend writes:
"Because it was raining heavily."
Why is this not a complete sentence?
Options:
A. It has a subject but no predicate.
B. It has a predicate but no subject.
C. It does not express a complete thought because it is only a dependent clause.
D. It is too short to be a sentence.
Correct Answer: C`,

`Q11. Read this paragraph.
"Every morning, the students arrive on time. The new library books are exciting. Opened last Tuesday."
Which sentence needs correction?
Options:
A. "Every morning, the students arrive on time."
B. "The new library books are exciting."
C. "Opened last Tuesday."
D. None of these.
Correct Answer: C`,

`Q12. A student removes the predicate from the sentence:
"The young gymnast won three gold medals."
The student writes only:
"The young gymnast."
What is the result?
Options:
A. It becomes a question.
B. It becomes a command.
C. It becomes a sentence fragment because it does not express a complete thought.
D. It becomes a compound sentence.
Correct Answer: C`,

`Q13. A teacher says,
"Every complete sentence must have both a subject and a predicate."
A student disagrees.
Who is correct?
Options:
A. The student, because every sentence only needs a subject.
B. The student, because every sentence only needs a predicate.
C. The teacher, because a complete sentence always needs both a subject and a predicate.
D. Both are correct in different situations.
Correct Answer: C`

];

let i=0,score=0,attempt=0,timer;

/* SPLASH */
setTimeout(()=>document.getElementById("splash").style.display="none",5000);

function start(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
load();
}

function load(){
clearInterval(timer);
attempt=0;

let q=questions[i];
let parts = q.split("Options:");
let questionText = parts[0];
let optPart = parts[1].split("Correct Answer:")[0];

document.getElementById("question").innerText=questionText;

let opts = optPart.trim().split("\n").filter(x=>x.trim().match(/^[A-D]\./));

let html="";
opts.forEach((op,idx)=>{
html+=`<button class="option" onclick="check(${idx},this)">${op}</button>`;
});

document.getElementById("options").innerHTML=html;

let t=45;
document.getElementById("timer").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0) next();
},1000);
}

function check(idx,btn){
let correctIndex = getCorrectIndex(questions[i]);

if(idx===correctIndex){
btn.classList.add("correct");
score++;
document.getElementById("score").innerText=score;
confetti();
setTimeout(next,900);
}else{
btn.classList.add("wrong");
attempt++;
if(attempt===2) next();
}
}

function getCorrectIndex(q){
let ans = q.split("Correct Answer:")[1].trim();
return ["A","B","C","D"].indexOf(ans);
}

function next(){
clearInterval(timer);
i++;
if(i<questions.length) load();
else end();
}

function end(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("final").innerText=score;
}

function confetti(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}
}

</script>

</body>
</html>
