<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subject & Predicate - Grade 6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e8f0ff,#ffffff);
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#splash img{
    width:220px;
}

/* SCREENS */
.screen{
    display:none;
    height:100vh;
    text-align:center;
    padding:20px;
}
.active{
    display:block;
}

/* CONTAINER */
.card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* BUTTONS */
.btn{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background:#f2f2f2;
}
.btn:hover{background:#ddd;}

.correct{background:#c8f7c5 !important;}
.wrong{background:#ffcccc !important;}

#topbar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin-bottom:10px;
}

#timer{
    color:#d9534f;
}

/* FEEDBACK */
#feedback{
    font-size:18px;
    margin-top:10px;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    background:gold;
    animation: fall 1s linear forwards;
}
@keyframes fall{
    0%{transform:translateY(-50px) rotate(0);}
    100%{transform:translateY(600px) rotate(360deg);opacity:0;}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
    <div class="card">
        <h2>Subject & Predicate Challenge</h2>
        <p>Grade 6 English - Chapter 4</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <div class="card">
        <div id="topbar">
            <div>Score: <span id="score">0</span></div>
            <div>⏱ <span id="timer">45</span>s</div>
        </div>

        <h3 id="question"></h3>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
    <div class="card">
        <h2>🎉 Quiz Completed!</h2>
        <p>Your Score: <span id="finalScore"></span>/13</p>
        <button class="btn" onclick="restart()">Play Again</button>
    </div>
</div>

<script>

/* ================= QUESTIONS ================= */
const questions = [
{
q:"A teacher writes: 'The tall oak tree at the corner of our school fell during the storm.' Is the student correct in underlining complete subject?",
o:["Yes, only noun is subject","No, includes all describing words","No, predicate is subject","Yes, location is subject"],
a:1,
exp:"Complete subject includes all words describing the noun."
},
{
q:"What is the simple subject in 'The small brown puppy barked'?",
o:["The small brown puppy","barked","puppy","postman"],
a:2,
exp:"Simple subject is the main noun: 'puppy'."
},
{
q:"Why does subject appear after verb in inverted sentence?",
o:["Inverted order","Always after verb","Subject is location","Verb must come first"],
a:0,
exp:"Inverted sentences reverse normal word order."
},
{
q:"Find subject: 'Are the science textbooks on the shelf?'",
o:["Are","shelf","on shelf","science textbooks"],
a:3,
exp:"Subject is what the sentence is about: textbooks."
},
{
q:"Why is 'There' not subject?",
o:["Introduces sentence","Is verb","Is object","Is adjective"],
a:0,
exp:"'There' only introduces existence."
},
{
q:"Simple predicate in 'students walked slowly'?",
o:["slowly walked","students","walked","hall"],
a:2,
exp:"Main verb is the simple predicate."
},
{
q:"Which is complete sentence?",
o:["Running fast","Birds sang sweetly","In the park","All flowers"],
a:1,
exp:"Only option with subject + predicate."
},
{
q:"Subject and predicate of 'The girl laughed'?",
o:["girl-subject, laughed-predicate","laughed-subject","girl-predicate","both subject"],
a:0,
exp:"Correct structure is subject + predicate."
},
{
q:"Complete predicate in 'cat drank milk'?",
o:["cat","cat drank","drank milk","milk"],
a:2,
exp:"Predicate tells action + object."
},
{
q:"Why fragment: 'Because it was raining'?",
o:["No subject","No predicate","Incomplete thought","Too long"],
a:2,
exp:"Dependent clause cannot stand alone."
},
{
q:"Which sentence is incorrect?",
o:["Students arrive","Books are exciting","Opened last Tuesday","All correct"],
a:2,
exp:"No subject makes it incomplete."
},
{
q:"What happens if predicate removed?",
o:["Question","Command","Fragment","Compound sentence"],
a:2,
exp:"It becomes incomplete sentence."
},
{
q:"Who is correct about sentences?",
o:["Student","Teacher","Both","None"],
a:1,
exp:"Every sentence needs subject + predicate."
}
];

let index=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=45;

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},5000);

/* START */
function startGame(){
document.getElementById("intro").classList.remove("active");
document.getElementById("quiz").classList.add("active");
loadQ();
}

/* LOAD QUESTION */
function loadQ(){
clearInterval(timer);
timeLeft=45;
document.getElementById("timer").innerText=timeLeft;
document.getElementById("feedback").innerText="";

let q=questions[index];
document.getElementById("question").innerText=q.q;

let optHTML="";
q.o.forEach((op,i)=>{
optHTML+=`<button class="btn" onclick="check(${i},this)">${op}</button>`;
});
document.getElementById("options").innerHTML=optHTML;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timer);
showAnswer(false,null);
}
},1000);
}

/* CHECK */
function check(i,btn){
let q=questions[index];

if(i===q.a){
btn.classList.add("correct");
score++;
document.getElementById("score").innerText=score;
playSound("assets/correct.mp3");
celebrate();
setTimeout(next,1000);
}else{
btn.classList.add("wrong");
attempts++;
playSound("assets/wrong.mp3");

if(attempts===1){
document.getElementById("feedback").innerText="Try once more!";
}else{
showAnswer(true,q);
}
}
}

/* SHOW ANSWER */
function showAnswer(correct,q){
clearInterval(timer);

if(q){
document.getElementById("feedback").innerText="Correct Answer: "+q.o[q.a]+" | "+q.exp;
}
setTimeout(next,2500);
}

/* NEXT */
function next(){
attempts=0;
index++;
if(index<questions.length){
loadQ();
}else{
endGame();
}
}

/* END */
function endGame(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("result").classList.add("active");
document.getElementById("finalScore").innerText=score;
playSound("assets/clapping.mp3");
}

/* RESTART */
function restart(){
location.reload();
}

/* SOUND */
function playSound(src){
let a=new Audio(src);
a.play();
}

/* CONFETTI */
function celebrate(){
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["gold","skyblue","pink"][Math.floor(Math.random()*3)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}
}

</script>

</body>
</html>
