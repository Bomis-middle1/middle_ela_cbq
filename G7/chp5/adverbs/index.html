<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Innovine Learning - Grade 7 Adverbs Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
:root {
    --slate-blue: #2b3a67;
    --mint-teal: #41b3a3;
    --amber-gold: #e27d60;
    --gold-dark: #c36246;
    --deep-purple: #1d1e2c;
    --cream-bg: #f5f7fa;
    --card-white: #ffffff;
    --success-green: #2ec4b6;
    --danger-red: #e71d36;
    --panel-radius: 16px;
    --elem-radius: 10px;
    --classic-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: var(--cream-bg);
    color: var(--deep-purple);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
}

/* Splash Screen */
#splash {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: var(--slate-blue);
    letter-spacing: 0.5px;
    z-index: 9999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

.hidden { display: none !important; }

/* Game Area Layout */
#game {
    display: none;
    width: 100%;
    max-width: 650px;
    flex-direction: column;
    gap: 12px;
}

#topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    background: var(--slate-blue);
    padding: 12px 16px;
    border-radius: var(--elem-radius);
    font-size: 14px;
    color: white;
    box-shadow: var(--classic-shadow);
}

#progress {
    width: 100%;
    height: 8px;
    background: rgba(43, 58, 103, 0.1);
    border-radius: 10px;
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: var(--mint-teal);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Card */
.card {
    background: var(--card-white);
    padding: clamp(20px, 5vw, 32px);
    border-radius: var(--panel-radius);
    width: 100%;
    box-shadow: var(--classic-shadow);
    border: 1px solid rgba(0, 0, 0, 0.04);
}

#question {
    font-size: 16px;
    font-weight: 600;
    color: var(--deep-purple);
    margin-bottom: 20px;
    line-height: 1.6;
    white-space: pre-line;
}

/* Options */
.options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.option {
    width: 100%;
    display: block;
    text-align: left;
    padding: 14px 16px;
    border-radius: var(--elem-radius);
    background: #ffffff;
    border: 2px solid #e1e6eb;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--deep-purple);
    transition: all 0.2s ease;
}

.option:hover:not(.disabled) {
    border-color: var(--slate-blue);
    background: rgba(43, 58, 103, 0.02);
    transform: translateY(-1px);
}

.option.disabled {
    cursor: not-allowed;
    pointer-events: none;
}

.correct {
    background: #e6f9f7 !important;
    border-color: var(--success-green) !important;
    color: var(--success-green) !important;
    font-weight: 700;
}

.wrong {
    background: #ffebee !important;
    border-color: var(--danger-red) !important;
    color: var(--danger-red) !important;
    font-weight: 700;
}

#reason {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: var(--elem-radius);
    background: #f8fafc;
    border-left: 4px solid var(--slate-blue);
    font-size: 14px;
    line-height: 1.5;
    color: #4a5568;
    display: none;
}

/* End Screen */
#end {
    display: none;
    text-align: center;
    background: var(--card-white);
    padding: 40px 24px;
    border-radius: var(--panel-radius);
    max-width: 500px;
    width: 100%;
    box-shadow: var(--classic-shadow);
}

#end h1 {
    color: var(--slate-blue);
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
}

#finalScore {
    font-size: 22px;
    color: var(--amber-gold);
    font-weight: 700;
    margin-bottom: 12px;
}

#msg {
    font-size: 16px;
    color: #4a5568;
    margin-bottom: 24px;
    font-weight: 500;
}

button.btn-action {
    padding: 14px 32px;
    border: none;
    border-radius: var(--elem-radius);
    background: var(--amber-gold);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    display: inline-block;
}

button.btn-action:hover {
    background: var(--gold-dark);
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div id="splash">Innovine Learning</div>

<div id="game">
    <div id="topbar">
        <div id="qcount">Question 1/12</div>
        <div id="score">Score: 0</div>
    </div>

    <div id="progress"><div id="bar"></div></div>

    <div class="card">
        <div id="question"></div>
        <div id="options" class="options-grid"></div>
        <div id="reason"></div>
    </div>
</div>

<div id="end">
    <h1>Game Over</h1>
    <div id="finalScore"></div>
    <p id="msg"></p>
    <button class="btn-action" onclick="restart()">Play Again</button>
</div>

<script>
const questions = [
{
q:`Q1. Riya is writing a story and wants to show the exact place where something happened. She writes: "This is the village ___ my grandmother was born." Which relative adverb correctly fills the blank?`,
options:[
{t:"a) when",c:false},
{t:"b) which",c:false},
{t:"c) where",c:true},
{t:"d) that",c:false}
],
reason:`'Where' is a relative adverb introducing a clause of place — modifies 'village'`
},
{
q:`Q2. Aarav is editing his essay. He has written: "She sings beautiful." His teacher underlines 'beautiful' and says it needs to be converted into an adverb. Which formation rule applies here, and what is the correct form?`,
options:[
{t:"a) Add -ly directly → beautifuly",c:false},
{t:"b) Drop the final 'e' and add -ly → beautifuly",c:false},
{t:"c) Keep the base and add -ly → beautifully",c:true},
{t:"d) Change nothing — 'beautiful' works as an adverb",c:false}
],
reason:`'Beautiful' ends in consonant+l+e → keep the base and add -ly directly → 'beautifully'`
},
{
q:`Q3. A student reads: "How gracefully she dances!" Her teacher asks in this sentence, "How gracefully she dances!", what type of adverb is the word "how"?`,
options:[
{t:"a) Interrogative adverb — it is asking a question",c:false},
{t:"b) Relative adverb — it connects two clauses",c:false},
{t:"c) Exclamatory adverb — it expresses strong feeling or admiration",c:true},
{t:"d) Adverb of degree — it modifies 'gracefully'",c:false}
],
reason:`'How' in an exclamatory sentence expresses admiration → Exclamatory Adverb`
},
{
q:`Q4. Meera is comparing two runners after a race. She writes: "Priya runs fast, but Ananya runs ___ than Priya." Which comparative adverb correctly fills the blank?`,
options:[
{t:"a) more fast",c:false},
{t:"b) fastest",c:false},
{t:"c) faster",c:true},
{t:"d) most fast",c:false}
],
reason:`'Fast' is a one-syllable adverb → comparative = 'faster' (regular)`
},
{
q:`Q5. A coach writes in his report: "Among all the players, Rohan performed ___ in the final tournament." He wants to use the superlative form of 'well'. Which is correct?`,
options:[
{t:"a) more well",c:false},
{t:"b) better",c:false},
{t:"c) most well",c:false},
{t:"d) best",c:true}
],
reason:`'Well' is irregular → comparative='better', superlative='best'`
},
{
q:`Q6. A student forms adverbs from four adjectives. Which set is entirely correct?`,
options:[
{t:"a) lazy→lazily, true→truely, full→fully, good→goodly",c:false},
{t:"b) lazy→lazily, true→truly, full→fully, good→well",c:true},
{t:"c) lazy→lazyly, true→truly, full→fully, good→goodly",c:false},
{t:"d) lazy→lazily, true→truly, full→fullyly, good→well",c:false}
],
reason:`lazy→lazily (y rule); true→truly (drop e); full→fully (-l+ly); good→well (irregular)`
},
{
q:`Q7. Which sentence uses an Adverb of Affirmation correctly?`,
options:[
{t:"a) She will not attend the function.",c:false},
{t:"b) He does not agree with the decision at all.",c:false},
{t:"c) I will definitely be there for your performance.",c:true},
{t:"d) They never finished the project on time.",c:false}
],
reason:`'Definitely' affirms certainty about a future action → Adverb of Affirmation`
},
{
q:`Q8. Sort these adverbs into two groups — Adverbs of Affirmation and Adverbs of Negation: P: certainly Q: never R: indeed S: hardly`,
options:[
{t:"a) Affirmation: P, Q — Negation: R, S",c:false},
{t:"b) Affirmation: Q, R — Negation: P, S",c:false},
{t:"c) Affirmation: P, R — Negation: Q, S",c:true},
{t:"d) Affirmation: R, S — Negation: P, Q",c:false}
],
reason:`certainly & indeed = affirmation; never & hardly = negation`
},
{
q:`Q9. Classify the degree of comparison of each underlined adverb: 
1. "She sings beautifully." 
2. "He arrived earlier than expected." 
3. "Among all the students, Riya worked most diligently." 
4. "The dog ran fast across the field."`,
options:[
{t:"a) 1=Comparative, 2=Superlative, 3=Positive, 4=Comparative",c:false},
{t:"b) 1=Superlative, 2=Positive, 3=Comparative, 4=Superlative",c:false},
{t:"c) 1=Positive, 2=Comparative, 3=Superlative, 4=Positive",c:true},
{t:"d) 1=Positive, 2=Superlative, 3=Comparative, 4=Comparative",c:false}
],
reason:`Positive = no comparison; Comparative = two; Superlative = highest among many`
},
{
q:`Q10. Three of the following adverbs are formed correctly from their adjectives. One is NOT. Which is the odd one out?`,
options:[
{t:"a) angry → angrily",c:false},
{t:"b) simple → simply",c:false},
{t:"c) true → truely",c:true},
{t:"d) heavy → heavily",c:false}
],
reason:`'true' → 'truly' (drop 'e' before adding -ly)`
},
{
q:`Q11. A student changes "She spoke in a quiet manner" to "She spoke quietly." Then changes "He is a good singer" to "He sings well." What do both changes demonstrate?`,
options:[
{t:"a) Both changes convert nouns into adverbs",c:false},
{t:"b) The first change shows regular adverb formation by adding -ly; the second shows irregular adverb formation where the adjective 'good' does not simply add -ly but changes to a completely different form 'well'",c:true},
{t:"c) Both changes show irregular adverb formation",c:false},
{t:"d) The first change is incorrect — 'quietly' changes the meaning",c:false}
],
reason:`Regular (-ly) vs irregular (good → well) formation`
},
{
q:`Q12. Assertion: We say "He runs faster than me" (Comparative) but "He runs the fastest of all" (Superlative) — and both are correct. Reason: Comparative adverbs compare two actions or doers; Superlative adverbs identify the highest or lowest degree among three or more.`,
options:[
{t:"a) Both are correct; the reason correctly explains the assertion.",c:true},
{t:"b) Both are correct; but the reason does NOT explain the assertion.",c:false},
{t:"c) The assertion is correct; the reason is wrong.",c:false},
{t:"d) Both are wrong — adverbs cannot be compared.",c:false}
],
reason:`Comparative = two; Superlative = highest among three or more`
}
];

let index = 0, score = 0;
let audioCtx = null;

function shuffle(arr){
    return arr.sort(() => Math.random() - 0.5);
}

let order = shuffle([...Array(questions.length).keys()]);

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function loadQ(){
    if(index >= questions.length){
        endGame();
        return;
    }

    let q = questions[order[index]];
    document.getElementById("question").innerText = q.q;

    let opts = shuffle([...q.options]);
    let box = document.getElementById("options");
    box.innerHTML = "";

    document.getElementById("reason").style.display = "none";
    document.getElementById("reason").innerText = "";

    opts.forEach(opt => {
        let div = document.createElement("button");
        div.className = "option";
        div.innerText = opt.t;
        div.onclick = () => select(opt, div, q);
        box.appendChild(div);
    });

    document.getElementById("qcount").innerText = `Question ${index + 1}/${questions.length}`;
    document.getElementById("bar").style.width = `${(index / questions.length) * 100}%`;
}

function select(opt, selectedDiv, q){
    initAudio();
    let box = document.getElementById("options");
    let optionButtons = box.querySelectorAll(".option");
    
    // Freeze choices immediately
    optionButtons.forEach(btn => btn.classList.add("disabled"));

    let reasonBox = document.getElementById("reason");
    reasonBox.innerHTML = `<strong>Explanation:</strong> ${q.reason}`;
    reasonBox.style.display = "block";

    if(opt.c){
        selectedDiv.classList.add("correct");
        score++;
        beep(600);
    } else {
        selectedDiv.classList.add("wrong");
        beep(200);
        // Find and highlight correct answer visually for learning support
        optionButtons.forEach(btn => {
            let matchingOpt = q.options.find(o => o.t === btn.innerText);
            if(matchingOpt && matchingOpt.c) {
                btn.classList.add("correct");
            }
        });
    }

    document.getElementById("score").innerText = "Score: " + score;

    setTimeout(() => {
        index++;
        loadQ();
    }, 2500);
}

function beep(freq){
    if (!audioCtx) return;
    try {
        let o = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        o.frequency.value = freq;
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
        o.stop(audioCtx.currentTime + 0.4);
    } catch(e) {
        console.log("Audio feedback muted or blocked");
    }
}

function endGame(){
    document.getElementById("game").style.display = "none";
    document.getElementById("end").style.display = "block";

    let percent = Math.round((score / questions.length) * 100);
    document.getElementById("finalScore").innerText = `Score: ${score}/${questions.length} (${percent}%)`;

    let msg = "";
    if(percent >= 80) msg = "Excellent Work! 🌟";
    else if(percent >= 60) msg = "Very Good Effort! 👍";
    else if(percent >= 40) msg = "Good Job, keep practicing! 📚";
    else msg = "Keep Practicing! You'll get better. 💪";

    document.getElementById("msg").innerText = msg;
}

function restart(){
    location.reload();
}

/* Clear Splash Fading Entry safely */
window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        const splashNode = document.getElementById("splash");
        splashNode.style.opacity = "0";
        setTimeout(() => {
            splashNode.classList.add("hidden");
            document.getElementById("game").style.display = "flex";
            loadQ();
        }, 500);
    }, 2000);
});
</script>

</body>
</html>
