<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adjectives Pro Game - Grade 7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f3f7ff;
overflow-x:hidden;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#splash img{
width:180px;
animation:pop 1.2s ease;
}

@keyframes pop{
from{transform:scale(0.5);opacity:0}
to{transform:scale(1);opacity:1}
}

.hidden{display:none}

.center{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
max-width:650px;
width:92%;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
padding:12px 14px;
margin:6px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{transform:scale(1.05)}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.option{
width:100%;
display:block;
text-align:left;
padding:10px;
margin:8px 0;
border-radius:8px;
background:#eee;
border:none;
cursor:pointer;
}

.option:disabled{
opacity:0.6;
cursor:not-allowed;
}

/* POPUP */
#popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#popupBox{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
text-align:center;
}

/* CONFETTI */
.star{
position:fixed;
width:8px;
height:8px;
background:gold;
clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
animation:fall 1s linear forwards;
}

@keyframes fall{
to{transform:translateY(200px) rotate(360deg);opacity:0}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<!-- START -->
<div id="start" class="center hidden">
<div class="card">
<h2>Chapter 4 — Adjectives</h2>
<p>Grade 7 | English Grammar</p>
<button onclick="startGame()">Start Game</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="center hidden">
<div class="card">

<div class="topbar">
<div id="qno"></div>
<div id="score"></div>
<div id="timer"></div>
</div>

<h3 id="qtext"></h3>
<div id="options"></div>

</div>
</div>

<!-- POPUP -->
<div id="popup">
<div id="popupBox">
<p id="popupText"></p>
<button onclick="nextQ()">Continue</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="center hidden">
<div class="card">
<h2>Final Score</h2>
<p id="final"></p>
<button onclick="location.reload()">Restart</button>
</div>
</div>

<script>

/* ================= QUESTIONS ================= */
const questions = [
{q:"Thai cuisine comes from ___?",o:["Thailand","Thailandish","Thai","Thailandian"],a:2,e:"Thai is proper adjective."},
{q:"Every vs Each difference?",o:["Same","Group vs Individual focus","Only people","Only objects"],a:1,e:"Each = individual focus."},
{q:"___ documents must be submitted.",o:["Some","Many","All of","All the"],a:3,e:"All the = complete emphasis."},
{q:"The ___ truth.",o:["complete","honest","real","actual"],a:0,e:"Complete adds emphasis."},
{q:"___ pen is this?",o:["Who","Whom","Whose","Which"],a:2,e:"Whose shows ownership."}
];

let i=0;
let score=0;
let attempts=0;
let timer;
let time=45;

/* SPLASH FIX */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("start").classList.remove("hidden");
},5000);

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
loadQ();
}

/* LOAD QUESTION */
function loadQ(){

if(i>=questions.length){
finalScreen();
return;
}

attempts=0;

let q=questions[i];

document.getElementById("qno").innerText=`Q${i+1}/${questions.length}`;
document.getElementById("score").innerText=`Score: ${score}`;
document.getElementById("qtext").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,idx)=>{
let b=document.createElement("button");
b.className="option";
b.innerText=opt;
b.onclick=()=>check(idx,b);
box.appendChild(b);
});

startTimer();
}

/* TIMER */
function startTimer(){
clearInterval(timer);
time=45;
document.getElementById("timer").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
clearInterval(timer);
showPopup(false);
}
},1000);
}

/* CHECK ANSWER (2 ATTEMPTS) */
function check(ans,btn){
let q=questions[i];

if(ans===q.a){
score++;
celebrate();
showPopup(true);
return;
}

attempts++;

btn.style.background="#ffcccc";

if(attempts>=2){
showPopup(false);
}
}

/* POPUP */
function showPopup(correct){
let q=questions[i];

document.getElementById("popup").style.display="flex";
document.getElementById("popupText").innerHTML=
(correct?"✔ Correct!<br>":"✖ Answer Revealed<br>")+q.e;
}

/* NEXT */
function nextQ(){
document.getElementById("popup").style.display="none";
i++;
loadQ();
}

/* FINAL SCREEN */
function finalScreen(){
document.getElementById("game").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let percent=Math.round((score/questions.length)*100);

document.getElementById("final").innerText=
`Score: ${score}/${questions.length} | ${percent}%`;
}

/* CONFETTI */
function celebrate(){
for(let i=0;i<20;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top="20%";
document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);
}
}

</script>

</body>
</html>
