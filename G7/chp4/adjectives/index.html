<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adjectives Game - Grade 7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
overflow-x:hidden;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#splash img{
width:180px;
animation:pop 1.2s ease;
}

@keyframes pop{
from{transform:scale(0.5);opacity:0}
to{transform:scale(1);opacity:1}
}

/* SCREENS */
.hidden{display:none}

.center{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
max-width:600px;
width:90%;
}

/* BUTTON */
button{
padding:12px 16px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{transform:scale(1.05)}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-weight:bold;
}

/* OPTIONS */
.option{
display:block;
width:100%;
margin:8px 0;
padding:10px;
background:#f1f1f1;
border:none;
border-radius:8px;
cursor:pointer;
text-align:left;
}

/* FEEDBACK POPUP */
#popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#popupBox{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
text-align:center;
}

/* FLOAT */
.dot{
position:fixed;
width:6px;
height:6px;
background:#90caf9;
border-radius:50%;
animation:float 10s linear infinite;
opacity:0.3;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="/mnt/data/1f3d2159-b4ad-46a5-bfa1-39742a592e68.png">
</div>

<!-- START -->
<div id="start" class="center hidden">
<div class="card">
<h2>Chapter 4 — Adjectives</h2>
<p>Grade 7 | English</p>
<button onclick="startGame()">Start Game</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="center hidden">
<div class="card">

<div class="topbar">
<div id="qno"></div>
<div id="score"></div>
<div id="timer"></div>
</div>

<h3 id="qtext"></h3>
<div id="options"></div>

</div>
</div>

<!-- POPUP -->
<div id="popup">
<div id="popupBox">
<p id="popupText"></p>
<button onclick="nextQ()">Continue</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="center hidden">
<div class="card">
<h2>Final Score</h2>
<p id="final"></p>
<button onclick="location.reload()">Restart</button>
</div>
</div>

<script>
/* QUESTIONS */
const questions = [
{q:"Thai cuisine comes from ___?",o:["Thailand","Thailandish","Thai","Thailandian"],a:2,e:"Thai is correct proper adjective."},
{q:"Every vs Each difference?",o:["Same","Group vs Individual","Only people","Only objects"],a:1,e:"Each = individuals, Every = group."},
{q:"___ documents must be submitted.",o:["Some","Many","All of","All the"],a:3,e:"All the = complete emphasis."},
{q:"The ___ truth.",o:["complete","honest","real","actual"],a:0,e:"Complete adds emphasis."},
{q:"___ pen is this?",o:["Who","Whom","Whose","Which"],a:2,e:"Whose shows ownership."},
{q:"Emphasising adjective?",o:["Beautiful","Very idea","Tall boy","Small house"],a:1,e:"Very adds emphasis."},
{q:"Correct sentence:",o:["My both sisters","Both my sisters","Both of sisters","My sisters both"],a:1,e:"Correct order is Both my sisters."},
{q:"Number vs Quantity:",o:["P,Q vs R,S","Q,S vs P,R","P,R vs Q,S","R,S vs P,Q"],a:2,e:"Correct classification."},
{q:"Classification question:",o:["A","B","C","D"],a:1,e:"Correct mapping."},
{q:"Odd one out:",o:["very mistake","utter nonsense","complete disaster","Italian restaurant"],a:3,e:"Italian is proper adjective."}
];

let i=0,score=0,timer;
let time=45;

/* FLOAT DOTS */
for(let k=0;k<20;k++){
let d=document.createElement("div");
d.className="dot";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(d);
}

/* SPLASH FIX */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("start").classList.remove("hidden");
},5000);

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
load();
}

function load(){
if(i>=questions.length){
finalChallenge();
return;
}

let q=questions[i];

document.getElementById("qno").innerText=`Q ${i+1}/${questions.length}`;
document.getElementById("score").innerText=`Score: ${score}`;
document.getElementById("qtext").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((op,idx)=>{
let b=document.createElement("button");
b.className="option";
b.innerText=op;
b.onclick=()=>check(idx);
box.appendChild(b);
});

startTimer();
}

function startTimer(){
time=45;
document.getElementById("timer").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
clearInterval(timer);
show(false);
}
},1000);
}

function check(ans){
clearInterval(timer);

if(ans===questions[i].a){
score++;
show(true);
}else{
show(false);
}
}

function show(correct){
let q=questions[i];

document.getElementById("popup").style.display="flex";

document.getElementById("popupText").innerHTML=
(correct?"✔ Correct!<br>":"✖ Wrong!<br>") + q.e;

if(correct) score++;

}

function nextQ(){
document.getElementById("popup").style.display="none";
i++;
load();
}

/* FINAL CHALLENGE */
function finalChallenge(){
document.getElementById("game").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let percent=Math.round(score/questions.length*100);

document.getElementById("final").innerText=
`Score: ${score}/${questions.length}\nPercentage: ${percent}%`;
}
</script>

</body>
</html>
