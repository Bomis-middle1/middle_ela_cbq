<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adjectives Pro Game - Grade 7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
:root {
    --slate-blue: #2b3a67;
    --mint-teal: #41b3a3;
    --amber-gold: #e27d60;
    --gold-dark: #c36246;
    --deep-purple: #1d1e2c;
    --cream-bg: #f5f7fa;
    --card-white: #ffffff;
    --success-green: #2ec4b6;
    --danger-red: #e71d36;
    --panel-radius: 16px;
    --elem-radius: 10px;
    --classic-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: var(--cream-bg);
    color: var(--deep-purple);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
    overflow: hidden;
}

/* SPLASH */
#splash {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s ease;
}

#splash img {
    width: 200px;
    height: auto;
    object-fit: contain;
    animation: pop 1.2s ease infinite alternate;
}

@keyframes pop {
    from { transform: scale(0.95); opacity: 0.8; }
    to { transform: scale(1.05); opacity: 1; }
}

.hidden { display: none !important; }

.center {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    flex-direction: column;
    text-align: center;
}

.card {
    background: var(--card-white);
    padding: clamp(20px, 5vw, 32px);
    border-radius: var(--panel-radius);
    max-width: 650px;
    width: 100%;
    box-shadow: var(--classic-shadow);
    border: 1px solid rgba(0, 0, 0, 0.05);
    text-align: left;
}

#start .card, #result .card {
    text-align: center;
}

h2 {
    color: var(--slate-blue);
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
}

p {
    color: #4a5568;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 20px;
}

button.btn-action {
    padding: 14px 32px;
    border: none;
    border-radius: var(--elem-radius);
    background: var(--amber-gold);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    display: inline-block;
}

button.btn-action:hover {
    background: var(--gold-dark);
    transform: translateY(-2px);
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    margin-bottom: 20px;
    background: var(--cream-bg);
    padding: 8px 14px;
    border-radius: var(--elem-radius);
    font-size: 14px;
    color: var(--slate-blue);
}

#timer {
    background: rgba(231, 29, 54, 0.1);
    color: var(--danger-red);
    padding: 4px 10px;
    border-radius: 20px;
}

#qtext {
    font-size: 17px;
    font-weight: 600;
    color: var(--deep-purple);
    margin-bottom: 20px;
    line-height: 1.5;
    white-space: pre-line;
}

.options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.option {
    width: 100%;
    display: block;
    text-align: left;
    padding: 14px 16px;
    border-radius: var(--elem-radius);
    background: #ffffff;
    border: 2px solid #e1e6eb;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--deep-purple);
    transition: all 0.2s ease;
}

.option:hover:not(:disabled) {
    border-color: var(--slate-blue);
    background: rgba(43, 58, 103, 0.02);
}

.option:disabled {
    cursor: not-allowed;
}

.node-correct {
    background: #e6f9f7 !important;
    border-color: var(--success-green) !important;
    color: var(--success-green) !important;
    font-weight: 700;
}

.node-wrong {
    background: #ffebee !important;
    border-color: var(--danger-red) !important;
    color: var(--danger-red) !important;
}

/* POPUP */
#popup {
    position: fixed;
    inset: 0;
    background: rgba(29, 30, 44, 0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 16px;
}

#popupBox {
    background: white;
    padding: 24px;
    border-radius: var(--panel-radius);
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

#popupText {
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 20px;
    color: #4a5568;
    text-align: left;
}

/* CELEBRATION STARS */
.star {
    position: fixed;
    width: 14px;
    height: 14px;
    background: gold;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    pointer-events: none;
    z-index: 9999;
    animation: fall 1.5s linear forwards;
}

@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div id="splash">
    <img src="assets/innovine-logo.png" alt="Innovine Logo" onerror="this.style.display='none'">
</div>

<div id="start" class="center hidden">
    <div class="card">
        <h2>Chapter 4 — Adjectives</h2>
        <p>Quality · Quantity · Number · Demonstrative · Interrogative · Possessive · Proper · Distributive · Emphasising</p>
        <button class="btn-action" onclick="startGame()">Start Game</button>
    </div>
</div>

<div id="game" class="center hidden">
    <div class="card">
        <div class="topbar">
            <div id="qno">Question 1 / 10</div>
            <div id="score">Score: 0</div>
            <div id="timer">⏱️ 45s</div>
        </div>
        <h3 id="qtext"></h3>
        <div id="options" class="options-grid"></div>
    </div>
</div>

<div id="popup">
    <div id="popupBox">
        <p id="popupText"></p>
        <button class="btn-action" onclick="nextQ()">Continue</button>
    </div>
</div>

<div id="result" class="center hidden">
    <div class="card">
        <h2>Final Score</h2>
        <p id="final" style="font-size: 18px; font-weight: 700; color: var(--slate-blue); margin-bottom: 24px;"></p>
        <button class="btn-action" onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
const questions = [
    {
        q: "Riya is describing the food of Thailand in her travel blog. She wants to use the correct Proper Adjective. Which word should she use?\n\"The ___ cuisine is known worldwide for its bold flavours.\"", 
        o: ["Thailand", "Thailandish", "Thai", "Thailandian"], 
        a: 2, 
        e: "Proper adjective derived from proper noun 'Thailand' → 'Thai'."
    },
    {
        q: "A teacher reads out two sentences to the class:\nSentence A: \"Every student must submit the assignment by Friday.\"\nSentence B: \"Each student will receive a separate feedback form.\"\nShe asks: both use Distributive Adjectives — but is there a difference in emphasis?", 
        o: [
            "No difference — 'every' and 'each' mean exactly the same thing in all contexts", 
            "'Every' emphasises the group as a whole; 'each' focuses more on individuals one by one", 
            "'Every' is for people; 'each' is only for objects", 
            "'Each' is more formal than 'every' — they cannot be used interchangeably"
        ], 
        a: 1, 
        e: "'Every' looks at the whole group collectively; 'each' highlights individuals one by one — a subtle but important distinction."
    },
    {
        q: "Aarav is filling in an online application form. It states:\n\"______ required documents must be submitted along with the application.\"\nWhich phrase best emphasises that every required document must be included?", 
        o: ["Some", "Many", "All", "All the"], 
        a: 3, 
        e: "'All the' emphasises every single item without exception — strongest form for documents."
    },
    {
        q: "Meera's mother says: \"I have told you the ___ truth about what happened.\"\nThe word in the blank adds strong emphasis to the noun 'truth' — it stresses that the whole truth has been told, with nothing left out. Which emphasising adjective fits?", 
        o: ["complete", "honest", "real", "actual"], 
        a: 0, 
        e: "'Complete' adds emphasis/force to 'truth' — stresses totality → Emphasising Adjective."
    },
    {
        q: "A student reads: \"___ pen is this lying on my desk?\"\nHe wants to ask about the ownership of the pen using an adjective that modifies the noun pen. Which word correctly fills the blank?", 
        o: ["Who", "Whom", "Whose", "Which"], 
        a: 2, 
        e: "'Whose' modifies the noun 'pen' to ask about ownership → Interrogative Adjective."
    },
    {
        q: "In which sentence is the adjective used as an Emphasising Adjective — one that adds stress or force to the noun rather than simply describing it?", 
        o: [
            "She wore a beautiful red dress to the ceremony.", 
            "He is a very tall boy for his age.", 
            "The very idea of cheating in an exam is wrong.", 
            "They live in a small, quiet neighbourhood."
        ], 
        a: 3, 
        a: 2, 
        e: "'The very idea' — 'very' adds force/stress to the noun 'idea' → Emphasising Adjective."
    },
    {
        q: "A student writes: \"My both sisters are doctors.\"\nThe teacher marks it wrong. Which is the correct version?", 
        o: [
            "Both my sisters are doctors.", 
            "My both the sisters are doctors.", 
            "Both of my the sisters are doctors.", 
            "My sisters both are doctors."
        ], 
        a: 0, 
        e: "'Both' must precede the possessive determiner — 'Both my sisters' is the correct structural word order."
    },
    {
        q: "Sort these adjectives into two groups — Adjectives of Number and Adjectives of Quantity:\nP: several\nQ: enough\nR: numerous\nS: sufficient", 
        o: [
            "Number: P, Q — Quantity: R, S", 
            "Number: Q, S — Quantity: P, R", 
            "Number: P, R — Quantity: Q, S", 
            "Number: R, S — Quantity: P, Q"
        ], 
        a: 2, 
        e: "'several' & 'numerous' apply to countable items → Number; 'enough' & 'sufficient' apply to uncountable amounts → Quantity."
    },
    {
        q: "Classify the type of adjective underlined in each sentence:\n1. \"Whose notebook is lying on the floor?\"\n2. \"The utter chaos in the hall surprised everyone.\"\n3. \"Neither team played well in the first half.\"\n4. \"She lost her favourite pen during the exam.\"", 
        o: [
            "1=Possessive, 2=Quality, 3=Distributive, 4=Demonstrative", 
            "1=Interrogative, 2=Emphasising, 3=Distributive, 4=Possessive", 
            "1=Demonstrative, 2=Possessive, 3=Quality, 4=Interrogative", 
            "1=Interrogative, 2=Distributive, 3=Possessive, 4=Emphasising"
        ], 
        a: 1, 
        e: "Whose = Interrogative (ownership question); utter = Emphasising (adds force); neither = Distributive (negates each option); her = Possessive (belonging)."
    },
    {
        q: "Three of the following are Emphasising Adjectives. One is NOT. Which is the odd one out?", 
        o: ["the very mistake", "the utter nonsense", "the complete disaster", "the Italian restaurant"], 
        a: 3, 
        e: "'Italian restaurant' — 'Italian' is a Proper Adjective, not an Emphasising Adjective."
    }
];

let i = 0;
let score = 0;
let attempts = 0;
let timer;
let time = 45;

/* Fast Fade on Splash Screen */
window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        const splashNode = document.getElementById("splash");
        splashNode.style.opacity = "0";
        setTimeout(() => {
            splashNode.classList.add("hidden");
            document.getElementById("start").classList.remove("hidden");
        }, 400);
    }, 2500);
});

function startGame() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    loadQ();
}

function loadQ() {
    if (i >= questions.length) {
        finalScreen();
        return;
    }

    attempts = 0;
    let q = questions[i];

    document.getElementById("qno").innerText = `Question ${i + 1} / ${questions.length}`;
    document.getElementById("score").innerText = `Score: ${score}`;
    document.getElementById("qtext").innerText = q.q;

    let box = document.getElementById("options");
    box.innerHTML = "";

    q.o.forEach((opt, idx) => {
        let b = document.createElement("button");
        b.className = "option";
        b.innerText = opt;
        b.onclick = () => check(idx, b);
        box.appendChild(b);
    });

    startTimer();
}

function startTimer() {
    clearInterval(timer);
    time = 45;
    document.getElementById("timer").innerText = `⏱️ ${time}s`;

    timer = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = `⏱️ ${time}s`;

        if (time <= 0) {
            clearInterval(timer);
            freezeOptions();
            showPopup(false);
        }
    }, 1000);
}

function freezeOptions() {
    let optionButtons = document.querySelectorAll(".option");
    optionButtons.forEach(btn => btn.disabled = true);
}

function check(ans, btn) {
    let q = questions[i];

    if (ans === q.a) {
        clearInterval(timer);
        score++;
        btn.classList.add("node-correct");
        freezeOptions();
        celebrate();
        setTimeout(() => showPopup(true), 600);
        return;
    }

    attempts++;
    btn.classList.add("node-wrong");
    btn.disabled = true;

    if (attempts === 1) {
        alert("❌ Incorrect! Try your second attempt.");
    } else if (attempts >= 2) {
        clearInterval(timer);
        freezeOptions();
        
        // Auto-highlight the right option for the user
        let optionButtons = document.querySelectorAll(".option");
        optionButtons[q.a].classList.add("node-correct");
        
        setTimeout(() => showPopup(false), 1000);
    }
}

function showPopup(correct) {
    let q = questions[i];
    document.getElementById("popup").style.display = "flex";
    
    let heading = correct ? "<strong style='color:var(--success-green); font-size:18px;'>✔ Correct!</strong>" : "<strong style='color:var(--danger-red); font-size:18px;'>✖ Answer Revealed</strong>";
    document.getElementById("popupText").innerHTML = `${heading}<br><br><strong>Explanation:</strong> ${q.e}`;
}

function nextQ() {
    document.getElementById("popup").style.display = "none";
    i++;
    loadQ();
}

function finalScreen() {
    document.getElementById("game").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    let percent = Math.round((score / questions.length) * 100);
    document.getElementById("final").innerText = `Final Score: ${score} / ${questions.length} (${percent}%)`;
}

function celebrate() {
    for (let k = 0; k < 35; k++) {
        let s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = "-20px";
        s.style.animationDuration = (Math.random() * 1 + 1) + "s";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }
}
</script>

</body>
</html>
