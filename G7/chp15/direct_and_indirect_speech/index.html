<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grade 7 English Quiz - Chapter 15: Direct and Indirect Speech</title>
    <style>
        :root {
            --slate-blue: #2b3a67;
            --mint-teal: #41b3a3;
            --amber-gold: #e27d60;
            --gold-dark: #c36246;
            --deep-purple: #1d1e2c;
            --cream-bg: #f4f7fc;
            --card-white: #ffffff;
            --success-green: #2ec4b6;
            --danger-red: #e71d36;
            --panel-radius: 20px;
            --elem-radius: 12px;
            --classic-shadow: 0 10px 30px rgba(43, 58, 103, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--cream-bg);
            color: var(--deep-purple);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
            position: relative;
        }

        .ambient-decorations-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .bg-element {
            position: absolute;
            top: -50px;
            width: 10px;
            height: 10px;
            background: rgba(65, 179, 163, 0.15);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: floatDownStream 12s linear infinite;
        }

        .bg-streamer {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(226, 125, 96, 0.1), transparent);
            animation: floatDownStream 15s linear infinite;
        }

        @keyframes floatDownStream {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 720px;
            display: none;
            position: relative;
            z-index: 10;
            animation: panelFadeIn 0.4s ease-out forwards;
        }

        @keyframes panelFadeIn {
            0% { transform: scale(0.97); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            padding: 24px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        #splash-screen img {
            width: 240px;
            height: auto;
            object-fit: contain;
            margin-bottom: 24px;
        }

        .splash-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--slate-blue);
            margin-bottom: 8px;
        }

        .splash-sub {
            font-size: 15px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(65, 179, 163, 0.1);
            border-top-color: var(--mint-teal);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .quiz-card {
            background: var(--card-white);
            padding: clamp(22px, 5vw, 36px);
            border-radius: var(--panel-radius);
            width: 100%;
            box-shadow: var(--classic-shadow);
            border: 1px solid rgba(43, 58, 103, 0.04);
            text-align: center;
        }

        h1, h2 {
            color: var(--slate-blue);
            font-size: clamp(22px, 4.5vw, 28px);
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--mint-teal);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .audio-ctrl-strip {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(43, 58, 103, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            margin-bottom: 24px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .audio-ctrl-strip button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            color: var(--slate-blue);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hud-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: var(--slate-blue);
            padding: 12px;
            border-radius: var(--elem-radius);
            font-size: 12px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-align: center;
        }

        .hud-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
            justify-content: center;
        }

        .hud-val {
            font-size: 15px;
            color: var(--mint-teal);
        }

        #timer-display {
            color: #ff9faf;
            font-weight: 800;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(43, 58, 103, 0.08);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--mint-teal), var(--success-green));
            transition: width 0.3s ease;
        }

        .question-statement {
            font-size: clamp(16px, 3.8vw, 17px);
            font-weight: 600;
            color: var(--deep-purple);
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .options-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .option-node {
            width: 100%;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: var(--elem-radius);
            padding: 14px 18px;
            font-size: 14.5px;
            font-weight: 600;
            color: var(--deep-purple);
            text-align: left;
            cursor: pointer;
            transition: all 0.1s ease;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .option-node:hover:not(.locked-state) {
            border-color: var(--slate-blue);
            background: rgba(43, 58, 103, 0.01);
            transform: translateY(-1px);
        }
        
        .option-node:active:not(.locked-state) {
            transform: translateY(1px);
        }

        .option-node.locked-state {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-node.correct-look {
            background: #e6f9f7 !important;
            border-color: var(--success-green) !important;
            color: var(--success-green) !important;
            font-weight: 700;
            box-shadow: 0 0 10px rgba(46, 196, 182, 0.15);
            pointer-events: none;
        }
        .option-node.correct-look::after {
            content: "✔";
            font-size: 16px;
            color: var(--success-green);
            flex-shrink: 0;
        }

        .option-node.wrong-look {
            background: #ffebee !important;
            border-color: var(--danger-red) !important;
            color: var(--danger-red) !important;
            font-weight: 700;
            animation: shakeWidget 0.4s ease-in-out;
            pointer-events: none;
        }
        .option-node.wrong-look::after {
            content: "❌";
            font-size: 14px;
            flex-shrink: 0;
        }

        @keyframes shakeWidget {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
        }

        #feedback-alert {
            margin-top: 8px;
            font-size: 18px;
            font-weight: 800;
            display: none;
            text-align: center;
        }

        #explanation-card {
            margin-top: 16px;
            padding: 16px 20px;
            border-radius: var(--elem-radius);
            background: #f8fafc;
            border-left: 5px solid var(--slate-blue);
            font-size: 14.5px;
            line-height: 1.6;
            color: #4a5568;
            text-align: left;
            display: none;
            animation: panelFadeIn 0.3s ease;
        }

        .btn-ui-action {
            padding: 14px 28px;
            border: none;
            border-radius: var(--elem-radius);
            background: var(--amber-gold);
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            margin: 8px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(226, 125, 96, 0.25);
        }

        .btn-ui-action:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }

        .star-particle {
            position: fixed;
            width: 12px;
            height: 12px;
            background: #ffd700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            pointer-events: none;
            z-index: 9999;
            animation: starFallEffect 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes starFallEffect {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(140px) scale(0.3) rotate(240deg); opacity: 0; }
        }

        .review-scroll-container {
            max-height: 380px;
            overflow-y: auto;
            margin-top: 20px;
            padding-right: 6px;
            text-align: left;
        }
        .review-item-card {
            background: #f8fafc;
            border-radius: var(--elem-radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }
        .review-q {
            font-weight: 700;
            font-size: 14.5px;
            margin-bottom: 8px;
            color: var(--slate-blue);
            white-space: pre-line;
        }
        .review-ans-row {
            font-size: 14px;
            margin-bottom: 4px;
        }
        .review-explanation {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 6px;
        }

        .main-logo-display {
            height: 60px; 
            width: auto; 
            object-fit: contain;
            margin-bottom: 12px;
        }

        .final-challenge-badge {
            background: linear-gradient(135deg, #ffd700, var(--amber-gold));
            color: white;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 14px;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.25);
        }
    </style>
</head>
<body>

    <div class="ambient-decorations-container" id="ambient-container"></div>

    <audio id="soundCorrect" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="soundWrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="soundWin" src="assets/clapping.mp3" preload="auto"></audio>

    <div id="splash-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo" onerror="this.style.display='none';">
        <div class="splash-title">Chapter 15 — Direct and Indirect Speech</div>
        <div class="splash-sub">Grade 7 &bull; Powered by Innovine</div>
        <div class="spinner"></div>
    </div>

    <div id="intro-screen" class="container">
        <div class="quiz-card">
            <div style="text-align: center;">
                <img src="assets/innovine-logo.png" class="main-logo-display" alt="Innovine Logo" onerror="this.style.display='none';">
            </div>
            <h1>Chapter 15 — Direct and Indirect Speech</h1>
            <div class="subtitle">Grade 7 English Language Arts</div>
            
            <div class="audio-ctrl-strip">
                <button onclick="toggleSoundEffects()" id="sfx-toggle-btn">🔊 Sound: ON</button>
            </div>

            <button class="btn-ui-action" onclick="initializeQuizEngine()">Start Quiz</button>
        </div>
    </div>

    <div id="question-screen" class="container">
        <div class="audio-ctrl-strip" style="padding: 6px 16px; margin-bottom: 12px; scale: 0.95;">
            <button onclick="toggleSoundEffects()" id="sfx-toggle-game-btn">🔊 Sound: ON</button>
        </div>
        
        <div class="hud-wrapper">
            <div class="hud-block">
                <div>Progress</div>
                <div id="hud-index-val" class="hud-val">1 / 11</div>
            </div>
            <div class="hud-block">
                <div>⭐ Score</div>
                <div id="hud-score-val" class="hud-val">0</div>
            </div>
            <div class="hud-block">
                <div>Streak</div>
                <div id="hud-streak-val" class="hud-val">0 🔥</div>
            </div>
            <div class="hud-block">
                <div>Timer</div>
                <div id="timer-display" class="hud-val">45s</div>
            </div>
        </div>

        <div class="progress-container">
            <div id="progressBarFill" class="progress-fill"></div>
        </div>

        <div class="quiz-card">
            <div id="final-mode-indicator" class="final-challenge-badge" style="display: none;">⚡ Grammar Master Challenge ⚡</div>
            <div id="activeQuestionText" class="question-statement">Loading question statement context...</div>
            <div id="activeOptionsStack" class="options-stack"></div>
            <div id="feedback-alert">
